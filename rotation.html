<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PeeWeeTrails — Rotation</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin:0; padding:0; height:100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #map { position:absolute; inset:0; background:#dfe3e6; }

  /* ---- Compass / mode button (replaces the "my location" button) ---- */
  #compass-btn {
    position: fixed; top: 14px; right: 14px;
    width: 54px; height: 54px; border-radius: 50%;
    background: #d32f2f;                 /* red = location off */
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 1200; -webkit-tap-highlight-color: transparent;
  }
  #compass-btn.tracking { background: #2e7d32; }   /* green = location active */
  #compass-inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s linear;  /* rotates so the N always points to true north */
  }
  #compass-inner svg { width: 36px; height: 36px; display:block; }

  /* ---- Options menu ---- */
  #compass-menu {
    position: fixed; top: 76px; right: 14px;
    width: 232px; background: #fff; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.28);
    padding: 8px; z-index: 1200;
  }
  .cm-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px; border-radius: 9px; cursor: pointer;
    font-size: 15px; color: #263238;
  }
  .cm-item:hover { background: #f0f3f7; }
  .cm-item.active { background: #eaf6ef; font-weight: 600; }
  .cm-dot { width: 14px; height: 14px; border-radius: 50%; flex: 0 0 auto; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }
  .cm-dot.green { background: #2e7d32; } .cm-dot.red { background: #d32f2f; }
  .cm-sep { height: 1px; background: #e5e9ec; margin: 6px 4px; }
  .cm-title { font-size: 11px; color: #90a4ae; padding: 4px 12px 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .seg { display: flex; gap: 6px; padding: 2px 10px 6px; }
  .seg button {
    flex: 1; padding: 7px 4px; border: 1px solid #cfd8e0; background: #fff;
    border-radius: 8px; cursor: pointer; font-size: 13px; color: #37474f;
  }
  .seg button.on { background: #2e7d32; color: #fff; border-color: #2e7d32; }

  /* ---- Import button ---- */
  #import-btn {
    position: fixed; bottom: 26px; right: 14px; z-index: 1200;
    width: 48px; height: 48px; border-radius: 12px; border: none;
    background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #2c3e50;
  }
  #import-btn svg { width: 26px; height: 26px; }

  /* ---- Status pill ---- */
  #status {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    max-width: min(80vw, 460px); z-index: 1150;
    background: rgba(20,28,36,0.82); color: #fff;
    padding: 7px 14px; border-radius: 20px; font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25); text-align: center;
    pointer-events: none; transition: opacity 0.3s; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .hidden { display: none !important; }

  /* keep Leaflet zoom buttons clear of nothing special; they stay screen-fixed */
  .leaflet-control-zoom { margin-top: 14px !important; margin-left: 14px !important; }
</style>
</head>
<body>

<div id="map"></div>

<!-- Compass button: capital N with a pointed triangle above it. Rotates to point at true north. -->
<div id="compass-btn" title="Kaartoriëntatie">
  <div id="compass-inner">
    <svg viewBox="0 0 40 40" aria-hidden="true">
      <path d="M20 3 L13.5 15 L26.5 15 Z" fill="#fff"/>
      <text x="20" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="17" fill="#fff">N</text>
    </svg>
  </div>
</div>

<!-- Options menu -->
<div id="compass-menu" class="hidden">
  <div class="cm-item" data-mode="movement"><span class="cm-dot green"></span>Movement direction</div>
  <div class="cm-item" data-mode="north"><span class="cm-dot green"></span>North up</div>
  <div class="cm-item" data-mode="off"><span class="cm-dot red"></span>Location off</div>
  <div class="cm-sep"></div>
  <div class="cm-title">Auto-recenter na laatste input</div>
  <div class="seg" id="seg-return">
    <button data-sec="10">10 s</button>
    <button data-sec="20">20 s</button>
    <button data-sec="0">Nooit</button>
  </div>
</div>

<button id="import-btn" title="GPX / GeoJSON importeren">
  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M12,19L8,15H10.5V12H13.5V15H16L12,19Z"/></svg>
</button>
<input id="file-input" type="file" accept=".gpx,.geojson,.json" multiple class="hidden">

<div id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
<script>
/* ============================================================
   PeeWeeTrails — rotation demo
   Real map rotation via leaflet-rotate: all map data (routes,
   imported GPX/GeoJSON) rotate along. Two-finger rotation is on.
   The N-button is the north indicator + mode switch.
   Heading-up maths reused from the earlier locatie-kaart.
   ============================================================ */

const START = [52.155, 5.387];   // Amersfoort-ish
const map = L.map('map', {
  rotate: true,            // enable real rotation
  bearing: 0,
  touchRotate: true,       // two-finger rotation on touch devices
  rotateControl: false,    // we use our own N-button
  zoomControl: true,
  attributionControl: true
}).setView(START, 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap-auteurs'
}).addTo(map);

// A little sample route so rotation is visible right away (replace by importing your own).
const sampleRoute = L.polyline([
  [52.128,5.351],[52.140,5.372],[52.150,5.383],[52.163,5.392],[52.176,5.401]
], { color: '#d81b60', weight: 5, opacity: 0.9 }).addTo(map);

// Group that holds everything the user imports (rotates along with the map for free).
const importGroup = L.featureGroup().addTo(map);

// ---- DOM ----
const mapContainer = map.getContainer();
const compassBtn = document.getElementById('compass-btn');
const compassInner = document.getElementById('compass-inner');
const compassMenu = document.getElementById('compass-menu');
const statusEl = document.getElementById('status');
const segReturn = document.getElementById('seg-return');
const fileInput = document.getElementById('file-input');

// ---- State ----
let mode = 'off';            // 'off' | 'north' | 'movement'
let watchId = null;
let marker = null, accCircle = null;
let lastPos = null;
let smoothedHeading = null;
let following = true;        // when true the map re-orients/recenters itself
let resumeTimer = null;
let autoReturn = 10;         // seconds; 0 = never

// ---- Small maths (from locatie-kaart) ----
function angleDelta(a, b) { return ((b - a + 540) % 360) - 180; }
function metersPerPixel(lat, zoom) {
  return 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
}
function destinationPoint(lat, lng, distanceM, bearingDeg) {
  const R = 6371000, brng = bearingDeg * Math.PI / 180;
  const lat1 = lat * Math.PI / 180, lon1 = lng * Math.PI / 180;
  const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceM / R) +
    Math.cos(lat1) * Math.sin(distanceM / R) * Math.cos(brng));
  const lon2 = lon1 + Math.atan2(
    Math.sin(brng) * Math.sin(distanceM / R) * Math.cos(lat1),
    Math.cos(distanceM / R) - Math.sin(lat1) * Math.sin(lat2));
  return { lat: lat2 * 180 / Math.PI, lng: lon2 * 180 / Math.PI };
}

// ---- North indicator: the whole N rotates so it always points to true north.
//      (setBearing(B) puts north at screen-angle B, so rotate the icon by B.)
function updateCompass() {
  compassInner.style.transform = 'rotate(' + map.getBearing() + 'deg)';
}
map.on('rotate move zoom', updateCompass);
updateCompass();

function setStatus(msg) { statusEl.textContent = msg || ''; statusEl.style.opacity = msg ? '1' : '0'; }

// ---- Re-orient / recenter the map for the current mode (only while "following") ----
function orient() {
  if (!following) return;
  if (mode === 'off') { map.setBearing(0); return; }
  if (!lastPos) return;
  const { latitude, longitude } = lastPos.coords;
  const zoom = map.getZoom();

  if (mode === 'north') {
    map.setBearing(0);
    map.setView([latitude, longitude], zoom, { animate: false });
  } else if (mode === 'movement') {
    const hdg = (smoothedHeading == null) ? 0 : smoothedHeading;
    // Put own location at 25% from the bottom: center the map on a point that
    // lies "ahead" along the heading, then rotate so the heading points up.
    const H = mapContainer.clientHeight;
    const dist = H * 0.25 * metersPerPixel(latitude, zoom);
    const dest = destinationPoint(latitude, longitude, dist, hdg);
    map.setBearing(-hdg);
    map.setView([dest.lat, dest.lng], zoom, { animate: false });
  }
}

// ---- GPS ----
function onPosition(pos) {
  lastPos = pos;
  const { latitude, longitude, heading, accuracy, speed } = pos.coords;
  const latlng = [latitude, longitude];

  if (!marker) {
    marker = L.circleMarker(latlng, { radius: 8, color: '#fff', weight: 3,
      fillColor: '#1976d2', fillOpacity: 1 }).addTo(map);
    accCircle = L.circle(latlng, { radius: accuracy, color: '#1976d2',
      weight: 1, fillOpacity: 0.08 }).addTo(map);
  } else {
    marker.setLatLng(latlng);
    accCircle.setLatLng(latlng).setRadius(accuracy);
  }

  if (mode === 'movement') {
    const hasHeading = (heading !== null && !isNaN(heading));
    const reliable = hasHeading && (speed === null || speed > 1); // GPS heading is junk when standing still
    const raw = hasHeading ? heading : 0;
    if (smoothedHeading === null) smoothedHeading = raw;
    else if (reliable) {
      const d = angleDelta(smoothedHeading, raw);
      smoothedHeading += d * (Math.abs(d) > 20 ? 0.6 : 0.25); // snap on real turns, damp small noise
    }
  }

  orient();

  if (mode === 'movement' && (heading === null || isNaN(heading))) {
    setStatus('Nog geen rijrichting (ga rijden/fietsen) — kaart voorlopig noord boven');
  } else if (mode === 'movement') {
    setStatus('Rijrichting ' + Math.round((smoothedHeading || 0)) + '° · ±' + Math.round(accuracy) + ' m');
  } else {
    setStatus('Nauwkeurigheid ±' + Math.round(accuracy) + ' m');
  }
}
function onError(err) { setStatus('Kon locatie niet ophalen: ' + err.message); }

function startGPS() {
  if (!navigator.geolocation) { setStatus('Geolocatie niet ondersteund'); return; }
  if (watchId === null) {
    setStatus('Locatie ophalen…');
    watchId = navigator.geolocation.watchPosition(onPosition, onError,
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 });
  }
}
function stopGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (marker) { map.removeLayer(marker); marker = null; }
  if (accCircle) { map.removeLayer(accCircle); accCircle = null; }
  lastPos = null; smoothedHeading = null;
}

// ---- Mode switching ----
function setMode(m) {
  mode = m;
  following = true;
  clearTimeout(resumeTimer);
  compassMenu.classList.add('hidden');
  document.querySelectorAll('.cm-item').forEach(el =>
    el.classList.toggle('active', el.dataset.mode === m));

  if (m === 'off') {
    stopGPS();
    compassBtn.classList.remove('tracking');   // red
    map.setBearing(0);
    setStatus('Locatie uit — kaart noord boven (2 vingers om te draaien)');
  } else {
    compassBtn.classList.add('tracking');       // green
    startGPS();
  }
  orient();
}

// ---- Manual interaction pauses following; after "autoReturn" seconds it snaps back ----
function userStart() { following = false; clearTimeout(resumeTimer); }
function userEnd() {
  if (autoReturn > 0) {
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => { following = true; orient(); }, autoReturn * 1000);
  }
  // if autoReturn === 0 ("Nooit") the map simply stays where the user left it
}
mapContainer.addEventListener('touchstart', userStart, { passive: true });
mapContainer.addEventListener('touchend', userEnd, { passive: true });
mapContainer.addEventListener('mousedown', userStart);
window.addEventListener('mouseup', userEnd);
mapContainer.addEventListener('wheel', () => { userStart(); userEnd(); }, { passive: true });

// ---- Menu wiring ----
compassBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  compassMenu.classList.toggle('hidden');
});
document.addEventListener('click', (e) => {
  if (!compassMenu.contains(e.target) && e.target !== compassBtn && !compassBtn.contains(e.target))
    compassMenu.classList.add('hidden');
});
document.querySelectorAll('.cm-item').forEach(el =>
  el.addEventListener('click', () => setMode(el.dataset.mode)));

function setAutoReturn(sec) {
  autoReturn = sec;
  [...segReturn.children].forEach(b => b.classList.toggle('on', +b.dataset.sec === sec));
}
[...segReturn.children].forEach(b =>
  b.addEventListener('click', () => setAutoReturn(+b.dataset.sec)));
setAutoReturn(10); // default

// ---- Import (GPX tracks/waypoints + GeoJSON). Imported layers rotate along automatically. ----
document.getElementById('import-btn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  [...e.target.files].forEach(file => {
    const reader = new FileReader();
    reader.onload = () => addImported(file.name, reader.result);
    reader.readAsText(file);
  });
  fileInput.value = '';
});
function addImported(name, text) {
  try {
    if (/\.(geojson|json)$/i.test(name)) {
      L.geoJSON(JSON.parse(text), {
        style: { color: '#6a1b9a', weight: 5 },
        pointToLayer: (f, ll) => L.circleMarker(ll, { radius: 6, color: '#6a1b9a', fillColor: '#fff', fillOpacity: 1, weight: 2 })
      }).addTo(importGroup);
    } else {
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const grab = tag => [...xml.getElementsByTagName(tag)].map(p => [ +p.getAttribute('lat'), +p.getAttribute('lon') ]);
      const trk = grab('trkpt'), rte = grab('rtept'), pts = trk.length ? trk : rte;
      if (pts.length) L.polyline(pts, { color: '#1565c0', weight: 5 }).addTo(importGroup);
      grab('wpt').forEach(w => L.circleMarker(w, { radius: 6, color: '#1565c0', fillColor: '#fff', fillOpacity: 1, weight: 2 }).addTo(importGroup));
    }
    if (importGroup.getLayers().length) {
      following = false;                       // don't fight the fit
      map.fitBounds(importGroup.getBounds(), { padding: [30, 30] });
      setStatus('Geïmporteerd: ' + name);
    }
  } catch (err) { setStatus('Kon bestand niet lezen: ' + name); }
}

// Start in "Location off": north-up, red N, rotation still possible with two fingers.
setMode('off');
</script>
</body>
</html>
