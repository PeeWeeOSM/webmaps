<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mijn route</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1c1c1e;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:9px 14px;background:#111;display:flex;align-items:center;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
/* Controls overlay: altijd bovenop, niet meedraaien */
#controls-overlay{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;pointer-events:none}
#controls-overlay>*{pointer-events:auto}
/* Leaflet eigen zoom controls verbergen want wij tonen onze eigen */
.leaflet-control-zoom{display:none!important}
#notice{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:1001}
.ctrl-btn{width:34px;height:34px;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.ctrl-btn:hover{background:#f4f4f4}
.ctrl-btn.on{background:#d4efff;border-color:#2980b9}
.ctrl-btn.zoom{font-size:22px;font-weight:300}
.zoom-sep{height:1px;background:#ccc;margin:0 4px}
.zoom-group{background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.zoom-group .ctrl-btn{border:none;border-radius:0;box-shadow:none;width:34px;height:32px}
.zoom-group .ctrl-btn:first-child{border-bottom:1px solid #ddd}
#layers-overlay{display:none;position:absolute;top:54px;right:10px;z-index:1000}
#layers-panel{display:none;position:absolute;top:42px;right:0;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.3);padding:10px 12px;min-width:180px;max-width:240px}
#layers-panel.open{display:block}
#layers-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.layer-toggle-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#222}
#zoom-indicator{position:absolute;top:10px;right:10px;z-index:1000;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.3);padding:6px 10px;font-size:13px;font-weight:600;color:#222;pointer-events:none}
.layer-toggle-row input{flex-shrink:0}
.layer-toggle-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="hdr"><h1>Mijn route</h1></div>
<div id="map-wrap">
  <div id="map"></div>
  <div id="controls-overlay">
    <div class="zoom-group">
      <button class="ctrl-btn zoom" onclick="map.zoomIn()" title="Inzoomen">+</button>
      <button class="ctrl-btn zoom" onclick="map.zoomOut()" title="Uitzoomen">&#8722;</button>
    </div>
    <button class="ctrl-btn" id="loc-btn" title="Mijn locatie">&#9737;</button>
    <button class="ctrl-btn" id="vis-btn" title="GPX tonen/verbergen">&#128065;</button>
  </div>
  <div id="zoom-indicator">z<span id="zoom-val">–</span></div>
  <div id="layers-overlay">
    <button class="ctrl-btn" id="layers-btn" title="Kaartlagen">&#9776;</button>
    <div id="layers-panel"><h3>Kaartlagen</h3><div id="layers-panel-content"></div></div>
  </div>
  <div id="notice">Achtergrondkaart niet beschikbaar (geen verbinding)</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>
<script>
const D=[];
const B=null;
const LW=3;
const OPT_FOLLOW=false;
const WPTZOOM=15;

function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

function getLabelText(f, elementName){
  if(f.useElementName && elementName && elementName.trim()) return elementName.trim();
  return f.filename;
}

function midpt(coords){return coords[Math.floor(coords.length/2)];}

const map=L.map('map');
const tiles=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
tiles.on('tileerror',()=>document.getElementById('notice').style.display='block');

// Extra lagen (onder GPX tracks) — elke laag bijhouden zodat we ze in het lagenpaneel kunnen tonen/verbergen
const EX=[{"type":"xyz","url":"https://mapwarper.net/mosaics/tile/2123/{z}/{x}/{y}.png","wmsLayer":"","displayName":"Leggers","opacity":0.8,"zoomMin":1,"zoomMax":17},{"type":"xyz","url":"https://wms.prod.qgiscloud.com/PeeWee32/brouter_layers?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=maxspeed_label&FORMAT=image/png&TILEMATRIXSET=EPSG:3857&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}","wmsLayer":"","displayName":"Maxspeed","opacity":0.8,"zoomMin":17,"zoomMax":22},{"type":"xyz","url":"https://wms.prod.qgiscloud.com/PeeWee32/brouter_layers?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=surface2&FORMAT=image/png&TILEMATRIXSET=EPSG:3857&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}","wmsLayer":"","displayName":"Surface","opacity":0.8,"zoomMin":20,"zoomMax":22}];
const wmsLayerObjs=[];
EX.forEach((el,i)=>{
  let lyr=null;
  try{
    if(el.type==='wms'){
      lyr=L.tileLayer.wms(el.url,{layers:el.wmsLayer,format:'image/png',transparent:true,opacity:el.opacity,attribution:'',minZoom:el.zoomMin,maxZoom:el.zoomMax}).addTo(map);
    } else {
      lyr=L.tileLayer(el.url,{opacity:el.opacity,attribution:'',minZoom:el.zoomMin,maxZoom:el.zoomMax}).addTo(map);
    }
  }catch(e){}
  wmsLayerObjs.push({layer:lyr,name:el.displayName||('Laag '+(i+1)),visible:true});
});

// Lagenpaneel rechtsboven: alleen tonen als er extra lagen zijn
if(EX.length>0){
  const layersBtn=document.getElementById('layers-btn');
  const layersOverlay=document.getElementById('layers-overlay');
  const layersPanel=document.getElementById('layers-panel');
  const panelContent=document.getElementById('layers-panel-content');
  layersOverlay.style.display='block';
  wmsLayerObjs.forEach((lo,i)=>{
    const row=document.createElement('label');
    row.className='layer-toggle-row';
    row.innerHTML='<input type="checkbox" checked data-idx="'+i+'"><span>'+lo.name+'</span>';
    panelContent.appendChild(row);
  });
  panelContent.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      const lo=wmsLayerObjs[i];
      if(!lo.layer)return;
      if(e.target.checked){map.addLayer(lo.layer);}else{map.removeLayer(lo.layer);}
    });
  });
  layersBtn.onclick=function(){layersPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    if(!layersOverlay.contains(e.target))layersPanel.classList.remove('open');
  });
} else {
  document.getElementById('layers-overlay').style.display='none';
}

const labelLayers=[];
const trackLayers=[];

D.forEach(f=>{
  const filePolys=[];
  f.tracks.forEach(t=>{
    const poly=L.polyline(t.coords,{color:f.color,weight:LW,opacity:.9}).addTo(map);
    poly.bindPopup('<b>'+getLabelText(f,t.name)+'</b>'+(t.name?'<br>'+t.name:''));
    poly._gpxFile=f;
    trackLayers.push(poly);
    filePolys.push(poly);
  });
  if(f.showStart&&f.tracks.length&&f.tracks[0].coords.length){
    const sp=f.tracks[0].coords[0];
    const startM=L.marker(sp,{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:22px;height:22px;background:'+f.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4)"><span style="color:#fff;font-size:11px;line-height:1;margin-left:2px">&#9654;</span></div>',
        iconSize:[22,22],iconAnchor:[11,11]
      }),
      interactive:false,zIndexOffset:300
    }).addTo(map);
    trackLayers.push(startM);
  }
  f.waypoints.forEach(w=>{
    const m=L.circleMarker([w.lat,w.lon],{radius:5,color:f.color,fillColor:f.color,fillOpacity:.9,weight:2}).addTo(map);
    const wLabel=getLabelText(f,w.name);
    if(w.name||w.desc)m.bindPopup('<b>'+wLabel+'</b>'+(w.desc?'<br>'+w.desc:''));
    trackLayers.push(m);
    // waypointlabel: alleen als showLabel aan staat voor deze GPX, zoomdrempel uit globale WPTZOOM
    if(f.showLabel){
      const h=contrastHalo(f.color);
      const wptLbl=L.marker([w.lat,w.lon],{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+f.color+';font-size:13px;font-weight:600;white-space:nowrap;pointer-events:none;text-shadow:-1.5px -1.5px 0 '+h+',1.5px -1.5px 0 '+h+',-1.5px 1.5px 0 '+h+',1.5px 1.5px 0 '+h+',0 1.5px 0 '+h+',0 -1.5px 0 '+h+';transform:translate(-50%,calc(-50% - 12px))">'+wLabel+'</div>',
          iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:150
      }).addTo(map);
      wptLbl._zoomMin=WPTZOOM;
      wptLbl._zoomMax=19;
      labelLayers.push(wptLbl);
    }
  });
  if(f.showLabel&&f.tracks.length){
    const h=contrastHalo(f.color);
    const mainLabel=getLabelText(f,f.tracks[0].name);
    if(f.labelPos==='midline'&&filePolys.length){
      const tp=filePolys[0];
      tp.setText(mainLabel,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      tp._gpxLabel=true;
      tp._zoomMin=f.zoomMin;
      tp._zoomMax=f.zoomMax;
      labelLayers.push(tp);
    } else {
      const allPts=f.tracks.flatMap(t=>t.coords);
      let pos;
      if(f.labelPos==='start') pos=f.tracks[0].coords[0];
      else pos=centroid(allPts);
      const labelOffset=(f.labelPos==='start'&&f.showStart)?'transform:translate(-50%,calc(-50% - 18px))':'transform:translate(-50%,-50%)';
      const lbl=L.marker(pos,{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+f.color+';font-size:21px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-2px -2px 0 '+h+',2px -2px 0 '+h+',-2px 2px 0 '+h+',2px 2px 0 '+h+',0 2px 0 '+h+',0 -2px 0 '+h+',2px 0 0 '+h+',-2px 0 0 '+h+';'+labelOffset+'">'+mainLabel+'</div>',
          iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:200
      }).addTo(map);
      lbl._zoomMin=f.zoomMin;
      lbl._zoomMax=f.zoomMax;
      labelLayers.push(lbl);
    }
  }
});

if(B)map.fitBounds(B,{padding:[16,16]});else map.setView([52,5],8);

function updateLabels(){
  const z=map.getZoom();
  labelLayers.forEach(l=>{
    const visible=z>=l._zoomMin&&z<=l._zoomMax;
    if(l.setText){
      if(visible){
        const f=l._gpxFile;
        const h=contrastHalo(f.color);
        const mainLabel=getLabelText(f,f.tracks[0]&&f.tracks[0].name);
        l.setText(mainLabel,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else { l.setText(null); }
    } else {
      const e=l.getElement();if(e)e.style.display=visible?'':'none';
    }
  });
}
map.on('zoomend',updateLabels);
map.whenReady(updateLabels);

// Zoomniveau-indicator rechtsboven
const zoomValEl=document.getElementById('zoom-val');
function updateZoomIndicator(){zoomValEl.textContent=map.getZoom();}
map.on('zoomend',updateZoomIndicator);
map.whenReady(updateZoomIndicator);

// --- Locatie en volgen ---
const locBtn=document.getElementById('loc-btn');
const visBtn=document.getElementById('vis-btn');
let wid=null,lm=null,lc=null;

function stopLoc(){
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  locBtn.classList.remove('on');locBtn.innerHTML='&#9737;';
  if(lm){map.removeLayer(lm);map.removeLayer(lc);lm=lc=null;}
}

locBtn.onclick=function(){
  if(wid!==null){stopLoc();return;}
  if(!navigator.geolocation){alert('GPS niet beschikbaar in deze browser.');return;}
  locBtn.innerHTML='&#8987;';

  wid=navigator.geolocation.watchPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    locBtn.classList.add('on');locBtn.innerHTML='&#9737;';

    if(lm){
      lm.setLatLng(ll);
      lc.setLatLng(ll).setRadius(p.coords.accuracy);
    } else {
      lc=L.circle(ll,{radius:p.coords.accuracy,color:'#2980b9',fillColor:'#2980b9',fillOpacity:.15,weight:1}).addTo(map);
      lm=L.circleMarker(ll,{radius:9,color:'#fff',fillColor:'#2980b9',fillOpacity:1,weight:2}).addTo(map).bindPopup('Jouw locatie');
    }

    if(OPT_FOLLOW){
      map.setView(ll, Math.max(map.getZoom(),14),{animate:true,duration:0.5});
    } else if(!lm._shown){
      map.setView(ll, Math.max(map.getZoom(),14));
      lm._shown=true;
    }
  },function(e){
    stopLoc();
    alert('Locatie niet beschikbaar: '+e.message);
  },{enableHighAccuracy:true,maximumAge:1000});
};

let gpxVisible=true;
visBtn.onclick=function(){
  gpxVisible=!gpxVisible;
  trackLayers.forEach(l=>{
    if(gpxVisible)map.addLayer(l);else map.removeLayer(l);
  });
  labelLayers.forEach(l=>{
    if(gpxVisible){map.addLayer(l);updateLabels();}else map.removeLayer(l);
  });
  visBtn.style.opacity=gpxVisible?'1':'0.5';
};
</script>
</body>
</html>
