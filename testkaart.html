<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>testkaart</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1c1c1e;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:9px 14px;background:#111;display:flex;align-items:center;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;top:-20%;left:-20%;width:140%;height:140%;transition:transform 0.3s ease}
#notice{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:9999}
.loc-btn{width:34px;height:34px;background:white;border:2px solid rgba(0,0,0,0.2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1;transition:background 0.15s}
.loc-btn:hover{background:#f4f4f4}
.loc-btn.on{background:#d4efff;border-color:#2980b9}
</style>
</head>
<body>
<div id="hdr"><h1>testkaart</h1></div>
<div id="map-wrap"><div id="map"></div></div>
<div id="notice">Achtergrondkaart niet beschikbaar (geen verbinding)</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>
<script>
const D=[{"filename":"Leusden_vogelaars_gebied","color":"#e6194b","showLabel":true,"showStart":true,"labelPos":"centroid","zoomMin":14,"zoomMax":18,"tracks":[{"name":"Leusden_bikkels_area","coords":[[52.12749472718124,5.41053056716919],[52.123542650819374,5.400874614715576],[52.11002112964386,5.401582717895509],[52.10759532407898,5.422697067260743],[52.11819406818236,5.448017120361329],[52.12984450563851,5.428619384765625],[52.127517338233666,5.410621762275696]]}],"waypoints":[]},{"filename":"Leusden_vogelaars_route","color":"#e6194b","showLabel":true,"showStart":true,"labelPos":"centroid","zoomMin":14,"zoomMax":18,"tracks":[{"name":"Leusden_bikkel_route","coords":[[52.121779,5.405574],[52.121788,5.405387],[52.122305,5.405475],[52.122639,5.405508],[52.122751,5.404539],[52.122788,5.404358],[52.122964,5.404468],[52.123278,5.404666],[52.123497,5.40477],[52.123628,5.404829],[52.123669,5.404908],[52.123725,5.404957],[52.123751,5.404958],[52.12378,5.404891],[52.123801,5.404762],[52.123845,5.404719],[52.123876,5.404704],[52.123966,5.404615],[52.124014,5.404516],[52.124094,5.404573],[52.124177,5.404645],[52.124169,5.404731],[52.124161,5.404818],[52.124167,5.40507],[52.124042,5.405281],[52.124019,5.405437],[52.123736,5.407769],[52.123667,5.408423],[52.1236,5.409662],[52.123593,5.409795],[52.123601,5.410039],[52.12364,5.410258],[52.123637,5.410298],[52.123674,5.410421],[52.123724,5.410689],[52.123783,5.410927],[52.123826,5.411115],[52.123847,5.411169],[52.123897,5.411253],[52.123999,5.411345],[52.12428,5.411567],[52.124355,5.411587],[52.124403,5.411618],[52.124704,5.411884],[52.12486,5.412074],[52.124906,5.412149],[52.125001,5.412237],[52.124906,5.412702],[52.124882,5.412782],[52.12484,5.412922],[52.124818,5.412994],[52.124781,5.413119],[52.124701,5.413254],[52.124678,5.413311],[52.124838,5.413378],[52.124857,5.413402],[52.125022,5.413892],[52.124982,5.413944],[52.124952,5.414023],[52.124954,5.414113],[52.124975,5.414193],[52.124933,5.414261],[52.124851,5.414585]]}],"waypoints":[]}];
const B=[[52.10759532407898,5.400874614715576],[52.12984450563851,5.448017120361329]];
const LW=3;
const OPT_FOLLOW=true;
const OPT_ROTATE=true;

function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

function midpt(coords){return coords[Math.floor(coords.length/2)];}

const map=L.map('map');
const tiles=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
tiles.on('tileerror',()=>document.getElementById('notice').style.display='block');

// Extra lagen (onder GPX tracks)
const EX=[{"type":"xyz","url":"https://wms.prod.qgiscloud.com/PeeWee32/brouter_layers?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=surface2&FORMAT=image/png&TILEMATRIXSET=EPSG:3857&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}","wmsLayer":"","opacity":0.5},{"type":"xyz","url":"https://wms.prod.qgiscloud.com/PeeWee32/brouter_layers?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=maxspeed_label&FORMAT=image/png&TILEMATRIXSET=EPSG:3857&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}","wmsLayer":"","opacity":0.8}];
EX.forEach(el=>{
  try{
    if(el.type==='wms'){
      L.tileLayer.wms(el.url,{layers:el.wmsLayer,format:'image/png',transparent:true,opacity:el.opacity,attribution:''}).addTo(map);
    } else {
      L.tileLayer(el.url,{opacity:el.opacity,maxZoom:22,attribution:''}).addTo(map);
    }
  }catch(e){}
});

const labelLayers=[];
const trackLayers=[];

D.forEach(f=>{
  const filePolys=[];
  f.tracks.forEach(t=>{
    const poly=L.polyline(t.coords,{color:f.color,weight:LW,opacity:.9}).addTo(map);
    poly.bindPopup('<b>'+f.filename+'</b>'+(t.name?'<br>'+t.name:''));
    poly._gpxFile=f;
    trackLayers.push(poly);
    filePolys.push(poly);
  });
  if(f.showStart&&f.tracks.length&&f.tracks[0].coords.length){
    const sp=f.tracks[0].coords[0];
    const startM=L.marker(sp,{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:22px;height:22px;background:'+f.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4)"><span style="color:#fff;font-size:11px;line-height:1;margin-left:2px">&#9654;</span></div>',
        iconSize:[22,22],iconAnchor:[11,11]
      }),
      interactive:false,zIndexOffset:300
    }).addTo(map);
    trackLayers.push(startM);
  }
  f.waypoints.forEach(w=>{
    const m=L.circleMarker([w.lat,w.lon],{radius:5,color:f.color,fillColor:f.color,fillOpacity:.9,weight:2}).addTo(map);
    if(w.name||w.desc)m.bindPopup('<b>'+w.name+'</b>'+(w.desc?'<br>'+w.desc:''));
    trackLayers.push(m);
  });
  if(f.showLabel&&f.tracks.length){
    const h=contrastHalo(f.color);
    if(f.labelPos==='midline'&&filePolys.length){
      const tp=filePolys[0];
      tp.setText(f.filename,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      tp._gpxLabel=true;
      tp._zoomMin=f.zoomMin;
      tp._zoomMax=f.zoomMax;
      labelLayers.push(tp);
    } else {
      const allPts=f.tracks.flatMap(t=>t.coords);
      let pos;
      if(f.labelPos==='start') pos=f.tracks[0].coords[0];
      else pos=centroid(allPts);
      const labelOffset=(f.labelPos==='start'&&f.showStart)?'transform:translate(-50%,calc(-50% - 18px))':'transform:translate(-50%,-50%)';
      const lbl=L.marker(pos,{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+f.color+';font-size:21px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-2px -2px 0 '+h+',2px -2px 0 '+h+',-2px 2px 0 '+h+',2px 2px 0 '+h+',0 2px 0 '+h+',0 -2px 0 '+h+',2px 0 0 '+h+',-2px 0 0 '+h+';'+labelOffset+'">'+f.filename+'</div>',
          iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:200
      }).addTo(map);
      lbl._zoomMin=f.zoomMin;
      lbl._zoomMax=f.zoomMax;
      labelLayers.push(lbl);
    }
  }
});

if(B)map.fitBounds(B,{padding:[16,16]});else map.setView([52,5],8);

function updateLabels(){
  const z=map.getZoom();
  labelLayers.forEach(l=>{
    const visible=z>=l._zoomMin&&z<=l._zoomMax;
    if(l.setText){
      if(visible){
        const f=l._gpxFile;
        const h=contrastHalo(f.color);
        l.setText(f.filename,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else { l.setText(null); }
    } else {
      const e=l.getElement();if(e)e.style.display=visible?'':'none';
    }
  });
}
map.on('zoomend',updateLabels);
map.whenReady(updateLabels);

// --- Locatie, volgen en rotatie ---
// Positie-offset als rotatie aan staat: marker 35% omlaag van midden
const MAP_EL=document.getElementById('map');
let currentHeading=0;
let isFollowing=false;

function applyRotation(deg){
  currentHeading=deg;
  if(OPT_ROTATE){
    MAP_EL.style.transformOrigin='center center';
    MAP_EL.style.transform='rotate('+(-deg)+'deg)';
    map.invalidateSize();
  }
}

function getFollowOffset(){
  // Als rotatie aan: positie op 65% van hoogte (iets onder midden)
  if(OPT_ROTATE){
    const h=MAP_EL.offsetHeight;
    return map.containerPointToLatLng(L.point(MAP_EL.offsetWidth/2, h*0.65));
  }
  return null;
}

const LocControl=L.Control.extend({
  options:{position:'topleft'},
  onAdd:function(){
    const btn=document.createElement('button');
    btn.className='loc-btn';
    btn.title='Mijn locatie';
    btn.setAttribute('aria-label','Mijn locatie tonen');
    btn.innerHTML='&#9737;';
    L.DomEvent.disableClickPropagation(btn);
    let wid=null,lm=null,lc=null,orHandler=null;

    function stopLoc(){
      if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
      if(orHandler){window.removeEventListener('deviceorientation',orHandler);orHandler=null;}
      isFollowing=false;
      if(OPT_ROTATE){MAP_EL.style.transform='';map.invalidateSize();}
      btn.classList.remove('on');btn.innerHTML='&#9737;';
      if(lm){map.removeLayer(lm);map.removeLayer(lc);lm=lc=null;}
    }

    btn.onclick=function(){
      if(wid!==null){stopLoc();return;}
      if(!navigator.geolocation){alert('GPS niet beschikbaar in deze browser.');return;}
      btn.innerHTML='&#8987;';

      // Kompas/heading via deviceorientation (werkt op telefoon)
      if(OPT_ROTATE){
        function handleOrientation(e){
          const h=e.webkitCompassHeading!=null?e.webkitCompassHeading:(e.alpha!=null?(360-e.alpha):null);
          if(h!=null)applyRotation(h);
        }
        // iOS 13+ vereist permissie
        if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
          DeviceOrientationEvent.requestPermission().then(r=>{
            if(r==='granted')window.addEventListener('deviceorientation',handleOrientation,true);
          }).catch(()=>{});
        } else {
          window.addEventListener('deviceorientation',handleOrientation,true);
        }
        orHandler=handleOrientation;
      }

      wid=navigator.geolocation.watchPosition(function(p){
        const ll=[p.coords.latitude,p.coords.longitude];
        isFollowing=true;
        btn.classList.add('on');btn.innerHTML='&#9737;';

        // Heading via GPS als kompas niet werkt of als versnelling beschikbaar
        if(OPT_ROTATE&&p.coords.heading!=null&&!isNaN(p.coords.heading)){
          applyRotation(p.coords.heading);
        }

        if(lm){
          lm.setLatLng(ll);
          lc.setLatLng(ll).setRadius(p.coords.accuracy);
        } else {
          lc=L.circle(ll,{radius:p.coords.accuracy,color:'#2980b9',fillColor:'#2980b9',fillOpacity:.15,weight:1}).addTo(map);
          lm=L.circleMarker(ll,{radius:9,color:'#fff',fillColor:'#2980b9',fillOpacity:1,weight:2}).addTo(map).bindPopup('Jouw locatie');
        }

        if(OPT_FOLLOW||OPT_ROTATE){
          if(OPT_ROTATE){
            // Bereken offset zodat marker iets onder midden staat
            const mapH=MAP_EL.offsetHeight;
            const mapW=MAP_EL.offsetWidth;
            const offsetPt=L.point(mapW/2, mapH*0.65);
            const offsetLL=map.containerPointToLatLng(offsetPt);
            const center=map.getCenter();
            const dlat=center.lat-offsetLL.lat;
            const dlng=center.lng-offsetLL.lng;
            map.setView([ll[0]+dlat, ll[1]+dlng], Math.max(map.getZoom(),14),{animate:true,duration:0.5});
          } else {
            map.setView(ll, Math.max(map.getZoom(),14),{animate:true,duration:0.5});
          }
        } else if(!lm._shown){
          map.setView(ll, Math.max(map.getZoom(),14));
          lm._shown=true;
        }
      },function(e){
        stopLoc();
        alert('Locatie niet beschikbaar: '+e.message);
      },{enableHighAccuracy:true,maximumAge:1000});
    };
    return btn;
  }
});
new LocControl().addTo(map);

const VisControl=L.Control.extend({
  options:{position:'topleft'},
  onAdd:function(){
    const btn=document.createElement('button');
    btn.className='loc-btn';
    btn.title='GPX tonen/verbergen';
    btn.setAttribute('aria-label','GPX tonen of verbergen');
    btn.innerHTML='&#128065;';
    btn.style.marginTop='4px';
    L.DomEvent.disableClickPropagation(btn);
    let visible=true;
    btn.onclick=function(){
      visible=!visible;
      trackLayers.forEach(l=>{
        if(visible)map.addLayer(l);else map.removeLayer(l);
      });
      labelLayers.forEach(l=>{
        if(visible){map.addLayer(l);updateLabels();}else map.removeLayer(l);
      });
      btn.style.opacity=visible?'1':'0.5';
    };
    return btn;
  }
});
new VisControl().addTo(map);
</script>
</body>
</html>
