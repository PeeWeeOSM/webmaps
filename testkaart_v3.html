<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Route</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1c1c1e;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:9px 14px;background:#111;display:flex;align-items:center;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
/* Controls overlay: always on top */
#controls-overlay{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;pointer-events:none}
#controls-overlay>*{pointer-events:auto}
/* Hide Leaflet default zoom controls, we use our own */
.leaflet-control-zoom{display:none!important}
#notice{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:1001}
.ctrl-btn{width:34px;height:34px;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.ctrl-btn:hover{background:#f4f4f4}
.ctrl-btn.on{background:#d4efff;border-color:#2980b9}
.ctrl-btn.zoom{font-size:22px;font-weight:300}
.zoom-sep{height:1px;background:#ccc;margin:0 4px}
.zoom-group{background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.zoom-group .ctrl-btn{border:none;border-radius:0;box-shadow:none;width:34px;height:32px}
.zoom-group .ctrl-btn:first-child{border-bottom:1px solid #ddd}
#layers-overlay{display:none;position:absolute;top:54px;right:10px;z-index:1000}
#layers-panel{display:none;position:absolute;top:42px;right:0;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.3);padding:10px 12px;min-width:180px;max-width:240px}
#layers-panel.open{display:block}
#layers-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.layer-toggle-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#222}
#zoom-indicator{position:absolute;top:10px;right:10px;z-index:1000;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.3);padding:6px 10px;font-size:13px;font-weight:600;color:#222;pointer-events:none}
.layer-toggle-row input{flex-shrink:0}
.layer-toggle-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-opacity-row{display:flex;align-items:center;gap:6px;padding:2px 0 6px 22px;border-bottom:1px solid #eee}
.layer-opacity-row:last-child{border-bottom:none;padding-bottom:2px}
.layer-opacity-row input[type=range]{flex:1;height:4px;accent-color:#185FA5;cursor:pointer}
.layer-opacity-row span{font-size:11px;color:#999;min-width:30px;text-align:right}
.layer-section-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;padding:4px 0 2px}
/* User route loader panel */
#route-overlay{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;align-items:center;gap:0}
#route-btn{background:white;border:2px solid rgba(0,0,0,.25);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;white-space:nowrap}
#route-btn:hover{background:#f4f4f4}
#route-btn.has-routes{border-color:#2980b9;background:#d4efff}
#route-panel{display:none;background:white;border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.25);padding:12px 14px;min-width:240px;max-width:300px;margin-bottom:6px;max-height:60vh;overflow-y:auto}
#route-panel.open{display:block}
#route-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.user-route-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;color:#222}
.user-route-row:last-child{border-bottom:none}
.user-route-row input[type=color]{width:22px;height:22px;border:none;padding:0;border-radius:3px;cursor:pointer;flex-shrink:0}
.user-route-row .route-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.user-route-row .route-del{background:none;border:none;color:#c0392b;font-size:16px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1}
.user-route-row .route-fly{background:none;border:none;font-size:14px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;color:#2980b9}
.user-route-row .route-vis{background:none;border:none;font-size:14px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1;color:#555}
.route-options-row{display:flex;align-items:center;gap:4px;padding:2px 0 6px 28px;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.route-options-row:last-child{border-bottom:none}
.route-options-row input[type=range]{width:70px;accent-color:#185FA5;cursor:pointer}
.ro-label{font-size:11px;color:#999}
.ro-val{font-size:11px;color:#999;min-width:28px}
#route-add-bar{display:flex;gap:6px;margin-top:8px}
#route-add-bar button{flex:1;padding:6px 4px;border:1.5px solid #2980b9;border-radius:6px;background:white;color:#2980b9;font-size:12px;font-weight:600;cursor:pointer}
#route-add-bar button:hover{background:#eaf4fd}
</style>
</head>

function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

function nearestPointOnLine(point, lineCoords){
  if(lineCoords.length===0) return point;
  if(lineCoords.length===1) return lineCoords[0];
  let best=lineCoords[0], bestDist=Infinity;
  for(let i=0;i<lineCoords.length-1;i++){
    const a=lineCoords[i], b=lineCoords[i+1];
    const dx=b[0]-a[0], dy=b[1]-a[1];
    let t = (dx===0&&dy===0) ? 0 : ((point[0]-a[0])*dx+(point[1]-a[1])*dy)/(dx*dx+dy*dy);
    t = Math.max(0, Math.min(1, t));
    const proj=[a[0]+t*dx, a[1]+t*dy];
    const d=Math.hypot(point[0]-proj[0], point[1]-proj[1]);
    if(d<bestDist){ bestDist=d; best=proj; }
  }
  return best;
}

function labelAnchorCentroid(trackCoords){
  const c=centroid(trackCoords);
  return nearestPointOnLine(c, trackCoords);
}

function bearingPoints(p1,p2){
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

  let nextKm=1000;
  for(let i=0;i<coords.length-1;i++){
    const segDist=haversineMeters(coords[i],coords[i+1]);
    while(cumDist+segDist>=nextKm){
      const t=(nextKm-cumDist)/segDist;
      const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
      const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
      markers.push({position:[lat,lon], bearing:bearingPoints(coords[i],coords[i+1]), km:nextKm/1000});
      nextKm+=1000;
    }
    cumDist+=segDist;
  }
  return markers;
}

function simplifyLine(points, tolerance){
  if(points.length<3) return points;
  function perpDist(pt,a,b){
    const dx=b[0]-a[0], dy=b[1]-a[1];
    if(dx===0&&dy===0) return Math.hypot(pt[0]-a[0],pt[1]-a[1]);
    const t=((pt[0]-a[0])*dx+(pt[1]-a[1])*dy)/(dx*dx+dy*dy);
    const tc=Math.max(0,Math.min(1,t));
    const px=a[0]+tc*dx, py=a[1]+tc*dy;
    return Math.hypot(pt[0]-px,pt[1]-py);
  }
  function dp(pts,tol){
    if(pts.length<3) return pts;
    let maxD=0,idx=0;
    for(let i=1;i<pts.length-1;i++){
      const d=perpDist(pts[i],pts[0],pts[pts.length-1]);
      if(d>maxD){maxD=d;idx=i;}
    }
    if(maxD>tol){
      const left=dp(pts.slice(0,idx+1),tol);
      const right=dp(pts.slice(idx),tol);
      return left.slice(0,-1).concat(right);
    }
    return [pts[0],pts[pts.length-1]];
  }
  return dp(points,tolerance);
}

function buildTextPathLine(coords, labelLength){
  if(coords.length<3) return normalizeDirection(coords);
  const lats=coords.map(p=>p[0]), lons=coords.map(p=>p[1]);
  const span=Math.max(Math.max(...lats)-Math.min(...lats), Math.max(...lons)-Math.min(...lons));
  const lenFactor = labelLength ? Math.max(0.4, 1-(labelLength-10)*0.03) : 1;
  const tolerance=Math.max(span*0.012*lenFactor, 0.00008);
  const simplified=simplifyLine(coords, tolerance);
  return normalizeDirection(simplified);
}

function normalizeDirection(coords){
  if(coords.length<2) return coords;
  const start=coords[0], end=coords[coords.length-1];
  const dLon=end[1]-start[1];
  const dLat=end[0]-start[0];
  const goingLeft = Math.abs(dLon) >= Math.abs(dLat) ? dLon < 0 : dLat < 0;
  return goingLeft ? coords.slice().reverse() : coords;
}

function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

function getLabelText(f, elementName){
  if(f.useElementName && elementName && elementName.trim()) return elementName.trim();

// --- Status in URL: extent en laag-zichtbaarheid kunnen via #-hash gedeeld worden ---
function parseStateFromHash(){
  if(!location.hash || location.hash.length<2) return null;
  const params=new URLSearchParams(location.hash.slice(1));
  const lat=parseFloat(params.get('lat'));
  const lng=parseFloat(params.get('lng'));
  const z=parseInt(params.get('z'));
  const layersParam=params.get('layers');
  const out={};
  if(!isNaN(lat)&&!isNaN(lng)&&!isNaN(z)){ out.lat=lat; out.lng=lng; out.z=z; }
  if(layersParam!=null){ out.layerVis=layersParam.split(',').map(v=>v==='1'); }
  return Object.keys(out).length?out:null;
}

function updateUrlHash(){
  const c=map.getCenter();
  const params=new URLSearchParams();
  params.set('lat',c.lat.toFixed(6));
  params.set('lng',c.lng.toFixed(6));
  params.set('z',map.getZoom());
  if(wmsLayerObjs.length){
    params.set('layers',wmsLayerObjs.map(lo=>map.hasLayer(lo.layer)?'1':'0').join(','));
  }
  history.replaceState(null,'','#'+params.toString());
}

const locBtn=document.getElementById('loc-btn');
const visBtn=document.getElementById('vis-btn');
let wid=null,locTrail=null,lc=null,dirMarker=null;
let followZoom=null; // fixed zoom level at start of following, prevents jitter from getZoom() during animation
let locHistory=[]; // GPS points for direction trail (distance-based trimming, see trimTrail)
const TRAIL_MODE="distance"; // 'distance' of 'full'
const TRAIL_METERS=200;
const FOLLOW_RESUME_DELAY=5000; // ms to wait after last manual map interaction before auto-centering again
let lastUserInteraction=0; // timestamp of last manual pan/zoom
let programmaticMove=false; // flag to distinguish our own setView calls from user interaction

function haversineMeters(p1,p2){
  const R=6371000;
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLat=(p2[0]-p1[0])*Math.PI/180, dLon=(p2[1]-p1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Trim the trail: with 'full' everything is kept (whole ride, even after 50km), with 'distance'
// only the points within the last TRAIL_METERS meters (measured along the path) are kept.
function trimTrail(history){
  if(TRAIL_MODE==='full' || history.length<2) return history;
  let acc=0;
  let cutIdx=0;
  for(let i=history.length-1;i>0;i--){
    acc+=haversineMeters(history[i-1],history[i]);
    if(acc>=TRAIL_METERS){ cutIdx=i-1; break; }
    cutIdx=0;
  }
  return history.slice(cutIdx);
}

function bearing(p1,p2){
  // peiling in graden van p1 naar p2 (0=noord)
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// Pointed triangle as SVG: rotation center exactly at the center of the shape, no skewed rendering
function makeDirIcon(deg){
  return L.divIcon({
    className:'',
    html:'<svg width="46" height="46" viewBox="0 0 46 46" style="transform:rotate('+deg+'deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">'
        +'<polygon points="23,2 31,39 23,29 15,39" fill="'+TRAIL_COLOR+'" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>'
        +'</svg>',
    iconSize:[46,46],
    iconAnchor:[23,23]
  });
}

function stopLoc(){
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  locBtn.classList.remove('on');locBtn.innerHTML='&#9737;';
  if(locTrail){map.removeLayer(locTrail);locTrail=null;}
  if(lc){map.removeLayer(lc);lc=null;}
  if(dirMarker){map.removeLayer(dirMarker);dirMarker=null;}
  followZoom=null;
  locHistory=[];
}

// Detect manual map interaction (drag/zoom by user) to temporarily pause auto-centering
map.on('dragstart zoomstart',function(){
  if(!programmaticMove) lastUserInteraction=Date.now();
});

locBtn.onclick=function(){
  if(wid!==null){stopLoc();return;}
  if(!navigator.geolocation){alert('GPS is not available in this browser.');return;}
  locBtn.innerHTML='&#8987;';

  wid=navigator.geolocation.watchPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    locBtn.classList.add('on');locBtn.innerHTML='&#9737;';

    // update trail: with 'distance' only keep last X meters, with 'full' keep everything
    locHistory.push(ll);
    locHistory=trimTrail(locHistory);

    // determine bearing: use GPS heading if available, otherwise compute from trail
    let deg=0;
    if(p.coords.heading!=null && !isNaN(p.coords.heading)){
      deg=p.coords.heading;
    } else if(locHistory.length>=2){
      deg=bearing(locHistory[0],locHistory[locHistory.length-1]);
    }

    if(locTrail){
      locTrail.setLatLngs(locHistory);
      lc.setLatLng(ll).setRadius(p.coords.accuracy);
      dirMarker.setLatLng(ll).setIcon(makeDirIcon(deg));
    } else {
      lc=L.circle(ll,{radius:p.coords.accuracy,color:TRAIL_COLOR,fillColor:TRAIL_COLOR,fillOpacity:.12,weight:1}).addTo(map);
      locTrail=L.polyline(locHistory,{color:TRAIL_COLOR,weight:TRAIL_WIDTH,opacity:.85,lineCap:'round'}).addTo(map);
      dirMarker=L.marker(ll,{icon:makeDirIcon(deg),interactive:false,zIndexOffset:500}).addTo(map).bindPopup('Your location');
    }

    const idleLongEnough=(Date.now()-lastUserInteraction)>=FOLLOW_RESUME_DELAY;

    if(OPT_FOLLOW && idleLongEnough){
      // lock zoom level once at start of following, don't re-query during animation
      if(followZoom===null) followZoom=Math.max(map.getZoom(),16);
      programmaticMove=true;
      map.setView(ll, followZoom, {animate:false});
      programmaticMove=false;
    } else if(!dirMarker._shown){
      programmaticMove=true;
      map.setView(ll, Math.max(map.getZoom(),16));
      programmaticMove=false;
      dirMarker._shown=true;
    }
  },function(e){
    stopLoc();
    alert('Location unavailable: '+e.message);
  },{enableHighAccuracy:true,maximumAge:1000});
};

  gpxVisible=!gpxVisible;
  trackLayers.forEach(l=>{
    if(gpxVisible)map.addLayer(l);else map.removeLayer(l);
  });
  labelLayers.forEach(l=>{
    if(gpxVisible){map.addLayer(l);}else map.removeLayer(l);
  });
  if(gpxVisible)updateLabels();
  visBtn.style.opacity=gpxVisible?'1':'0.5';
};

// =====================================================================
// User route loader: load GPX / GeoJSON and display on map
// =====================================================================
(function(){
  const USER_COLORS=['#e74c3c','#8e44ad','#16a085','#d35400','#2471a3','#1e8449','#b7950b','#717d7e'];
  let userRoutes=[]; // {name, visible, opacity, color, lineWidth, showArrows, showLabel, layers:[], bounds}
  let colorIdx=0;

  function parseUserGPX(text){
    try{
      const doc=new DOMParser().parseFromString(text,'application/xml');
      const tracks=[];const wpts=[];
      doc.querySelectorAll('trk,rte').forEach(el=>{
        const pts=[];
        el.querySelectorAll('trkpt,rtept').forEach(pt=>{
          const la=parseFloat(pt.getAttribute('lat')),lo=parseFloat(pt.getAttribute('lon'));
          if(!isNaN(la)&&!isNaN(lo))pts.push([la,lo]);
        });
        if(pts.length)tracks.push({name:el.querySelector('name')?.textContent||'',coords:pts});
      });
      doc.querySelectorAll('wpt').forEach(w=>{
        const la=parseFloat(w.getAttribute('lat')),lo=parseFloat(w.getAttribute('lon'));
        if(!isNaN(la)&&!isNaN(lo))wpts.push({lat:la,lon:lo,name:w.querySelector('name')?.textContent||'',desc:w.querySelector('desc')?.textContent||''});
      });
      return{tracks,waypoints:wpts};
    }catch(e){return null;}
  }

  function parseUserGeoJSON(text){
    try{
      const gj=JSON.parse(text);
      const tracks=[];const waypoints=[];const polygons=[];
      function handleGeom(geom,props){
        if(!geom)return;
        const name=(props&&(props.name||props.title||props.Name||props.NAME))||'';
        const desc=(props&&(props.desc||props.description||props.Description))||'';
        if(geom.type==='LineString'){
          const c=geom.coordinates.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
          if(c.length)tracks.push({name,coords:c});
        } else if(geom.type==='MultiLineString'){
          geom.coordinates.forEach(line=>{
            const c=line.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
            if(c.length)tracks.push({name,coords:c});
          });
        } else if(geom.type==='Polygon'){
          const rings=geom.coordinates.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
          if(rings.length)polygons.push({name,desc,rings});
        } else if(geom.type==='MultiPolygon'){
          geom.coordinates.forEach(poly=>{
            const rings=poly.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
            if(rings.length)polygons.push({name,desc,rings});
          });
        } else if(geom.type==='Polygon'){
          // treat polygon rings as closed line tracks so they render on the preview map
          const coords=geom.coordinates[0].map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
          if(coords.length)tracks.push({name,coords});
        } else if(geom.type==='MultiPolygon'){
          geom.coordinates.forEach(poly=>{
            const coords=poly[0].map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
            if(coords.length)tracks.push({name,coords});
          });
        } else if(geom.type==='Point'){
          const c=geom.coordinates;
          if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});
        } else if(geom.type==='MultiPoint'){
          geom.coordinates.forEach(c=>{if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});});
        } else if(geom.type==='GeometryCollection'){
          geom.geometries.forEach(g=>handleGeom(g,props));
        }
      }
      const features=(gj.type==='FeatureCollection')?gj.features:(gj.type==='Feature')?[gj]:[{type:'Feature',geometry:gj,properties:{}}];
      features.forEach(ft=>{if(ft&&ft.geometry)handleGeom(ft.geometry,ft.properties||{});});
      return{tracks,waypoints,polygons};
    }catch(e){return null;}
  }

  function buildArrowDecorator(coords, color){
    // Direction arrows every ~3km along the line
    const arrows=[];
    let dist=0, nextArrow=1500;
    function hvDist(a,b){
      const R=6371000, lat1=a[0]*Math.PI/180, lat2=b[0]*Math.PI/180;
      const dLat=(b[0]-a[0])*Math.PI/180, dLon=(b[1]-a[1])*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    function brng(a,b){
      const lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      return(Math.atan2(Math.sin(dLon)*Math.cos(lat2),Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon))*180/Math.PI+360)%360;
    }
    for(let i=0;i<coords.length-1;i++){
      const seg=hvDist(coords[i],coords[i+1]);
      while(dist+seg>=nextArrow){
        const t=(nextArrow-dist)/seg;
        const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
        const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
        const deg=brng(coords[i],coords[i+1]);
        const svg='<svg width="18" height="18" viewBox="0 0 18 18" style="transform:rotate('+deg+'deg)"><polygon points="9,1 14,16 9,11 4,16" fill="'+color+'" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/></svg>';
        arrows.push(L.marker([lat,lon],{icon:L.divIcon({className:'',html:svg,iconSize:[18,18],iconAnchor:[9,9]}),interactive:false,zIndexOffset:100}));
        nextArrow+=3000;
      }
      dist+=seg;
    }
    return arrows;
  }

  function addUserRoute(name, parsed, color){
    const lyrGroup=[];
    const allCoords=[];
    parsed.tracks.forEach(t=>{
      allCoords.push(...t.coords);
      const poly=L.polyline(t.coords,{color,weight:4,opacity:0.85}).addTo(map);
      if(t.name)poly.bindPopup('<b>'+t.name+'</b>');
      poly._isLine=true;
      lyrGroup.push(poly);
    });
    (parsed.polygons||[]).forEach(p=>{
      allCoords.push(...p.rings[0]);
      const poly=L.polygon(p.rings,{color,fillColor:color,fillOpacity:0.2,weight:2,opacity:0.85}).addTo(map);
      if(p.name||p.desc)poly.bindPopup('<b>'+(p.name||'')+'</b>'+(p.desc?'<br>'+p.desc:''));
      lyrGroup.push(poly);
    });
    parsed.waypoints.forEach(w=>{
      allCoords.push([w.lat,w.lon]);
      const m=L.circleMarker([w.lat,w.lon],{radius:6,color,fillColor:color,fillOpacity:.85,weight:2}).addTo(map);
      if(w.name||w.desc)m.bindPopup('<b>'+(w.name||'')+'</b>'+(w.desc?'<br>'+w.desc:''));
      lyrGroup.push(m);
    });
    const lats=allCoords.map(p=>p[0]),lons=allCoords.map(p=>p[1]);
    const bounds=allCoords.length?[[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]]:null;
    userRoutes.push({name,visible:true,opacity:0.85,color,lineWidth:4,showArrows:false,showLabel:true,layers:lyrGroup,arrowLayers:[],bounds,parsed});
    if(bounds)map.fitBounds(bounds,{padding:[24,24]});
    renderRouteList();
  }

  function applyRouteStyle(idx){
    const r=userRoutes[idx];
    // remove old arrows
    r.arrowLayers.forEach(l=>map.removeLayer(l));
    r.arrowLayers=[];
    r.layers.forEach(l=>{
      if(l.setStyle){
        l.setStyle({color:r.color,fillColor:r.color,weight:r.lineWidth,opacity:r.opacity,fillOpacity:r.opacity*0.25});
      }
    });
    if(r.showArrows){
      (r.parsed.tracks||[]).forEach(t=>{
        buildArrowDecorator(t.coords,r.color).forEach(a=>{
          if(r.visible)a.addTo(map);
          r.arrowLayers.push(a);
        });
      });
    }
    // label
    if(r.labelLayer){map.removeLayer(r.labelLayer);r.labelLayer=null;}
    if(r.showLabel&&r.bounds){
      const center=[(r.bounds[0][0]+r.bounds[1][0])/2,(r.bounds[0][1]+r.bounds[1][1])/2];
      r.labelLayer=L.marker(center,{icon:L.divIcon({
        className:'',
        html:'<div style="color:'+r.color+';font-size:13px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-1.5px -1.5px 0 #fff,1.5px -1.5px 0 #fff,-1.5px 1.5px 0 #fff,1.5px 1.5px 0 #fff;transform:translate(-50%,-50%)">'+r.name+'</div>',
        iconAnchor:[0,0]
      }),interactive:false,zIndexOffset:200});
      if(r.visible)r.labelLayer.addTo(map);
    }
  }

  function setRouteOpacity(idx,op){
    userRoutes[idx].opacity=op;
    userRoutes[idx].layers.forEach(l=>{
      if(l.setStyle)l.setStyle({opacity:op,fillOpacity:op*0.25});
    });
    userRoutes[idx].arrowLayers.forEach(a=>{a.setOpacity&&a.setOpacity(op);});
  }

  function setRouteColor(idx,color){
    userRoutes[idx].color=color;
    applyRouteStyle(idx);
  }

  function setRouteVisible(idx,vis){
    userRoutes[idx].visible=vis;
    userRoutes[idx].layers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    userRoutes[idx].arrowLayers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    if(userRoutes[idx].labelLayer){if(vis)map.addLayer(userRoutes[idx].labelLayer);else map.removeLayer(userRoutes[idx].labelLayer);}
  }

  function removeUserRoute(idx){
    userRoutes[idx].layers.forEach(l=>map.removeLayer(l));
    userRoutes[idx].arrowLayers.forEach(l=>map.removeLayer(l));
    if(userRoutes[idx].labelLayer)map.removeLayer(userRoutes[idx].labelLayer);
    userRoutes.splice(idx,1);
    renderRouteList();
  }

  function renderRouteList(){
    const el=document.getElementById('route-list');
    el.innerHTML='';
    userRoutes.forEach((r,i)=>{
      const row=document.createElement('div');
      row.className='user-route-row';
      row.innerHTML=
        '<input type="color" class="ur-color" value="'+r.color+'" title="Color">'+
        '<span class="route-name" title="'+r.name+'">'+r.name+'</span>'+
        '<button class="route-fly" title="Fit to route" data-i="'+i+'">&#x2316;</button>'+
        '<button class="route-vis" title="Show/hide" data-i="'+i+'" style="opacity:'+(r.visible?1:.4)+'">&#128065;</button>'+
        '<button class="route-del" title="Remove" data-i="'+i+'">&times;</button>';
      el.appendChild(row);

      // options row: opacity + linewidth + arrows + label
      const opRow=document.createElement('div');
      opRow.className='route-options-row';
      const opVal=Math.round(r.opacity*100);
      opRow.innerHTML=
        '<span class="ro-label">Opacity</span>'+
        '<input type="range" min="0" max="100" value="'+opVal+'" class="ur-op">'+
        '<span class="ro-val">'+opVal+'%</span>'+
        '<span class="ro-label" style="margin-left:8px">Width</span>'+
        '<input type="number" min="1" max="20" value="'+r.lineWidth+'" class="ur-lw" style="width:40px;font-size:12px;border:1px solid #ccc;border-radius:3px;padding:1px 3px">'+
        '<span class="ro-label">px</span>'+
        '<label style="display:flex;align-items:center;gap:3px;margin-left:6px;font-size:12px;cursor:pointer"><input type="checkbox" class="ur-arrows" '+(r.showArrows?'checked':'')+'> &#10148;</label>'+
        '<label style="display:flex;align-items:center;gap:3px;margin-left:4px;font-size:12px;cursor:pointer"><input type="checkbox" class="ur-label" '+(r.showLabel?'checked':'')+'> label</label>';
      el.appendChild(opRow);

      row.querySelector('.ur-color').addEventListener('input',e=>{userRoutes[i].color=e.target.value;applyRouteStyle(i);});
      row.querySelector('.route-fly').addEventListener('click',()=>{if(userRoutes[i].bounds)map.fitBounds(userRoutes[i].bounds,{padding:[24,24]});});
      row.querySelector('.route-vis').addEventListener('click',e=>{
        const nv=!userRoutes[i].visible;setRouteVisible(i,nv);e.currentTarget.style.opacity=nv?'1':'0.4';
      });
      row.querySelector('.route-del').addEventListener('click',()=>removeUserRoute(i));
      opRow.querySelector('.ur-op').addEventListener('input',e=>{
        const op=parseInt(e.target.value)/100;
        setRouteOpacity(i,op);
        opRow.querySelector('.ro-val').textContent=e.target.value+'%';
      });
      opRow.querySelector('.ur-lw').addEventListener('change',e=>{
        userRoutes[i].lineWidth=Math.max(1,parseInt(e.target.value)||4);
        applyRouteStyle(i);
      });
      opRow.querySelector('.ur-arrows').addEventListener('change',e=>{
        userRoutes[i].showArrows=e.target.checked;
        applyRouteStyle(i);
      });
      opRow.querySelector('.ur-label').addEventListener('change',e=>{
        userRoutes[i].showLabel=e.target.checked;
        applyRouteStyle(i);
      });
    });
    document.getElementById('route-btn').classList.toggle('has-routes',userRoutes.length>0);
  }

  function loadFile(file, accept){
    if(!file)return;
    const nameLow=file.name.toLowerCase();
    const isGpx=nameLow.endsWith('.gpx');
    const isGj=nameLow.endsWith('.geojson')||nameLow.endsWith('.json');
    if(!isGpx&&!isGj){alert('Please choose a .gpx or .geojson file.');return;}
    if(accept==='gpx'&&!isGpx){alert('Please choose a .gpx file.');return;}
    if(accept==='geojson'&&!isGj){alert('Please choose a .geojson or .json file.');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=isGpx?parseUserGPX(ev.target.result):parseUserGeoJSON(ev.target.result);
      const hasContent=parsed&&(parsed.tracks.length||parsed.waypoints.length||(parsed.polygons&&parsed.polygons.length));
      if(!hasContent){alert('No features found in this file.');return;}
      const color=USER_COLORS[colorIdx%USER_COLORS.length];colorIdx++;
      addUserRoute(file.name.replace(/.(gpx|geojson|json)$/i,''),parsed,color);
    };
    reader.readAsText(file);
  }

  // Panel open/close
  const routeBtn=document.getElementById('route-btn');
  const routePanel=document.getElementById('route-panel');
  routeBtn.onclick=function(e){e.stopPropagation();routePanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    if(!document.getElementById('route-overlay').contains(e.target))routePanel.classList.remove('open');
  });

  // GPX / GeoJSON buttons
  const fileInput=document.getElementById('route-file-input');
  let pendingAccept='any';
  document.getElementById('route-add-gpx').onclick=function(){pendingAccept='gpx';fileInput.accept='.gpx';fileInput.value='';fileInput.click();};
  document.getElementById('route-add-geojson').onclick=function(){pendingAccept='geojson';fileInput.accept='.geojson,.json';fileInput.value='';fileInput.click();};
  fileInput.onchange=function(){if(fileInput.files[0])loadFile(fileInput.files[0],pendingAccept);};

  // Drag & drop on map
  const mapEl=document.getElementById('map');
  mapEl.addEventListener('dragover',e=>{e.preventDefault();mapEl.style.outline='3px dashed #2980b9';});
  mapEl.addEventListener('dragleave',()=>{mapEl.style.outline='';});
  mapEl.addEventListener('drop',e=>{
    e.preventDefault();mapEl.style.outline='';
    Array.from(e.dataTransfer.files).forEach(f=>loadFile(f,'any'));
  });
})();
</script>
