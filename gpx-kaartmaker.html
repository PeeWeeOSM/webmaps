<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPX kaartmaker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0f0;color:#1a1a1a;min-height:100vh;padding:1.5rem}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1e;color:#eee}
  .card{background:#2c2c2e;border-color:#3a3a3c}
  input[type=text]{background:#3a3a3c;color:#eee;border-color:#555}
  .file-row{background:#3a3a3c}
  .dropzone{border-color:#555;color:#aaa}
  .btn{background:#2c2c2e;color:#eee;border-color:#555}
  .btn:hover{background:#3a3a3c}
  label{color:#aaa}
  .range-val{color:#aaa}
  .section-label{color:#777}
  .empty-map{border-color:#444;color:#666}
}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
@media(prefers-color-scheme:dark){.sub{color:#aaa}}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.dropzone{border:2px dashed #bbb;border-radius:8px;padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:background 0.15s;color:#888;font-size:14px}
.dropzone:hover,.dropzone.over{background:#e8f4ff;border-color:#4363d8}
.dropzone i{font-size:32px;display:block;margin-bottom:10px;color:#bbb}
#file-list{margin-top:1rem;display:flex;flex-direction:column;gap:8px}
.file-row{display:flex;align-items:center;gap:8px;font-size:13px;background:#f5f5f5;border-radius:8px;padding:8px 12px}
.file-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.nameinput{flex:1;font-size:13px;font-weight:500;padding:4px 7px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;min-width:0;outline:none}
.nameinput:focus{border-color:#4363d8}
@media(prefers-color-scheme:dark){.nameinput{background:#2c2c2e;color:#eee;border-color:#555}}
.posselect{font-size:12px;padding:3px 5px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;cursor:pointer;flex-shrink:0}
@media(prefers-color-scheme:dark){.posselect{background:#2c2c2e;color:#eee;border-color:#555}}
.zoominput{width:36px;font-size:12px;padding:3px 4px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;text-align:center;flex-shrink:0}
@media(prefers-color-scheme:dark){.zoominput{background:#2c2c2e;color:#eee;border-color:#555}}
.layer-row{display:flex;flex-direction:column;gap:6px;background:#f5f5f5;border-radius:8px;padding:10px 12px}
@media(prefers-color-scheme:dark){.layer-row{background:#3a3a3c}}
.layer-row-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.layer-url{flex:1;font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;min-width:0;font-family:monospace}
.layer-url:focus{border-color:#4363d8;outline:none}
@media(prefers-color-scheme:dark){.layer-url{background:#2c2c2e;color:#eee;border-color:#555}}
.layer-name{width:90px;font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;flex-shrink:0}
@media(prefers-color-scheme:dark){.layer-name{background:#2c2c2e;color:#eee;border-color:#555}}
.layer-displayname{flex:1;font-size:13px;font-weight:500;padding:4px 8px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;min-width:0}
@media(prefers-color-scheme:dark){.layer-displayname{background:#2c2c2e;color:#eee;border-color:#555}}
.type-select{font-size:12px;padding:3px 6px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#1a1a1a;cursor:pointer;flex-shrink:0}
@media(prefers-color-scheme:dark){.type-select{background:#2c2c2e;color:#eee;border-color:#555}}
.file-pts{color:#888;font-size:12px;white-space:nowrap}
.file-row .delbtn{background:none;border:none;cursor:pointer;color:#aaa;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0}
.file-row .delbtn:hover{color:#e74c3c}
input[type=color]{width:34px;height:28px;border:1px solid #ddd;border-radius:4px;padding:2px;cursor:pointer;background:none;flex-shrink:0}
label{font-size:13px;color:#666;display:block;margin-bottom:4px}
input[type=text]{font-size:14px;padding:7px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;width:100%;outline:none}
input[type=text]:focus{border-color:#4363d8}
.row{display:flex;gap:10px;align-items:center}
input[type=range]{flex:1}
.range-val{font-size:13px;color:#666;min-width:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;font-family:inherit}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C;border-color:#0C447C}
.btn:disabled{opacity:0.4;cursor:not-allowed}
#preview-wrap{border-radius:8px;overflow:hidden;border:1px solid #ddd;height:340px;display:none}
#map{height:340px}
.empty-map{height:200px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:13px;border:1px dashed #ddd;border-radius:8px}
.section-label{font-size:11px;font-weight:600;color:#999;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.actions{display:flex;gap:10px;flex-wrap:wrap}
/* toggle switch */
.toggle{position:relative;display:inline-block;width:34px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.2s}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
input:checked+.slider{background:#185FA5}
input:checked+.slider:before{transform:translateX(14px)}
.toggle-label{font-size:12px;color:#888;white-space:nowrap}
</style>
</head>
<body>
<h1>GPX kaartmaker</h1>
<p class="sub">Sleep GPX-bestanden hierop, stel kleuren in, en download een kaartpagina om door te sturen.</p>

<div class="card">
  <div class="section-label">Bestanden</div>
  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileinput').click()">
    <i class="ti ti-map-2" aria-hidden="true"></i>
    Sleep GPX-bestanden hierheen, of klik om te bladeren
  </div>
  <input type="file" id="fileinput" accept=".gpx" multiple style="display:none" onchange="handleFiles(this.files)">
  <div id="file-list"></div>
</div>

<div class="card">
  <div class="section-label">Instellingen</div>
  <div style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label for="title">Paginatitel</label>
      <input type="text" id="title" placeholder="Mijn rit">
    </div>
    <div>
      <label>Lijndikte track</label>
      <div class="row">
        <input type="range" min="1" max="8" value="3" step="1" id="linewidth" oninput="document.getElementById('lwval').textContent=this.value;updatePreview()">
        <span class="range-val" id="lwval">3</span>
        <span class="range-val" style="color:#aaa">px</span>
      </div>
    </div>
    <div>
      <label>Navigatie-opties (in geëxporteerde kaart)</label>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:inherit;margin-bottom:0">
          <input type="checkbox" id="opt-follow"> Kaart volgt eigen locatie automatisch
        </label>
      </div>
    </div>
    <div>
      <label>Waypointlabels tonen vanaf zoom <span style="color:#aaa;font-weight:400">(werkt alleen bij GPX'en waar "label" aan staat)</span></label>
      <div class="row">
        <input type="range" min="8" max="19" value="15" step="1" id="wptzoom" oninput="document.getElementById('wptzoomval').textContent=this.value;updatePreview()">
        <span class="range-val" id="wptzoomval">15</span>
      </div>
    </div>

<div class="card">
  <div class="section-label">Extra kaartlagen</div>
  <div id="layer-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px"></div>
  <button class="btn" onclick="addLayer()" style="font-size:13px;padding:6px 12px">
    <i class="ti ti-plus" aria-hidden="true"></i> Laag toevoegen
  </button>
</div>

<div class="card">
  <div class="section-label">Voorvertoning</div>
  <div id="preview-empty" class="empty-map">Voeg GPX-bestanden toe om een voorvertoning te zien</div>
  <div id="preview-wrap" style="position:relative">
    <div id="map"></div>
    <div id="preview-zoom-indicator" style="position:absolute;top:10px;right:10px;z-index:1000;background:white;border:1px solid #ccc;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.3);padding:5px 9px;font-size:12px;font-weight:600;color:#222;pointer-events:none">z–</div>
  </div>
</div>

<div class="actions">
  <button class="btn primary" id="exportbtn" onclick="exportMap()">
    <i class="ti ti-download" aria-hidden="true"></i> Kaart downloaden
  </button>
  <button class="btn" onclick="clearAll()">
    <i class="ti ti-trash" aria-hidden="true"></i> Alles wissen
  </button>
</div>

<script>
const COLORS=["#e6194b","#3cb44b","#4363d8","#f58231","#911eb4","#42d4f4","#c07000","#888888","#a9a9a9","#000075"];
let files=[];
let map=null;
let layers=[];
let extraLayers=[];       // {type:'xyz'|'wms', url, wmsLayer, opacity, leafletLayer}
let previewExtraLayers=[];

function addLayer(preset){
  const idx=extraLayers.length;
  extraLayers.push(preset||{type:'xyz',url:'',wmsLayer:'',displayName:'Laag '+(idx+1),opacity:0.8,zoomMin:1,zoomMax:22});
  renderLayerList();
  updatePreview();
}

function removeLayer(i){
  extraLayers.splice(i,1);
  renderLayerList();
  updatePreview();
}

function renderLayerList(){
  const el=document.getElementById('layer-list');
  el.innerHTML='';
  extraLayers.forEach((l,i)=>{
    const row=document.createElement('div');
    row.className='layer-row';
    row.innerHTML=`
      <div class="layer-row-top">
        <select class="type-select" data-idx="${i}">
          <option value="xyz" ${l.type==='xyz'?'selected':''}>XYZ/WMTS</option>
          <option value="wms" ${l.type==='wms'?'selected':''}>WMS</option>
        </select>
        <input class="layer-displayname" type="text" placeholder="Laag ${i+1}" value="${(l.displayName||'').replace(/"/g,'&quot;')}" data-idx="${i}" title="Naam zoals getoond in het lagenmenu">
        <button class="delbtn" data-idx="${i}" title="Verwijderen" style="font-size:18px">&times;</button>
      </div>
      <div class="layer-row-top">
        <input class="layer-url" type="text" placeholder="${l.type==='wms'?'WMS URL (zonder parameters)':'XYZ/WMTS URL met {z}/{x}/{y}'}" value="${l.url.replace(/"/g,'&quot;')}" data-idx="${i}">
        ${l.type==='wms'?`<input class="layer-name" type="text" placeholder="WMS laagnaam (LAYERS=...)" value="${l.wmsLayer.replace(/"/g,'&quot;')}" data-idx="${i}" title="Technische WMS laagnaam">`:``}
      </div>
      <div class="row" style="gap:8px">
        <span class="toggle-label" style="color:#aaa">Doorzichtigheid</span>
        <input type="range" min="0" max="1" step="0.05" value="${l.opacity}" data-idx="${i}" class="opacity-slider" style="flex:1">
        <span class="range-val layer-opval">${Math.round(l.opacity*100)}%</span>
      </div>
      <div class="row" style="gap:6px">
        <span class="toggle-label" style="color:#aaa">Zoom</span>
        <input type="number" value="${l.zoomMin!=null?l.zoomMin:1}" min="0" max="22" data-idx="${i}" class="zoominput layer-zoommin" title="Zoomniveau van">
        <span class="toggle-label" style="color:#aaa">t/m</span>
        <input type="number" value="${l.zoomMax!=null?l.zoomMax:22}" min="0" max="22" data-idx="${i}" class="zoominput layer-zoommax" title="Zoomniveau t/m">
      </div>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.type-select').forEach(s=>{
    s.addEventListener('change',e=>{extraLayers[parseInt(e.target.dataset.idx)].type=e.target.value;renderLayerList();updatePreview();});
  });
  el.querySelectorAll('.layer-displayname').forEach(inp=>{
    inp.addEventListener('input',e=>{extraLayers[parseInt(e.target.dataset.idx)].displayName=e.target.value;updatePreview();});
  });
  el.querySelectorAll('.layer-url').forEach(inp=>{
    inp.addEventListener('input',e=>{extraLayers[parseInt(e.target.dataset.idx)].url=e.target.value;updatePreview();});
  });
  el.querySelectorAll('.layer-name').forEach(inp=>{
    inp.addEventListener('input',e=>{extraLayers[parseInt(e.target.dataset.idx)].wmsLayer=e.target.value;updatePreview();});
  });
  el.querySelectorAll('.opacity-slider').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const i=parseInt(e.target.dataset.idx);
      extraLayers[i].opacity=parseFloat(e.target.value);
      e.target.closest('.layer-row').querySelector('.layer-opval').textContent=Math.round(extraLayers[i].opacity*100)+'%';
      // update live without full redraw
      if(previewExtraLayers[i])previewExtraLayers[i].setOpacity(extraLayers[i].opacity);
    });
  });
  el.querySelectorAll('.layer-zoommin').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      extraLayers[i].zoomMin=parseInt(e.target.value)||0;
      if(extraLayers[i].zoomMin>extraLayers[i].zoomMax)extraLayers[i].zoomMax=extraLayers[i].zoomMin;
      updatePreview();renderLayerList();
    });
  });
  el.querySelectorAll('.layer-zoommax').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      extraLayers[i].zoomMax=parseInt(e.target.value)||22;
      if(extraLayers[i].zoomMax<extraLayers[i].zoomMin)extraLayers[i].zoomMin=extraLayers[i].zoomMax;
      updatePreview();renderLayerList();
    });
  });
  el.querySelectorAll('.delbtn').forEach(btn=>{
    btn.addEventListener('click',e=>removeLayer(parseInt(e.target.dataset.idx)));
  });
}

const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');handleFiles(e.dataTransfer.files)});

function handleFiles(fl){
  Array.from(fl).forEach(f=>{
    if(!f.name.toLowerCase().endsWith('.gpx'))return;
    if(files.find(x=>x.name===f.name))return;
    const color=COLORS[files.length%COLORS.length];
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=parseGPX(ev.target.result);
      if(!parsed)return;
      files.push({name:f.name, displayName:f.name.replace(/\.gpx$/i,''), color, showLabel:true, showStart:true, labelPos:'centroid', zoomMin:14, zoomMax:18, useElementName:false, ...parsed});
      renderList();
      updatePreview();
      document.getElementById('exportbtn').disabled=false;
    };
    reader.readAsText(f);
  });
}

function parseGPX(text){
  try{
    const doc=new DOMParser().parseFromString(text,'application/xml');
    const tracks=[];
    const waypoints=[];
    doc.querySelectorAll('trk,rte').forEach(el=>{
      const name=el.querySelector('name')?.textContent||'';
      const pts=[];
      el.querySelectorAll('trkpt,rtept').forEach(pt=>{
        const lat=parseFloat(pt.getAttribute('lat'));
        const lon=parseFloat(pt.getAttribute('lon'));
        if(!isNaN(lat)&&!isNaN(lon))pts.push([lat,lon]);
      });
      if(pts.length)tracks.push({name,coords:pts});
    });
    doc.querySelectorAll('wpt').forEach(wpt=>{
      const lat=parseFloat(wpt.getAttribute('lat'));
      const lon=parseFloat(wpt.getAttribute('lon'));
      if(!isNaN(lat)&&!isNaN(lon))waypoints.push({
        lat,lon,
        name:wpt.querySelector('name')?.textContent||'',
        desc:wpt.querySelector('desc')?.textContent||''
      });
    });
    const npts=tracks.reduce((s,t)=>s+t.coords.length,0)+waypoints.length;
    return{tracks,waypoints,npts};
  }catch(e){return null;}
}

function renderList(){
  const el=document.getElementById('file-list');
  el.innerHTML='';
  files.forEach((f,i)=>{
    const row=document.createElement('div');
    row.className='file-row';
    row.innerHTML=`
      <input type="color" value="${f.color}" title="Kleur" data-idx="${i}" class="colorpick">
      <input type="text" value="${f.displayName.replace(/"/g,'&quot;')}" title="Naam op kaart" data-idx="${i}" class="nameinput" placeholder="Naam">
      <label class="toggle" title="Naam tonen op kaart">
        <input type="checkbox" ${f.showLabel?'checked':''} data-idx="${i}" class="labeltog">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">label</span>
      <select data-idx="${i}" class="posselect" title="Positie van het label">
        <option value="centroid" ${f.labelPos==='centroid'?'selected':''}>centroid</option>
        <option value="start" ${f.labelPos==='start'?'selected':''}>startpunt</option>
        <option value="midline" ${f.labelPos==='midline'?'selected':''}>op lijn</option>
      </select>
      <label class="toggle" title="Beginpunt tonen op kaart">
        <input type="checkbox" ${f.showStart?'checked':''} data-idx="${i}" class="starttog">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">start</span>
      <label class="toggle" title="Eigen <name> van elk track/waypoint tonen i.p.v. bestandsnaam">
        <input type="checkbox" ${f.useElementName?'checked':''} data-idx="${i}" class="elnametog">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">name label</span>
      <span class="toggle-label" style="color:#aaa;margin-left:4px">zoom</span>
      <input type="number" value="${f.zoomMin}" min="1" max="19" data-idx="${i}" class="zoominput zoommin" title="Zoomniveau van">
      <span class="toggle-label" style="color:#aaa">–</span>
      <input type="number" value="${f.zoomMax}" min="1" max="19" data-idx="${i}" class="zoominput zoommax" title="Zoomniveau t/m">
      <span class="file-pts">${f.tracks.length}t &middot; ${f.npts}pt</span>
      <button class="delbtn" data-idx="${i}" title="Verwijderen">&times;</button>`;
    el.appendChild(row);
  });
  el.querySelectorAll('.nameinput').forEach(inp=>{
    inp.addEventListener('input',e=>{
      files[parseInt(e.target.dataset.idx)].displayName=e.target.value;
      updatePreview();
    });
  });
  el.querySelectorAll('.colorpick').forEach(inp=>{
    inp.addEventListener('input',e=>{
      files[parseInt(e.target.dataset.idx)].color=e.target.value;
      updatePreview();
    });
  });
  el.querySelectorAll('.labeltog').forEach(inp=>{
    inp.addEventListener('change',e=>{
      files[parseInt(e.target.dataset.idx)].showLabel=e.target.checked;
      updatePreview();
    });
  });
  el.querySelectorAll('.posselect').forEach(sel=>{
    sel.addEventListener('change',e=>{
      files[parseInt(e.target.dataset.idx)].labelPos=e.target.value;
      updatePreview();
    });
  });
  el.querySelectorAll('.starttog').forEach(inp=>{
    inp.addEventListener('change',e=>{
      files[parseInt(e.target.dataset.idx)].showStart=e.target.checked;
      updatePreview();
    });
  });
  el.querySelectorAll('.elnametog').forEach(inp=>{
    inp.addEventListener('change',e=>{
      files[parseInt(e.target.dataset.idx)].useElementName=e.target.checked;
      updatePreview();
    });
  });
  el.querySelectorAll('.zoommin').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      files[i].zoomMin=parseInt(e.target.value)||1;
      if(files[i].zoomMin>files[i].zoomMax)files[i].zoomMax=files[i].zoomMin;
      updatePreview();renderList();
    });
  });
  el.querySelectorAll('.zoommax').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      files[i].zoomMax=parseInt(e.target.value)||19;
      if(files[i].zoomMax<files[i].zoomMin)files[i].zoomMin=files[i].zoomMax;
      updatePreview();renderList();
    });
  });
  el.querySelectorAll('.delbtn').forEach(btn=>{
    btn.addEventListener('click',e=>removeFile(parseInt(e.target.dataset.idx)));
  });
}

function removeFile(i){
  files.splice(i,1);
  renderList();
  updatePreview();
}

function clearAll(){
  files=[];renderList();updatePreview();
}

// centroid of all coords in a track for label placement
function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

// contrasterende halo kleur (wit of zwart op basis van lijnkleur)
function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

// bepaal labeltekst: eigen <name> indien gewenst en aanwezig, anders bestandsnaam
function getLabelText(f, elementName){
  if(f.useElementName && elementName && elementName.trim()) return elementName.trim();
  return f.displayName;
}

function updatePreview(){
  const empty=document.getElementById('preview-empty');
  const wrap=document.getElementById('preview-wrap');
  const hasLayers=extraLayers.some(l=>l.url.trim());
  if(!files.length && !hasLayers){
    empty.style.display='flex';wrap.style.display='none';
    if(map){map.remove();map=null;}layers=[];return;
  }
  empty.style.display='none';wrap.style.display='block';
  if(!map){
    map=L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
    map.on('zoomend',updateLabelVisibility);
    const pzEl=document.getElementById('preview-zoom-indicator');
    map.on('zoomend',()=>{pzEl.textContent='z'+map.getZoom();});
    map.whenReady(()=>{pzEl.textContent='z'+map.getZoom();});
  }
  // verwijder oude extra lagen
  previewExtraLayers.forEach(l=>{if(l&&map.hasLayer(l))map.removeLayer(l);});
  previewExtraLayers=[];
  // voeg extra lagen toe (onder GPX tracks)
  extraLayers.forEach(el=>{
    if(!el.url.trim())return;
    try{
      let tl;
      const zMin=el.zoomMin!=null?el.zoomMin:0;
      const zMax=el.zoomMax!=null?el.zoomMax:22;
      if(el.type==='wms'){
        tl=L.tileLayer.wms(el.url,{layers:el.wmsLayer,format:'image/png',transparent:true,opacity:el.opacity,attribution:'',minZoom:zMin,maxZoom:zMax});
      } else {
        tl=L.tileLayer(el.url,{opacity:el.opacity,attribution:'',minZoom:zMin,maxZoom:zMax});
      }
      tl.addTo(map);
      previewExtraLayers.push(tl);
    }catch(e){previewExtraLayers.push(null);}
  });
  layers.forEach(l=>map.removeLayer(l));layers=[];
  const lw=parseInt(document.getElementById('linewidth').value);
  const allCoords=[];
  files.forEach(f=>{
    f.tracks.forEach(t=>{
      const poly=L.polyline(t.coords,{color:f.color,weight:lw,opacity:.9}).addTo(map);
      poly.bindPopup('<b>'+getLabelText(f,t.name)+'</b>'+(t.name?'<br>'+t.name:''));
      poly._gpxFile=f;
      layers.push(poly);allCoords.push(...t.coords);
    });
    // start marker: tonen op basis van showStart toggle
    if(f.showStart&&f.tracks.length&&f.tracks[0].coords.length){
      const startPt=f.tracks[0].coords[0];
      const startIcon=L.divIcon({
        className:'',
        html:`<div style="width:22px;height:22px;background:${f.color};border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4)"><span style="color:#fff;font-size:11px;line-height:1;margin-left:2px">&#9654;</span></div>`,
        iconSize:[22,22],
        iconAnchor:[11,11]
      });
      const startM=L.marker(startPt,{icon:startIcon,interactive:false,zIndexOffset:200}).addTo(map);
      layers.push(startM);
    }
    f.waypoints.forEach(w=>{
      const m=L.circleMarker([w.lat,w.lon],{radius:5,color:f.color,fillColor:f.color,fillOpacity:.9,weight:2}).addTo(map);
      const wLabel=getLabelText(f,w.name);
      if(w.name||w.desc)m.bindPopup('<b>'+wLabel+'</b>'+(w.desc?'<br>'+w.desc:''));
      layers.push(m);allCoords.push([w.lat,w.lon]);
      // waypointlabel: alleen als showLabel aan staat voor deze GPX
      if(f.showLabel){
        const halo=contrastHalo(f.color);
        const wptLabel=L.marker([w.lat,w.lon],{
          icon:L.divIcon({
            className:'',
            html:`<div style="color:${f.color};font-size:13px;font-weight:600;white-space:nowrap;pointer-events:none;text-shadow:-1.5px -1.5px 0 ${halo},1.5px -1.5px 0 ${halo},-1.5px 1.5px 0 ${halo},1.5px 1.5px 0 ${halo},0 1.5px 0 ${halo},0 -1.5px 0 ${halo};transform:translate(-50%,calc(-50% - 12px))">${wLabel}</div>`,
            iconAnchor:[0,0]
          }),
          interactive:false,
          zIndexOffset:150
        }).addTo(map);
        wptLabel._gpxWptLabel=true;
        wptLabel._zoomMin=parseInt(document.getElementById('wptzoom').value);
        wptLabel._zoomMax=19;
        layers.push(wptLabel);
      }
    });
    // label positie bepalen op basis van keuze
    if(f.showLabel&&f.tracks.length){
      const halo=contrastHalo(f.color);
      const mainLabel=getLabelText(f,f.tracks[0].name);
      if(f.labelPos==='midline'){
        // tekst langs de lijn via TextPath — op eerste track
        const tPoly=layers.filter(l=>l._gpxFile===f&&l.setText)[0];
        if(tPoly){
          tPoly.setText(mainLabel,{
            center:true,
            attributes:{
              'font-size':'16px',
              'font-weight':'bold',
              'fill':f.color,
              'paint-order':'stroke',
              'stroke':halo,
              'stroke-width':'3px',
              'stroke-linejoin':'round'
            }
          });
          tPoly._gpxLabel=true;
          tPoly._zoomMin=f.zoomMin;
          tPoly._zoomMax=f.zoomMax;
        }
      } else {
        const allPts=f.tracks.flatMap(t=>t.coords);
        let pos;
        if(f.labelPos==='start') pos=f.tracks[0].coords[0];
        else pos=centroid(allPts);
        const labelOffset=(f.labelPos==='start'&&f.showStart)?'transform:translate(-50%,calc(-50% - 18px))':'transform:translate(-50%,-50%)';
        const label=L.marker(pos,{
          icon:L.divIcon({
            className:'',
            html:`<div style="color:${f.color};font-size:21px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-2px -2px 0 ${halo},2px -2px 0 ${halo},-2px 2px 0 ${halo},2px 2px 0 ${halo},0 2px 0 ${halo},0 -2px 0 ${halo},2px 0 0 ${halo},-2px 0 0 ${halo};${labelOffset}">${mainLabel}</div>`,
            iconAnchor:[0,0]
          }),
          interactive:false,
          zIndexOffset:100
        }).addTo(map);
        label._gpxLabel=true;
        label._zoomMin=f.zoomMin;
        label._zoomMax=f.zoomMax;
        layers.push(label);
      }
    }
  });
  if(allCoords.length){
    const lats=allCoords.map(p=>p[0]),lons=allCoords.map(p=>p[1]);
    map.fitBounds([[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]],{padding:[20,20]});
  } else if(!map._loaded){
    map.setView([52.1,5.3],8); // Nederland, alleen als nog geen view gezet is
  }
  updateLabelVisibility();
}

function updateLabelVisibility(){
  if(!map)return;
  const zoom=map.getZoom();
  layers.forEach(l=>{
    if(!l._gpxLabel&&!l._gpxWptLabel)return;
    const zmin=l._zoomMin, zmax=l._zoomMax;
    const visible=zoom>=zmin&&zoom<=zmax;
    if(l.setText){
      // TextPath polyline: set or clear text
      if(visible){
        const f=l._gpxFile;
        const halo=contrastHalo(f.color);
        const mainLabel=getLabelText(f,f.tracks[0]&&f.tracks[0].name);
        l.setText(mainLabel,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':halo,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else {
        l.setText(null);
      }
    } else {
      const el=l.getElement();
      if(el)el.style.display=visible?'':'none';
    }
  });
}

function exportMap(){
  const title=document.getElementById('title').value.trim()||'Mijn route';
  const lw=parseInt(document.getElementById('linewidth').value);
  const optFollow=document.getElementById('opt-follow').checked;
  const wptZoom=parseInt(document.getElementById('wptzoom').value);
  const exportExtra=extraLayers.filter(l=>l.url.trim()).map((l,i)=>({type:l.type,url:l.url,wmsLayer:l.wmsLayer,displayName:(l.displayName&&l.displayName.trim())?l.displayName.trim():('Laag '+(i+1)),opacity:l.opacity,zoomMin:l.zoomMin!=null?l.zoomMin:0,zoomMax:l.zoomMax!=null?l.zoomMax:22}));
  const data=files.map(f=>({
    filename:f.displayName,
    color:f.color,
    showLabel:f.showLabel,
    showStart:f.showStart,
    labelPos:f.labelPos,
    zoomMin:f.zoomMin,
    zoomMax:f.zoomMax,
    useElementName:f.useElementName,
    tracks:f.tracks,
    waypoints:f.waypoints
  }));
  const allCoords=[];
  data.forEach(f=>{f.tracks.forEach(t=>allCoords.push(...t.coords));f.waypoints.forEach(w=>allCoords.push([w.lat,w.lon]));});
  const lats=allCoords.map(p=>p[0]),lons=allCoords.map(p=>p[1]);
  const bounds=allCoords.length?[[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]]:null;
  const safeTitle=title.replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const html=`<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${safeTitle}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1c1c1e;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:9px 14px;background:#111;display:flex;align-items:center;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
/* Controls overlay: altijd bovenop, niet meedraaien */
#controls-overlay{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;pointer-events:none}
#controls-overlay>*{pointer-events:auto}
/* Leaflet eigen zoom controls verbergen want wij tonen onze eigen */
.leaflet-control-zoom{display:none!important}
#notice{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:1001}
.ctrl-btn{width:34px;height:34px;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.ctrl-btn:hover{background:#f4f4f4}
.ctrl-btn.on{background:#d4efff;border-color:#2980b9}
.ctrl-btn.zoom{font-size:22px;font-weight:300}
.zoom-sep{height:1px;background:#ccc;margin:0 4px}
.zoom-group{background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.zoom-group .ctrl-btn{border:none;border-radius:0;box-shadow:none;width:34px;height:32px}
.zoom-group .ctrl-btn:first-child{border-bottom:1px solid #ddd}
#layers-overlay{display:none;position:absolute;top:54px;right:10px;z-index:1000}
#layers-panel{display:none;position:absolute;top:42px;right:0;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.3);padding:10px 12px;min-width:180px;max-width:240px}
#layers-panel.open{display:block}
#layers-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.layer-toggle-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#222}
#zoom-indicator{position:absolute;top:10px;right:10px;z-index:1000;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.3);padding:6px 10px;font-size:13px;font-weight:600;color:#222;pointer-events:none}

</head>
<body>
<div id="hdr"><h1>${safeTitle}</h1></div>
<div id="map-wrap">
  <div id="map"></div>
  <div id="controls-overlay">
    <div class="zoom-group">
      <button class="ctrl-btn zoom" onclick="map.zoomIn()" title="Inzoomen">+</button>
      <button class="ctrl-btn zoom" onclick="map.zoomOut()" title="Uitzoomen">&#8722;</button>
    </div>
    <button class="ctrl-btn" id="loc-btn" title="Mijn locatie">&#9737;</button>
    <button class="ctrl-btn" id="vis-btn" title="GPX tonen/verbergen">&#128065;</button>
  </div>
  <div id="zoom-indicator">z<span id="zoom-val">–</span></div>
  <div id="layers-overlay">
    <button class="ctrl-btn" id="layers-btn" title="Kaartlagen">&#9776;</button>
    <div id="layers-panel"><h3>Kaartlagen</h3><div id="layers-panel-content"></div></div>
  </div>
  <div id="notice">Achtergrondkaart niet beschikbaar (geen verbinding)</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""><\/script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.js"><\/script>
<script>
const D=${JSON.stringify(data)};
const B=${JSON.stringify(bounds)};
const LW=${lw};
const OPT_FOLLOW=${optFollow};
const WPTZOOM=${wptZoom};

function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

function getLabelText(f, elementName){
  if(f.useElementName && elementName && elementName.trim()) return elementName.trim();
  return f.filename;
}

function midpt(coords){return coords[Math.floor(coords.length/2)];}

const map=L.map('map');
const tiles=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
tiles.on('tileerror',()=>document.getElementById('notice').style.display='block');

// Extra lagen (onder GPX tracks) — elke laag bijhouden zodat we ze in het lagenpaneel kunnen tonen/verbergen
const EX=${JSON.stringify(exportExtra)};
const wmsLayerObjs=[];
EX.forEach((el,i)=>{
  let lyr=null;
  try{
    if(el.type==='wms'){
      lyr=L.tileLayer.wms(el.url,{layers:el.wmsLayer,format:'image/png',transparent:true,opacity:el.opacity,attribution:'',minZoom:el.zoomMin,maxZoom:el.zoomMax}).addTo(map);
    } else {
      lyr=L.tileLayer(el.url,{opacity:el.opacity,attribution:'',minZoom:el.zoomMin,maxZoom:el.zoomMax}).addTo(map);
    }
  }catch(e){}
  wmsLayerObjs.push({layer:lyr,name:el.displayName||('Laag '+(i+1)),visible:true});
});

// Lagenpaneel rechtsboven: alleen tonen als er extra lagen zijn
if(EX.length>0){
  const layersBtn=document.getElementById('layers-btn');
  const layersOverlay=document.getElementById('layers-overlay');
  const layersPanel=document.getElementById('layers-panel');
  const panelContent=document.getElementById('layers-panel-content');
  layersOverlay.style.display='block';
  wmsLayerObjs.forEach((lo,i)=>{
    const row=document.createElement('label');
    row.className='layer-toggle-row';
    row.innerHTML='<input type="checkbox" checked data-idx="'+i+'"><span>'+lo.name+'</span>';
    panelContent.appendChild(row);
  });
  panelContent.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const i=parseInt(e.target.dataset.idx);
      const lo=wmsLayerObjs[i];
      if(!lo.layer)return;
      if(e.target.checked){map.addLayer(lo.layer);}else{map.removeLayer(lo.layer);}
    });
  });
  layersBtn.onclick=function(){layersPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    if(!layersOverlay.contains(e.target))layersPanel.classList.remove('open');
  });
} else {
  document.getElementById('layers-overlay').style.display='none';
}

const labelLayers=[];
const trackLayers=[];

D.forEach(f=>{
  const filePolys=[];
  f.tracks.forEach(t=>{
    const poly=L.polyline(t.coords,{color:f.color,weight:LW,opacity:.9}).addTo(map);
    poly.bindPopup('<b>'+getLabelText(f,t.name)+'</b>'+(t.name?'<br>'+t.name:''));
    poly._gpxFile=f;
    trackLayers.push(poly);
    filePolys.push(poly);
  });
  if(f.showStart&&f.tracks.length&&f.tracks[0].coords.length){
    const sp=f.tracks[0].coords[0];
    const startM=L.marker(sp,{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:22px;height:22px;background:'+f.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4)"><span style="color:#fff;font-size:11px;line-height:1;margin-left:2px">&#9654;</span></div>',
        iconSize:[22,22],iconAnchor:[11,11]
      }),
      interactive:false,zIndexOffset:300
    }).addTo(map);
    trackLayers.push(startM);
  }
  f.waypoints.forEach(w=>{
    const m=L.circleMarker([w.lat,w.lon],{radius:5,color:f.color,fillColor:f.color,fillOpacity:.9,weight:2}).addTo(map);
    const wLabel=getLabelText(f,w.name);
    if(w.name||w.desc)m.bindPopup('<b>'+wLabel+'</b>'+(w.desc?'<br>'+w.desc:''));
    trackLayers.push(m);
    // waypointlabel: alleen als showLabel aan staat voor deze GPX, zoomdrempel uit globale WPTZOOM
    if(f.showLabel){
      const h=contrastHalo(f.color);
      const wptLbl=L.marker([w.lat,w.lon],{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+f.color+';font-size:13px;font-weight:600;white-space:nowrap;pointer-events:none;text-shadow:-1.5px -1.5px 0 '+h+',1.5px -1.5px 0 '+h+',-1.5px 1.5px 0 '+h+',1.5px 1.5px 0 '+h+',0 1.5px 0 '+h+',0 -1.5px 0 '+h+';transform:translate(-50%,calc(-50% - 12px))">'+wLabel+'</div>',
          iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:150
      }).addTo(map);
      wptLbl._zoomMin=WPTZOOM;
      wptLbl._zoomMax=19;
      labelLayers.push(wptLbl);
    }
  });
  if(f.showLabel&&f.tracks.length){
    const h=contrastHalo(f.color);
    const mainLabel=getLabelText(f,f.tracks[0].name);
    if(f.labelPos==='midline'&&filePolys.length){
      const tp=filePolys[0];
      tp.setText(mainLabel,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      tp._gpxLabel=true;
      tp._zoomMin=f.zoomMin;
      tp._zoomMax=f.zoomMax;
      labelLayers.push(tp);
    } else {
      const allPts=f.tracks.flatMap(t=>t.coords);
      let pos;
      if(f.labelPos==='start') pos=f.tracks[0].coords[0];
      else pos=centroid(allPts);
      const labelOffset=(f.labelPos==='start'&&f.showStart)?'transform:translate(-50%,calc(-50% - 18px))':'transform:translate(-50%,-50%)';
      const lbl=L.marker(pos,{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+f.color+';font-size:21px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-2px -2px 0 '+h+',2px -2px 0 '+h+',-2px 2px 0 '+h+',2px 2px 0 '+h+',0 2px 0 '+h+',0 -2px 0 '+h+',2px 0 0 '+h+',-2px 0 0 '+h+';'+labelOffset+'">'+mainLabel+'</div>',
          iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:200
      }).addTo(map);
      lbl._zoomMin=f.zoomMin;
      lbl._zoomMax=f.zoomMax;
      labelLayers.push(lbl);
    }
  }
});

if(B)map.fitBounds(B,{padding:[16,16]});else map.setView([52,5],8);

function updateLabels(){
  const z=map.getZoom();
  labelLayers.forEach(l=>{
    const visible=z>=l._zoomMin&&z<=l._zoomMax;
    if(l.setText){
      if(visible){
        const f=l._gpxFile;
        const h=contrastHalo(f.color);
        const mainLabel=getLabelText(f,f.tracks[0]&&f.tracks[0].name);
        l.setText(mainLabel,{center:true,attributes:{'font-size':'16px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else { l.setText(null); }
    } else {
      const e=l.getElement();if(e)e.style.display=visible?'':'none';
    }
  });
}
map.on('zoomend',updateLabels);
map.whenReady(updateLabels);

// Zoomniveau-indicator rechtsboven
const zoomValEl=document.getElementById('zoom-val');
function updateZoomIndicator(){zoomValEl.textContent=map.getZoom();}
map.on('zoomend',updateZoomIndicator);
map.whenReady(updateZoomIndicator);

// --- Locatie en volgen ---
const locBtn=document.getElementById('loc-btn');
const visBtn=document.getElementById('vis-btn');
let wid=null,lm=null,lc=null;

function stopLoc(){
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  locBtn.classList.remove('on');locBtn.innerHTML='&#9737;';
  if(lm){map.removeLayer(lm);map.removeLayer(lc);lm=lc=null;}
}

locBtn.onclick=function(){
  if(wid!==null){stopLoc();return;}
  if(!navigator.geolocation){alert('GPS niet beschikbaar in deze browser.');return;}
  locBtn.innerHTML='&#8987;';

  wid=navigator.geolocation.watchPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    locBtn.classList.add('on');locBtn.innerHTML='&#9737;';

    if(lm){
      lm.setLatLng(ll);
      lc.setLatLng(ll).setRadius(p.coords.accuracy);
    } else {
      lc=L.circle(ll,{radius:p.coords.accuracy,color:'#2980b9',fillColor:'#2980b9',fillOpacity:.15,weight:1}).addTo(map);
      lm=L.circleMarker(ll,{radius:9,color:'#fff',fillColor:'#2980b9',fillOpacity:1,weight:2}).addTo(map).bindPopup('Jouw locatie');
    }

    if(OPT_FOLLOW){
      map.setView(ll, Math.max(map.getZoom(),14),{animate:true,duration:0.5});
    } else if(!lm._shown){
      map.setView(ll, Math.max(map.getZoom(),14));
      lm._shown=true;
    }
  },function(e){
    stopLoc();
    alert('Locatie niet beschikbaar: '+e.message);
  },{enableHighAccuracy:true,maximumAge:1000});
};

let gpxVisible=true;
visBtn.onclick=function(){
  gpxVisible=!gpxVisible;
