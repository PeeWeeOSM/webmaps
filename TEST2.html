<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Route from — prototype</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html,body{margin:0;padding:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
  #map{position:absolute;inset:0}
  .hdr{position:fixed;top:0;left:0;right:0;background:#111;color:#fff;padding:8px 12px;font-weight:700;font-size:15px;z-index:1200}

  /* long-press menu */
  #ctx{position:absolute;display:none;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.35);z-index:2500;overflow:hidden;min-width:190px}
  #ctx.open{display:block}
  .ctx-title{padding:8px 12px;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #eee}
  .ctx-item{display:flex;align-items:center;gap:9px;width:100%;padding:11px 12px;border:0;background:#fff;font-size:15px;color:#111;cursor:pointer;text-align:left}
  .ctx-item:hover{background:#f2f7f2}
  .ctx-item svg{flex:none}

  /* profile picker + edit bar */
  #panel{position:fixed;top:38px;left:8px;right:8px;background:#fff;border:2px solid rgba(0,0,0,.25);border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.35);padding:10px;z-index:2400;display:none}
  #panel.open{display:block}
  .p-title{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}
  .p-profiles{display:flex;flex-wrap:wrap;gap:6px}
  .p-btn{padding:8px 12px;border:1px solid #bbb;border-radius:16px;background:#f4f6f4;font-size:14px;cursor:pointer}
  .p-btn:hover{background:#e3efe3;border-color:#2e7d32}
  .p-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .p-hint{flex:1;min-width:0;font-size:13.5px;color:#111}
  .p-stat{font-size:12.5px;color:#666;margin-top:6px;min-height:16px}
  .ok-btn{padding:8px 12px;border:1px solid #2e7d32;background:#2e7d32;color:#fff;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
  .ok-btn[disabled]{opacity:.45;cursor:default}
  .cancel-btn{padding:8px 10px;border:1px solid #bbb;background:#f4f4f4;border-radius:6px;font-size:14px;cursor:pointer}

  /* waypoint markers */
  .wp{width:100%;height:100%;box-sizing:border-box;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;line-height:1;cursor:pointer}
  .wp-start{background:#2e7d32}
  .wp-via{background:#1565c0}
  .wp-end{background:#d81b60}
  .wp-ghost{background:#1565c0;opacity:.75}

  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;
         padding:8px 16px;border-radius:20px;font-size:13px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none;max-width:80vw;text-align:center}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">Route from — prototype</div>
<div id="map"></div>

<div id="ctx"></div>

<div id="panel">
  <div class="p-title" id="p-title">Choose a profile</div>
  <div class="p-profiles" id="p-profiles"></div>
  <div id="p-edit" style="display:none">
    <div class="p-row">
      <span class="p-hint" id="p-hint">Choose a destination or via point</span>
      <button class="ok-btn" id="btn-gpx" disabled style="background:#1565c0;border-color:#1565c0">GPX</button>
      <button class="ok-btn" id="btn-ok" disabled>Route is OK</button>
      <button class="cancel-btn" id="btn-cancel">&times;</button>
    </div>
    <div class="p-stat" id="p-stat"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  var map=L.map('map',{zoomControl:true}).setView([52.155,5.40],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Routing &copy; <a href="https://brouter.de">BRouter</a>'}).addTo(map);

  var PROFILES=[
    {name:'Foot',            profile:'hiking-mountain'},
    {name:'Bicycle (Trekking)', profile:'trekking'},
    {name:'Bicycle (Fast)',  profile:'fastbike'},
    {name:'Bicycle (Gravel)',profile:'gravel'},
    {name:'Car (Fast)',      profile:'car-fast'}
  ];

  var ctx=document.getElementById('ctx');
  var panel=document.getElementById('panel');
  var pTitle=document.getElementById('p-title');
  var pProfiles=document.getElementById('p-profiles');
  var pEdit=document.getElementById('p-edit');
  var pStat=document.getElementById('p-stat');
  var btnOk=document.getElementById('btn-ok');
  var btnCancel=document.getElementById('btn-cancel');
  var toastEl=document.getElementById('toast'), toastT=null;

  // ---- state ----
  var editing=false;
  var profile=null, profileName='';
  var wps=[];              // [{lat,lng,marker}]
  var routeLine=null, hitLine=null, ghost=null;
  var suppressClickUntil=0;   // after dragging the line the browser still fires a click on the map
  var routeCoords=[];      // [[lat,lng],...] of the calculated route
  var finished=[];         // finished routes (kept on the map)
  var calcSeq=0;

  function showToast(msg,ms){
    toastEl.textContent=msg; toastEl.classList.add('show');
    if(toastT) clearTimeout(toastT);
    toastT=setTimeout(function(){ toastEl.classList.remove('show'); }, ms||2600);
  }
  function fmtKm(m){ return (m<1000)?(Math.round(m)+' m'):((m/1000).toFixed(1)+' km'); }
  function fmtTime(s){
    s=Math.round(s); var h=Math.floor(s/3600), m=Math.round((s%3600)/60);
    return h?(h+' h '+m+' min'):(m+' min');
  }

  // ---- long-press / right-click menu ----
  function openCtx(latlng,x,y){
    ctx.innerHTML='';
    var t=document.createElement('div'); t.className='ctx-title'; t.textContent='Choose an action'; ctx.appendChild(t);
    var b=document.createElement('button'); b.className='ctx-item'; b.id='ctx-routefrom';
    b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 A13 13 0 0 1 17.5 8.5"/><path d="M11.5 8 H18 V14.5"/></svg>Route from here';
    b.addEventListener('click',function(e){ e.stopPropagation(); closeCtx(); startRouteFrom(latlng); });
    ctx.appendChild(b);
    ctx.classList.add('open');
    var w=ctx.offsetWidth, h=ctx.offsetHeight;
    ctx.style.left=Math.max(6,Math.min(x, window.innerWidth-w-6))+'px';
    ctx.style.top =Math.max(6,Math.min(y, window.innerHeight-h-6))+'px';
  }
  function closeCtx(){ ctx.classList.remove('open'); }
  map.on('contextmenu',function(e){
    if(editing) return;
    openCtx(e.latlng, e.originalEvent.clientX, e.originalEvent.clientY);
  });
  document.addEventListener('click',function(e){ if(!ctx.contains(e.target)) closeCtx(); });
  ctx.addEventListener('click',function(e){ e.stopPropagation(); });

  // ---- start: pick profile ----
  function startRouteFrom(latlng){
    clearWorking();
    wps=[{lat:latlng.lat, lng:latlng.lng, marker:null}];
    editing=true;
    panel.classList.add('open');
    pTitle.textContent='Choose a profile';
    pProfiles.style.display='flex';
    pEdit.style.display='none';
    pProfiles.innerHTML='';
    PROFILES.forEach(function(p){
      var b=document.createElement('button'); b.className='p-btn'; b.textContent=p.name;
      b.addEventListener('click',function(){ profile=p.profile; profileName=p.name; enterEdit(); });
      pProfiles.appendChild(b);
    });
    drawWaypoints();
  }
  function enterEdit(){
    pTitle.textContent='Route from — '+profileName;
    pProfiles.style.display='none';
    pEdit.style.display='block';
    pStat.textContent='Start point set. Tap the map to add points.';
    btnOk.disabled=true;
    showToast('Choose a destination or via point');
  }

  // ---- waypoints ----
  function wpIcon(i){
    var cls = (i===0)?'wp-start':((i===wps.length-1 && wps.length>1)?'wp-end':'wp-via');
    var label = (i===0)?'S':((i===wps.length-1 && wps.length>1)?'F':String(i));
    return L.divIcon({className:'',html:'<div class="wp '+cls+'">'+label+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
  }
  function drawWaypoints(){
    wps.forEach(function(w,i){
      if(!w.marker){
        w.marker=L.marker([w.lat,w.lng],{icon:wpIcon(i),draggable:true,zIndexOffset:3000}).addTo(map);
        w.marker.on('click',function(ev){
          L.DomEvent.stopPropagation(ev);
          if(!editing) return;
          removeWp(w);
        });
        w.marker.on('dragstart',function(){ w.dragging=true; });
        w.marker.on('dragend',function(){
          var ll=w.marker.getLatLng(); w.lat=ll.lat; w.lng=ll.lng; w.dragging=false; recalc();
        });
      } else {
        w.marker.setIcon(wpIcon(i));
        if(!w.dragging) w.marker.setLatLng([w.lat,w.lng]);
      }
    });
  }
  function removeWp(w){
    var i=wps.indexOf(w); if(i<0) return;
    if(wps.length<=1){ showToast('The start point cannot be removed — use \u00d7 to cancel'); return; }
    map.removeLayer(w.marker); wps.splice(i,1);
    drawWaypoints(); recalc();
  }
  function addWp(latlng){
    wps.push({lat:latlng.lat, lng:latlng.lng, marker:null});
    drawWaypoints(); recalc();
  }
  map.on('click',function(e){
    if(!editing || !profile) return;
    if(Date.now()<suppressClickUntil) return;   // this click is the tail of a line drag
    addWp(e.latlng);
  });

  // ---- routing ----
  function brouterUrl(){
    var ll=wps.map(function(w){ return w.lng+','+w.lat; }).join('|');
    return 'https://brouter.de/brouter?lonlats='+ll+'&profile='+encodeURIComponent(profile)+'&format=geojson';
  }
  function recalc(){
    if(wps.length<2){ clearRouteLine(); btnOk.disabled=true; document.getElementById('btn-gpx').disabled=true; pStat.textContent='Start point set. Tap the map to add points.'; return; }
    var seq=++calcSeq;
    pStat.textContent='Calculating\u2026';
    fetch(brouterUrl())
      .then(function(r){ return r.text(); })
      .then(function(txt){
        if(seq!==calcSeq) return;
        var js;
        try{ js=JSON.parse(txt); }catch(e){ pStat.textContent='BRouter: '+txt.slice(0,90); return; }
        var f=js && js.features && js.features[0];
        if(!f){ pStat.textContent='No route found.'; return; }
        routeCoords=f.geometry.coordinates.map(function(c){ return [c[1],c[0]]; });
        drawRouteLine();
        var p=f.properties||{};
        var len=parseFloat(p['track-length']||0), tim=parseFloat(p['total-time']||0);
        pStat.textContent=profileName+' \u00b7 '+fmtKm(len)+(tim?(' \u00b7 '+fmtTime(tim)):'')+' \u00b7 '+wps.length+' points';
        btnOk.disabled=false; document.getElementById('btn-gpx').disabled=false;
      })
      .catch(function(){ if(seq===calcSeq) pStat.textContent='Routing failed \u2014 check your connection.'; });
  }
  function removeRouteLayers(){
    if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
    if(hitLine){ map.removeLayer(hitLine); hitLine=null; }
  }
  function clearRouteLine(){ removeRouteLayers(); routeCoords=[]; }
  function drawRouteLine(){
    removeRouteLayers();
    routeLine=L.polyline(routeCoords,{color:'#1565c0',weight:5,opacity:.9}).addTo(map);
    // a fat, invisible line makes the route easy to grab with a finger
    hitLine=L.polyline(routeCoords,{color:'#000',weight:22,opacity:0.01,lineCap:'round'}).addTo(map);
    enableLineDrag();
  }

  // ---- drag the route line to insert a via point (BRouter-Web style) ----
  function nearestRouteIndex(latlng){
    var best=0, bd=Infinity, p=map.latLngToLayerPoint(latlng);
    for(var i=0;i<routeCoords.length;i++){
      var q=map.latLngToLayerPoint(L.latLng(routeCoords[i][0],routeCoords[i][1]));
      var d=(q.x-p.x)*(q.x-p.x)+(q.y-p.y)*(q.y-p.y);
      if(d<bd){ bd=d; best=i; }
    }
    return best;
  }
  function insertIndexFor(latlng){
    // map each waypoint to its position along the route, then find between which two the point lies
    var idxOfWp=wps.map(function(w){ return nearestRouteIndex(L.latLng(w.lat,w.lng)); });
    var ip=nearestRouteIndex(latlng);
    for(var k=1;k<wps.length;k++){ if(ip<=idxOfWp[k]) return k; }
    return wps.length;
  }
  function enableLineDrag(){
    var el=hitLine.getElement(); if(!el) return;
    el.style.cursor='grab';
    el.style.touchAction='none';   // let the finger drag the line instead of panning the map
    el.addEventListener('pointerdown',function(ev){
      if(!editing) return;
      ev.preventDefault(); ev.stopPropagation();
      var latlng=map.mouseEventToLatLng(ev);
      var at=insertIndexFor(latlng);
      map.dragging.disable();
      ghost=L.marker(latlng,{icon:L.divIcon({className:'',html:'<div class="wp wp-ghost">+</div>',iconSize:[24,24],iconAnchor:[12,12]}),zIndexOffset:4000}).addTo(map);
      try{ el.setPointerCapture(ev.pointerId); }catch(e){}
      function move(e2){ e2.preventDefault(); ghost.setLatLng(map.mouseEventToLatLng(e2)); }
      function up(e3){
        el.removeEventListener('pointermove',move);
        el.removeEventListener('pointerup',up);
        el.removeEventListener('pointercancel',up);
        try{ el.releasePointerCapture(ev.pointerId); }catch(e){}
        map.dragging.enable();
        suppressClickUntil=Date.now()+400;
        var ll=ghost?ghost.getLatLng():latlng;
        if(ghost){ map.removeLayer(ghost); ghost=null; }
        wps.splice(at,0,{lat:ll.lat, lng:ll.lng, marker:null});
        drawWaypoints(); recalc();
      }
      el.addEventListener('pointermove',move);
      el.addEventListener('pointerup',up);
      el.addEventListener('pointercancel',up);
    });
  }

  // ---- GPX export: a real file in the device's Downloads, so it survives closing the browser ----
  function xmlEsc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function buildGpx(name){
    var now=new Date().toISOString();
    var out='<?xml version="1.0" encoding="UTF-8"?>\n';
    out+='<gpx version="1.1" creator="PeeWeeTrails" xmlns="http://www.topografix.com/GPX/1/1">\n';
    out+='  <metadata><name>'+xmlEsc(name)+'</name><time>'+now+'</time></metadata>\n';
    wps.forEach(function(w,i){
      var wn=(i===0)?'Start':((i===wps.length-1)?'Finish':('Via '+i));
      out+='  <wpt lat="'+w.lat.toFixed(6)+'" lon="'+w.lng.toFixed(6)+'"><name>'+wn+'</name></wpt>\n';
    });
    out+='  <trk><name>'+xmlEsc(name)+'</name><trkseg>\n';
    routeCoords.forEach(function(c){
      out+='    <trkpt lat="'+(+c[0]).toFixed(6)+'" lon="'+(+c[1]).toFixed(6)+'"></trkpt>\n';
    });
    out+='  </trkseg></trk>\n</gpx>\n';
    return out;
  }
  function saveGpx(){
    if(!routeCoords.length) return;
    var d=new Date(), pad=function(n){ return (n<10?'0':'')+n; };
    var stamp=d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'_'+pad(d.getHours())+pad(d.getMinutes());
    var name=(profileName||'route').replace(/[^A-Za-z0-9]+/g,'_')+'_'+stamp;
    var blob=new Blob([buildGpx(name)],{type:'application/gpx+xml'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=name+'.gpx';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
    showToast('Saved as '+name+'.gpx');
  }
  document.getElementById('btn-gpx').addEventListener('click',saveGpx);

  // ---- finish / cancel ----
  btnOk.addEventListener('click',function(){
    if(!routeLine) return;
    var keep=L.polyline(routeCoords,{color:'#1565c0',weight:5,opacity:.9}).addTo(map);
    keep.bindPopup('Route ('+profileName+')');
    finished.push(keep);
    var stat=pStat.textContent;
    clearWorking();
    showToast('Route added \u2014 '+stat, 4000);
  });
  btnCancel.addEventListener('click',function(){ clearWorking(); showToast('Cancelled'); });
  function clearWorking(){
    editing=false; profile=null;
    wps.forEach(function(w){ if(w.marker) map.removeLayer(w.marker); });
    wps=[];
    if(ghost){ map.removeLayer(ghost); ghost=null; }
    clearRouteLine();
    panel.classList.remove('open');
    map.dragging.enable();
  }

  showToast('Long-press (or right-click) the map to start a route', 4000);
  window.__proto={ get map(){return map;}, get routeCoords(){return routeCoords;}, nearestRouteIndex:nearestRouteIndex, get wps(){return wps;}, get editing(){return editing;}, get profile(){return profile;},
                   addWp:addWp, startRouteFrom:startRouteFrom, insertIndexFor:insertIndexFor, get finished(){return finished;} };
})();
</script>
</body>
</html>
