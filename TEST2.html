<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1c1c1e;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:9px 14px;background:#111;display:flex;align-items:center;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
/* Controls overlay: always on top */
#controls-overlay{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;pointer-events:none}
#controls-overlay>*{pointer-events:auto}
/* Hide Leaflet default zoom controls, we use our own */
.leaflet-control-zoom{display:none!important}
#notice{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:1001}
.ctrl-btn{width:34px;height:34px;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.ctrl-btn:hover{background:#f4f4f4}
.ctrl-btn.on{background:#d4efff;border-color:#2980b9}
.ctrl-btn.zoom{font-size:22px;font-weight:300}
.zoom-sep{height:1px;background:#ccc;margin:0 4px}
.zoom-group{background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.zoom-group .ctrl-btn{border:none;border-radius:0;box-shadow:none;width:34px;height:32px}
.zoom-group .ctrl-btn:first-child{border-bottom:1px solid #ddd}
#layers-overlay{display:none;position:absolute;top:96px;right:10px;z-index:1200}
/* The panel sits ~138px below the top of #map-wrap (overlay top:96px + panel
   top:42px), and #map-wrap itself starts below the ~40px header. So relative to
   the viewport the panel top is ~178px. Cap its height to the space left down to
   ~16px above the bottom edge: 178 + 16 = ~194, rounded to 200px of slack. This
   keeps the last row ("Base map"/OpenStreetMap) and its opacity slider on-screen
   and internally scrollable even with many extra layers. dvh (with a vh fallback)
   uses the *visible* height so it stays correct when the mobile address bar shows;
   the earlier 154px value ignored the header, pushing the bottom slider off-screen
   and out of scroll reach on the phone. */
#layers-panel{display:none;position:absolute;top:42px;right:0;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.3);padding:10px 12px;min-width:180px;max-width:240px;max-height:calc(100vh - 200px);max-height:calc(100dvh - 200px);overflow-y:auto;-webkit-overflow-scrolling:touch}
#layers-panel.open{display:block}
#layers-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.layer-toggle-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#222}
#zoom-indicator{position:absolute;top:52px;right:10px;z-index:1000;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.3);padding:6px 10px;font-size:13px;font-weight:600;color:#222;pointer-events:none}
.layer-toggle-row input{flex-shrink:0}
.layer-toggle-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-opacity-row{display:flex;align-items:center;gap:6px;padding:2px 0 6px 22px;border-bottom:1px solid #eee}
.layer-opacity-row:last-child{border-bottom:none;padding-bottom:2px}
.layer-opacity-row input[type=range]{flex:1;height:4px;accent-color:#185FA5;cursor:pointer}
.layer-opacity-row span{font-size:11px;color:#999;min-width:30px;text-align:right}
.layer-section-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;padding:4px 0 2px}
/* User route loader panel */
#info-btn{position:absolute;top:10px;right:10px;z-index:1000;width:30px;height:30px;border-radius:50%;background:white;border:2px solid rgba(0,0,0,.25);box-shadow:0 2px 8px rgba(0,0,0,.3);font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:16px;color:#2980b9;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
#info-btn:hover{background:#f4f4f4}
#route-overlay{position:absolute;top:138px;right:10px;z-index:1200}
#route-btn svg{width:20px;height:20px;display:block}
#route-btn:hover{background:#f4f4f4}
#route-btn.has-routes{border-color:#2980b9;background:#d4efff}
/* Width is fluid: caps at 380px on wide screens (laptop, unchanged) but shrinks
   to the viewport width minus a 20px margin on narrow phones, so the panel never
   runs off either edge. Without this the fixed 320px min-width pushed the leftmost
   geometry icon and the rightmost close (x) button off-screen on small phones.
   box-sizing:border-box (set globally) means the 16px padding is included, so the
   panel footprint always leaves ~10px clear on each side. dvh height keeps it
   within the visible area even when the mobile address bar is shown. */
#route-panel{display:none;position:absolute;top:42px;right:0;background:white;border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.25);padding:14px 16px;width:min(380px,calc(100vw - 20px));max-height:65vh;max-height:65dvh;overflow-y:auto}
#route-panel.open{display:block}
#route-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center}
#route-clear-all{margin-left:auto;background:none;border:1px solid #ccc;border-radius:5px;font-size:11px;font-weight:600;text-transform:none;letter-spacing:0;color:#c0392b;cursor:pointer;padding:3px 8px;flex-shrink:0}
#route-clear-all:hover{background:#fdeeee}
#route-panel-close{background:none;border:none;font-size:18px;line-height:1;cursor:pointer;color:#aaa;padding:0 0 0 8px;flex-shrink:0}
#route-panel-close:hover{color:#333}
.user-route-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;color:#222}
.user-route-row:last-child{border-bottom:none}
.user-route-row input[type=color]{width:24px;height:24px;border:none;padding:0;border-radius:3px;cursor:pointer;flex-shrink:0}
.user-route-row .route-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:600;color:#222}
.user-route-row .route-name-edit{flex:1;min-width:0;font-family:inherit;font-size:13px;font-weight:600;color:#222;border:1px solid transparent;background:transparent;border-radius:4px;padding:2px 4px;text-overflow:ellipsis}
.user-route-row .route-name-edit:hover{border-color:#ddd}
.user-route-row .route-name-edit:focus{border-color:#2980b9;background:#fff;outline:none;text-overflow:clip}
.user-route-row .route-del{background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 3px;line-height:1}

.user-route-row .route-vis{background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;padding:0 3px;line-height:1;color:#333}
.user-route-row .route-more{background:none;border:none;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;line-height:1;color:#555}
.route-detail-panel{display:none;padding:2px 0 8px 24px;border-bottom:1px solid #f0f0f0}
.route-detail-panel.open{display:block}
.route-detail-header{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.route-detail-header span{flex:1}
.route-detail-close{background:none;border:none;font-size:16px;cursor:pointer;color:#888;padding:0 3px;line-height:1}
.route-detail-panel .route-options-row{padding-left:0}
.ro-fly-btn{background:none;border:1px solid #ccc;border-radius:5px;font-size:12px;cursor:pointer;padding:4px 9px;color:#2980b9;display:flex;align-items:center;gap:5px}
.route-options-row{display:flex;align-items:center;gap:5px;padding:3px 0 8px 30px;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.ro-group{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.route-options-row:last-child{border-bottom:none}

.ro-label{font-size:12px;color:#444;font-weight:500}

.route-options-row input[type=number]{width:42px;font-size:12px;border:1px solid #ccc;border-radius:3px;padding:2px 4px;color:#222}
.route-options-row label{display:flex;align-items:center;gap:3px;font-size:13px;color:#222;cursor:pointer;font-weight:500;margin-left:4px}
#route-add-bar{display:flex;gap:6px;margin-top:10px}

#vis-panel.open{display:block}
#vis-panel h3{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}

.vis-row:last-child{border-bottom:none}
.vis-row .vis-label{flex:1;font-weight:500}
.vis-row .vis-eye{background:none;border:none;font-size:15px;cursor:pointer;color:#333;padding:0 2px;line-height:1}
.vis-row .vis-op{width:65px;accent-color:#185FA5;cursor:pointer}
.vis-row .vis-pct{font-size:11px;color:#888;min-width:30px;text-align:right}
#trail-panel{display:none;position:absolute;top:42px;left:0;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.3);padding:10px 12px;min-width:190px;z-index:1001}
#trail-panel.open{display:block}
#trail-panel h3{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.trail-row{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:13px;color:#222}
.trail-row label{flex:1;font-weight:500;min-width:40px}

.map-actions-menu.open{display:block}

// Simple average centroid (used as a first estimate for label position)
function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

function nearestPointOnLine(point, lineCoords){
  if(lineCoords.length===0) return point;
  if(lineCoords.length===1) return lineCoords[0];
  let best=lineCoords[0], bestDist=Infinity;
  for(let i=0;i<lineCoords.length-1;i++){
    const a=lineCoords[i], b=lineCoords[i+1];
    const dx=b[0]-a[0], dy=b[1]-a[1];
    let t = (dx===0&&dy===0) ? 0 : ((point[0]-a[0])*dx+(point[1]-a[1])*dy)/(dx*dx+dy*dy);
    t = Math.max(0, Math.min(1, t));
    const proj=[a[0]+t*dx, a[1]+t*dy];
    const d=Math.hypot(point[0]-proj[0], point[1]-proj[1]);
    if(d<bestDist){ bestDist=d; best=proj; }
  }
  return best;
}

function labelAnchorCentroid(trackCoords){
  const c=centroid(trackCoords);
  return nearestPointOnLine(c, trackCoords);
}

function bearingPoints(p1,p2){
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function buildKmMarkers(coords){
  if(coords.length<2) return [];
  const markers=[];
  let cumDist=0;
  let nextKm=1000;
  for(let i=0;i<coords.length-1;i++){
    const segDist=haversineMeters(coords[i],coords[i+1]);
    while(cumDist+segDist>=nextKm){
      const t=(nextKm-cumDist)/segDist;
      const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
      const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
      markers.push({position:[lat,lon], bearing:bearingPoints(coords[i],coords[i+1]), km:nextKm/1000});
      nextKm+=1000;
    }
    cumDist+=segDist;
  }
  return markers;
}

function simplifyLine(points, tolerance){
  if(points.length<3) return points;
  function perpDist(pt,a,b){
    const dx=b[0]-a[0], dy=b[1]-a[1];
    if(dx===0&&dy===0) return Math.hypot(pt[0]-a[0],pt[1]-a[1]);
    const t=((pt[0]-a[0])*dx+(pt[1]-a[1])*dy)/(dx*dx+dy*dy);
    const tc=Math.max(0,Math.min(1,t));
    const px=a[0]+tc*dx, py=a[1]+tc*dy;
    return Math.hypot(pt[0]-px,pt[1]-py);
  }
  function dp(pts,tol){
    if(pts.length<3) return pts;
    let maxD=0,idx=0;
    for(let i=1;i<pts.length-1;i++){
      const d=perpDist(pts[i],pts[0],pts[pts.length-1]);
      if(d>maxD){maxD=d;idx=i;}
    }
    if(maxD>tol){
      const left=dp(pts.slice(0,idx+1),tol);
      const right=dp(pts.slice(idx),tol);
      return left.slice(0,-1).concat(right);
    }
    return [pts[0],pts[pts.length-1]];
  }
  return dp(points,tolerance);
}

function buildTextPathLine(coords, labelLength){
  // Return a straight two-point line through the track midpoint so letters
  // always render at a single consistent angle (no per-letter rotation).
  if(coords.length<2) return coords;
  if(coords.length===2) return normalizeDirection(coords);
  const dists=[0];
  for(let i=1;i<coords.length;i++){
    const a=coords[i-1],b=coords[i];
    const dx=b[1]-a[1],dy=b[0]-a[0];
    dists.push(dists[i-1]+Math.sqrt(dx*dx+dy*dy));
  }
  const total=dists[dists.length-1];
  const charSpan=Math.min(0.6,Math.max(0.2,(labelLength||10)*0.018));
  const halfSpan=charSpan/2;
  const mid=total*0.5;
  let midIdx=0;
  for(let i=0;i<dists.length;i++){if(dists[i]>=mid){midIdx=i;break;}}
  let startIdx=midIdx,endIdx=midIdx;
  while(startIdx>0&&dists[midIdx]-dists[startIdx]<total*halfSpan)startIdx--;
  while(endIdx<coords.length-1&&dists[endIdx]-dists[midIdx]<total*halfSpan)endIdx++;
  return normalizeDirection([coords[startIdx],coords[endIdx]]);
}

function normalizeDirection(coords){
  if(coords.length<2) return coords;
  const start=coords[0], end=coords[coords.length-1];
  const dLon=end[1]-start[1];
  const dLat=end[0]-start[0];
  const goingLeft = Math.abs(dLon) >= Math.abs(dLat) ? dLon < 0 : dLat < 0;
  return goingLeft ? coords.slice().reverse() : coords;
}

  if(mode==='nametag') return (elementName&&elementName.trim()) ? elementName.trim() : f.filename;
  return f.filename;
}

function buildWaypointMarker(f, w){
  if(f.wptIconSvg){

    return L.marker([w.lat,w.lon],{

// --- Status in URL: extent en laag-zichtbaarheid kunnen via #-hash gedeeld worden ---
// --- URL hash state: map position and layer visibility are stored in the #hash
//     so the user can bookmark or share the exact current map view ---
function parseStateFromHash(){
  if(!location.hash || location.hash.length<2) return null;
  const params=new URLSearchParams(location.hash.slice(1));
  const lat=parseFloat(params.get('lat'));
  const lng=parseFloat(params.get('lng'));
  const z=parseInt(params.get('z'));
  const layersParam=params.get('layers');
  const markerParam=params.get('marker');
  const out={};
  if(!isNaN(lat)&&!isNaN(lng)&&!isNaN(z)){ out.lat=lat; out.lng=lng; out.z=z; }
  if(layersParam!=null){ out.layerVis=layersParam.split(',').map(v=>v==='1'); }
  if(markerParam!=null){
    const parts=markerParam.split(',').map(parseFloat);
    if(parts.length===2 && !isNaN(parts[0]) && !isNaN(parts[1])) out.marker=[parts[0],parts[1]];
  }
  return Object.keys(out).length?out:null;
}

function updateUrlHash(){
  const c=map.getCenter();
  const params=new URLSearchParams();
  params.set('lat',c.lat.toFixed(6));
  params.set('lng',c.lng.toFixed(6));
  params.set('z',map.getZoom());
  if(wmsLayerObjs.length){
    params.set('layers',wmsLayerObjs.map(lo=>map.hasLayer(lo.layer)?'1':'0').join(','));
  }
  history.replaceState(null,'','#'+params.toString());
}

// Automatically figures out how far a tile layer's real tiles actually go: the
// first time a tile genuinely fails to load at a plausibly-high zoom level (not
// just a low-zoom network blip), the layer's native ceiling is capped there and
// redrawn, so zoom levels beyond it optically over-zoom (blur) instead of
// showing blank/broken tiles.
function attachAutoNativeZoom(layer){
  let capped=false;
  layer.on('tileerror',function(err){
    if(capped) return;
    const z=err && err.coords && err.coords.z;
    if(z==null || z<14) return;
    capped=true;
    layer.options.maxNativeZoom=z-1;
    layer.redraw();
  });
}

    if(p.name||p.desc)pg.bindPopup('<b>'+(p.name||f.filename)+'</b>'+(p.desc?'<br>'+p.desc:''));
    pg._isPolygon=true;
    pg._baseFillOpacity=(f.fillOpacity!=null?f.fillOpacity:0.2);
    pg._trackZoomMin=fZMin;
    pg._trackZoomMax=fZMax;
    polygonLayers.push(pg);
  });

  // --- Render line tracks ---
  f.tracks.forEach(t=>{
    const poly=L.polyline(t.coords,{color:f.color,weight:fLw,opacity:.9}).addTo(map);
    poly.bindPopup('<b>'+getLabelText(f,t.name)+'</b>'+(t.name?'<br>'+t.name:''));
    poly._gpxFile=f;
    poly._trackZoomMin=fZMin;
    poly._trackZoomMax=fZMax;
    trackLineLayers.push(poly);
    filePolys.push(poly);
  });

  // --- Start marker (belongs to tracks, not waypoints) ---
  if(f.showStart&&f.tracks.length&&f.tracks[0].coords.length){
    const sp=f.tracks[0].coords[0];
    const startM=L.marker(sp,{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:22px;height:22px;background:'+f.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4)"><span style="color:#fff;font-size:11px;line-height:1;margin-left:2px">&#9654;</span></div>',
        iconSize:[22,22],iconAnchor:[11,11]
      }),
      interactive:false,zIndexOffset:300
    }).addTo(map);
    startM._trackZoomMin=fZMin;
    startM._trackZoomMax=fZMax;
    trackDotLayers.push(startM);  // track group, NOT waypoints
  }

  // --- KM direction markers (belong to tracks, not waypoints) ---
  if(f.showKmMarkers&&f.tracks.length){
    const allTrackCoords=f.tracks.flatMap(t=>t.coords);
    const kmMarkers=buildKmMarkers(allTrackCoords);
    kmMarkers.forEach(km=>{
      const kmM=L.marker(km.position,{
        icon:L.divIcon({
          className:'',
          html:'<svg width="26" height="26" viewBox="0 0 26 26" style="transform:rotate('+km.bearing+'deg);filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))"><polygon points="13,2 19,22 13,17 7,22" fill="'+f.color+'" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg>',
          iconSize:[26,26],iconAnchor:[13,13]
        }),
        zIndexOffset:180
      }).addTo(map);
      kmM.bindPopup('<b>'+km.km+' km</b>');
      kmM._trackZoomMin=fZMin;
      kmM._trackZoomMax=fZMax;
      trackDotLayers.push(kmM);  // track group, NOT waypoints
    });
  }

  // --- Waypoint markers (belong to waypoints group only) ---
  f.waypoints.forEach(w=>{
    const m=buildWaypointMarker(f,w).addTo(map);
    const wLabel=getLabelText(f,w.name);
    if(w.name||w.desc)m.bindPopup('<b>'+wLabel+'</b>'+(w.desc?'<br>'+w.desc:''));
    m._trackZoomMin=fZMin;
    m._trackZoomMax=fZMax;
    wptMarkerLayers.push(m);  // waypoints group only

    // Waypoint label marker
    if(f.showLabel){
      const h=contrastHalo(f.color);
      const wptLbl=L.marker([w.lat,w.lon],{
        icon:L.divIcon({
          className:'',
          html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+f.color+';font-size:20px;font-weight:600;white-space:nowrap;pointer-events:none;text-shadow:-2.3px -2.3px 0 '+h+',2.3px -2.3px 0 '+h+',-2.3px 2.3px 0 '+h+',2.3px 2.3px 0 '+h+',0 2.3px 0 '+h+',0 -2.3px 0 '+h+';transform:translate(-50%,calc(-50% - 18px))">'+wLabel+'</div>',
          iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:150
      }).addTo(map);
      wptLbl._zoomMin=f.labelZoomMin;  // use per-file label zoom setting
      wptLbl._zoomMax=f.labelZoomMax;
      wptLbl._wptLabel=true;  // flag so waypoints toggle can target these specifically
      labelLayers.push(wptLbl);
    }
  });

  // --- Track labels ---
  if(f.showLabel&&f.tracks.length){
    const h=contrastHalo(f.color);
    // Compute km suffix if showTrackDist is on and there is exactly one track
    let kmSuffix='';
    if(f.showTrackDist&&f.tracks.length===1&&f.tracks[0].coords.length>1){
      let d=0;
      const c=f.tracks[0].coords;
      for(let i=1;i<c.length;i++)d+=haversineMeters(c[i-1],c[i]);
      kmSuffix=' ('+(d/1000).toFixed(1).replace('.',',')+' km)';
    }
    const mainLabel=getLabelText(f,f.tracks[0].name)+kmSuffix;
    const fs=(f.labelFontSize||24)+'px';
    const haloW=Math.max(2,Math.round((f.labelFontSize||24)*0.13))+'px';
    const allPts=f.tracks.flatMap(t=>t.coords);
    let pos;
    if(f.labelPos==='start') pos=f.tracks[0].coords[0];
    else pos=labelAnchorCentroid(allPts);
    const labelOffset=(f.labelPos==='start'&&f.showStart)?'transform:translate(-50%,calc(-50% - 18px))':'transform:translate(-50%,-50%)';
    const lbl=L.marker(pos,{
      icon:L.divIcon({
        className:'',
        html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+f.color+';font-size:'+fs+';font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-'+haloW+' -'+haloW+' 0 '+h+','+haloW+' -'+haloW+' 0 '+h+',-'+haloW+' '+haloW+' 0 '+h+','+haloW+' '+haloW+' 0 '+h+',0 '+haloW+' 0 '+h+',0 -'+haloW+' 0 '+h+','+haloW+' 0 0 '+h+',-'+haloW+' 0 0 '+h+';'+labelOffset+'">'+mainLabel+'</div>',
        iconAnchor:[0,0]
      }),
      interactive:false,zIndexOffset:200
    }).addTo(map);
    lbl._zoomMin=f.labelZoomMin;
    lbl._zoomMax=f.labelZoomMax;
    labelLayers.push(lbl);
  }
  // --- Polygon labels: per-polygon if each has its own name,
  //     or one combined centroid label if all share the same name ---
  if(f.showLabel&&(f.polygons||[]).length>0){
    const h=contrastHalo(f.color);
    const fs=(f.labelFontSize||24)+'px';
    const haloW=Math.max(2,Math.round((f.labelFontSize||24)*0.13))+'px';
    const makePolyLbl=(lat,lon,name)=>{
      const lbl=L.marker([lat,lon],{
        icon:L.divIcon({
          className:'',
          html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+f.color+';font-size:'+fs+';font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-'+haloW+' -'+haloW+' 0 '+h+','+haloW+' -'+haloW+' 0 '+h+',-'+haloW+' '+haloW+' 0 '+h+','+haloW+' '+haloW+' 0 '+h+';transform:translate(-50%,-50%)">'+name+'</div>',
          iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:100
      }).addTo(map);
      lbl._zoomMin=f.labelZoomMin;
      lbl._zoomMax=f.labelZoomMax;
      lbl._polLabel=true;
      labelLayers.push(lbl);
    };
    const polNames=f.polygons.map(p=>getLabelText(f,p.name));
    const polAllSameName=polNames.every(n=>n===polNames[0]);
    if(polAllSameName){
      const polLabelName=polNames[0];
      if(polLabelName){
        const allOuterPts=f.polygons.flatMap(p=>p.rings[0]);
        const cLat=allOuterPts.reduce((s,c)=>s+c[0],0)/allOuterPts.length;
        const cLon=allOuterPts.reduce((s,c)=>s+c[1],0)/allOuterPts.length;
        makePolyLbl(cLat,cLon,polLabelName);
      }
    } else {
      f.polygons.forEach((p,pIdx)=>{
        const nm=polNames[pIdx];
        if(!nm)return;
        const pts=p.rings[0];
        const cLat=pts.reduce((s,c)=>s+c[0],0)/pts.length;
        const cLon=pts.reduce((s,c)=>s+c[1],0)/pts.length;
        makePolyLbl(cLat,cLon,nm);
      });
    }
  }
});

function updateLabels(){
  const z=map.getZoom();

  // --- Track labels (textpath + floating DivIcon) ---
  labelLayers.forEach(l=>{
    // If user toggled off: ensure removed from map and skip
    if(l._userHidden){
      if(l.setText) l.setText(null);
      else if(map.hasLayer(l)) map.removeLayer(l);
      return;
    }
    const visible=z>=l._zoomMin&&z<=l._zoomMax;
    if(l.setText){
      // Textpath: set/clear text based on zoom
      if(visible){
        const f=l._gpxFile;
        const h=contrastHalo(f.color);
        const mainLabel=getLabelText(f,f.tracks[0]&&f.tracks[0].name);
        l.setText(null);
        l.setText(mainLabel,{center:true,repeat:false,attributes:{'font-size':'24px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else {
        l.setText(null);
      }
    } else {
      // Floating DivIcon label: add/remove from map based on zoom
      if(visible){ if(!map.hasLayer(l)) map.addLayer(l); }
      else { if(map.hasLayer(l)) map.removeLayer(l); }
    }
  });

  // --- Waypoint markers ---
  wptMarkerLayers.forEach(m=>{
    if(m._userHidden){ if(map.hasLayer(m)) map.removeLayer(m); return; }
    const visible=z>=m._trackZoomMin&&z<=m._trackZoomMax;
    if(visible){ if(!map.hasLayer(m)) map.addLayer(m); }
    else { if(map.hasLayer(m)) map.removeLayer(m); }
  });

  // --- Track lines, start/km dots, polygons ---
  zoomLayers.forEach(l=>{
    if(l._userHidden){ if(map.hasLayer(l)) map.removeLayer(l); return; }
    const visible=z>=l._trackZoomMin&&z<=l._trackZoomMax;
    if(visible){ if(!map.hasLayer(l)) map.addLayer(l); }
    else { if(map.hasLayer(l)) map.removeLayer(l); }
  });
}
map.on('zoomend',updateLabels);

// --- GPS location tracking and map-follow logic ---
// The location button starts watchPosition(); a direction marker and accuracy
// circle are shown. When FOLLOW_DELAY>0 the map re-centers automatically after
// the user has been idle (no pan/zoom) for that many ms — checked on its own
// timer (see followCheckInterval below), not only when a new GPS fix arrives,
// since a stationary device may not get a new fix for a long time.
const locBtn=document.getElementById('loc-btn');
let wid=null,locTrail=null,locTrailBg=null,lc=null,dirMarker=null;
let followZoom=null;
let locHistory=[]; // GPS points preserved until page/tab is closed
let TRAIL_MODE="full";
let TRAIL_METERS=50;
let FOLLOW_DELAY=true?10000:0; // 0=never, else ms of idle time before re-centering
let lastUserInteraction=Date.now();
let lastKnownLatLng=null;
let followCheckInterval=null;
let programmaticMove=false;
// --- Rotation / orientation state (compass modes) ---
let locMode='off';
let following=true;
let smoothedHeading=null;
function angleDeltaDeg(a,b){ return ((b-a+540)%360)-180; }
function metersPerPixel(lat,zoom){ return 156543.03392*Math.cos(lat*Math.PI/180)/Math.pow(2,zoom); }
function destPoint(lat,lng,distanceM,brngDeg){
  const R=6371000, brng=brngDeg*Math.PI/180, la1=lat*Math.PI/180, lo1=lng*Math.PI/180;
  const la2=Math.asin(Math.sin(la1)*Math.cos(distanceM/R)+Math.cos(la1)*Math.sin(distanceM/R)*Math.cos(brng));
  const lo2=lo1+Math.atan2(Math.sin(brng)*Math.sin(distanceM/R)*Math.cos(la1),Math.cos(distanceM/R)-Math.sin(la1)*Math.sin(la2));
  return [la2*180/Math.PI, lo2*180/Math.PI];
}
let compassAngle=0;
function updateCompass(){ const inner=locBtn.querySelector('.compass-inner'); if(!inner) return; compassAngle+=angleDeltaDeg(compassAngle, map.getBearing()); inner.style.transform='rotate('+compassAngle+'deg)'; }
map.on('rotate move zoom', updateCompass);
function setBearingProg(b){ programmaticMove=true; map.setBearing(b); programmaticMove=false; updateCompass(); }

function haversineMeters(p1,p2){
  const R=6371000;
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLat=(p2[0]-p1[0])*Math.PI/180, dLon=(p2[1]-p1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Trim the trail: with 'full' everything is kept (whole ride, even after 50km), with 'distance'
// only the points within the last TRAIL_METERS meters (measured along the path) are kept.
// Keep the GPS trail (and its accompanying circle/marker) rendered above
// everything else, including tracks imported later via "Import files".
function bringTrailToFront(){
  // Only path-based layers (polylines/polygons) implement bringToFront().
  // L.Marker (e.g. dirMarker, lc) does not, so guard each call to avoid a
  // crash that would otherwise abort whatever triggered this (e.g. adding a
  // BRouter/imported route to the list).
  if(locTrailBg && locTrailBg.bringToFront) locTrailBg.bringToFront();
  if(locTrail && locTrail.bringToFront) locTrail.bringToFront();
  if(lc && lc.bringToFront) lc.bringToFront();
  if(dirMarker && dirMarker.bringToFront) dirMarker.bringToFront();
}

function trimTrail(history){
  if(TRAIL_MODE==='full' || history.length<2) return history;
  let acc=0;
  let cutIdx=0;
  for(let i=history.length-1;i>0;i--){
    acc+=haversineMeters(history[i-1],history[i]);
    if(acc>=TRAIL_METERS){ cutIdx=i-1; break; }
    cutIdx=0;
  }
  return history.slice(cutIdx);
}

// --- Trail settings panel: lets the visitor adjust the recorded trail's
// color, width, and length (full route vs. only the last N meters) live ---
{
  const trailBtn=document.getElementById('trail-settings-btn');
  const trailPanel=document.getElementById('trail-panel');
  const colorInput=document.getElementById('trail-color-input');
  const widthInput=document.getElementById('trail-width-input');
  const modeInput=document.getElementById('trail-mode-input');
  const metersInput=document.getElementById('trail-meters-input');
  const metersRow=document.getElementById('trail-meters-row');
  const centerInput=document.getElementById('trail-center-input');

  colorInput.value=TRAIL_COLOR;
  widthInput.value=TRAIL_WIDTH;
  modeInput.value=TRAIL_MODE;
  metersInput.value=TRAIL_METERS;
  metersRow.style.display=(TRAIL_MODE==='full')?'none':'';
  const secInput=document.getElementById('trail-center-sec');
  const secRow=document.getElementById('trail-center-sec-row');

  trailBtn.onclick=function(e){e.stopPropagation();trailPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    const overlay=document.getElementById('trail-overlay');
    if(!overlay.contains(e.target))trailPanel.classList.remove('open');
  });

  function applyTrailAppearance(){
    if(locTrail){
      locTrail.setStyle({color:TRAIL_COLOR,weight:TRAIL_WIDTH,dashArray:(TRAIL_WIDTH*1.6)+','+(TRAIL_WIDTH*1.3)});
      locTrailBg.setStyle({weight:TRAIL_WIDTH});
    }
    if(lc) lc.setStyle({color:TRAIL_COLOR,fillColor:TRAIL_COLOR});
  }

  colorInput.addEventListener('input',function(){
    TRAIL_COLOR=colorInput.value;
    applyTrailAppearance();
  });
  widthInput.addEventListener('change',function(){
    TRAIL_WIDTH=Math.max(1,Math.min(15,parseInt(widthInput.value)||5));
    widthInput.value=TRAIL_WIDTH;
    applyTrailAppearance();
  });
  modeInput.addEventListener('change',function(){
    TRAIL_MODE=modeInput.value;
    metersRow.style.display=(TRAIL_MODE==='full')?'none':'';
    locHistory=trimTrail(locHistory);
    if(locTrail){ locTrail.setLatLngs(locHistory); locTrailBg.setLatLngs(locHistory); }
  });
  metersInput.addEventListener('change',function(){
    TRAIL_METERS=Math.max(5,Math.min(5000,parseInt(metersInput.value)||50));
    metersInput.value=TRAIL_METERS;
    locHistory=trimTrail(locHistory);
    if(locTrail){ locTrail.setLatLngs(locHistory); locTrailBg.setLatLngs(locHistory); }
  });
  function applyCenterSetting(){
    if(centerInput.value==='0'){ FOLLOW_DELAY=0; secRow.style.display='none'; }
    else { const sc=Math.max(1,Math.min(600,parseInt(secInput.value)||10)); secInput.value=sc; FOLLOW_DELAY=sc*1000; secRow.style.display=''; }
    lastUserInteraction=Date.now();
  }
  if(FOLLOW_DELAY<=0){ centerInput.value='0'; } else { centerInput.value='seconds'; secInput.value=Math.round(FOLLOW_DELAY/1000); }
  applyCenterSetting();
  centerInput.addEventListener('change',applyCenterSetting);
  secInput.addEventListener('change',applyCenterSetting);
}

function bearing(p1,p2){
  // peiling in graden van p1 naar p2 (0=noord)
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// Pointed triangle as SVG: rotation center exactly at the center of the shape, no skewed rendering
function makeDirIcon(deg){
  return L.divIcon({
    className:'',
    html:'<svg width="46" height="46" viewBox="0 0 46 46" style="transform:rotate('+deg+'deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">'
        +'<polygon points="23,2 31,39 23,29 15,39" fill="'+TRAIL_COLOR+'" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>'
        +'</svg>',
    iconSize:[46,46],
    iconAnchor:[23,23]
  });
}

function stopLoc(){
  // Stop GPS watching but KEEP the trail on the map and locHistory intact
  // so the trail survives toggling the location button off and on again.
  // History is only cleared when the page/tab is closed.
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  if(followCheckInterval!==null){clearInterval(followCheckInterval);followCheckInterval=null;}
  smoothedHeading=null;
  // Remove only the accuracy circle and direction arrow, not the trail line
  if(lc){map.removeLayer(lc);lc=null;}
  if(dirMarker){map.removeLayer(dirMarker);dirMarker=null;}
  followZoom=null;
}

// Detect manual map interaction (drag/zoom by user) to temporarily pause auto-centering
map.on('dragstart zoomstart rotate',function(){
  if(!programmaticMove){ lastUserInteraction=Date.now(); following=false; }
});

function recenterOnLocation(ll){
  if(followZoom===null) followZoom=Math.max(map.getZoom(),16);
  programmaticMove=true;
  map.setView(ll, followZoom, {animate:false});
  programmaticMove=false;
}
function orient(){
  if(locMode==='off'){ if(following) setBearingProg(0); return; }
  if(!following || !lastKnownLatLng) return;
  const zoom=(followZoom!==null?followZoom:Math.max(map.getZoom(),16));
  if(locMode==='north'){
    setBearingProg(0);
    programmaticMove=true; map.setView(lastKnownLatLng, zoom, {animate:false}); programmaticMove=false;
  } else if(locMode==='movement'){
    const hdg=(smoothedHeading==null?0:smoothedHeading);
    const H=map.getContainer().clientHeight;
    const dest=destPoint(lastKnownLatLng[0], lastKnownLatLng[1], H*0.25*metersPerPixel(lastKnownLatLng[0], zoom), hdg);
    setBearingProg(-hdg);
    programmaticMove=true; map.setView(dest, zoom, {animate:false}); programmaticMove=false;
  }
}

function startGPS(){
  if(wid!==null) return;
  if(!navigator.geolocation){alert('GPS is not available in this browser.');return;}

  wid=navigator.geolocation.watchPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    lastKnownLatLng=ll;
    locHistory.push(ll);
    locHistory=trimTrail(locHistory);

    // determine bearing: use GPS heading if available, otherwise compute from trail
    let deg=0;
    if(p.coords.heading!=null && !isNaN(p.coords.heading)){
      deg=p.coords.heading;
    } else if(locHistory.length>=2){
      deg=bearing(locHistory[0],locHistory[locHistory.length-1]);
    }
    if(locMode==='movement'){
      const rel=(p.coords.heading!=null && !isNaN(p.coords.heading)) && (p.coords.speed==null||p.coords.speed>1);
      if(smoothedHeading==null) smoothedHeading=deg;
      else if(rel){ const dd=angleDeltaDeg(smoothedHeading,deg); smoothedHeading+=dd*(Math.abs(dd)>20?0.6:0.25); }
    }

    if(locTrail){
      locTrail.setLatLngs(locHistory);
      locTrailBg.setLatLngs(locHistory);
      if(lc) lc.setLatLng(ll).setRadius(p.coords.accuracy);
      else lc=L.circle(ll,{radius:p.coords.accuracy,color:TRAIL_COLOR,fillColor:TRAIL_COLOR,fillOpacity:.12,weight:1}).addTo(map);
      if(dirMarker) dirMarker.setLatLng(ll).setIcon(makeDirIcon(deg + map.getBearing()));
      else dirMarker=L.marker(ll,{icon:makeDirIcon(deg + map.getBearing()),interactive:false,zIndexOffset:500}).addTo(map).bindPopup('Your location');
    } else {
      lc=L.circle(ll,{radius:p.coords.accuracy,color:TRAIL_COLOR,fillColor:TRAIL_COLOR,fillOpacity:.12,weight:1}).addTo(map);
      // White base line first, then a dashed colored line on top — gives a true
      // two-tone (e.g. purple/white) dashed look regardless of the map underneath,
      // and reads more clearly against imported tracks of a similar solid color.
      locTrailBg=L.polyline(locHistory,{color:'#fff',weight:TRAIL_WIDTH,opacity:.9,lineCap:'round'}).addTo(map);
      locTrail=L.polyline(locHistory,{color:TRAIL_COLOR,weight:TRAIL_WIDTH,opacity:1,lineCap:'butt',dashArray:(TRAIL_WIDTH*1.6)+','+(TRAIL_WIDTH*1.3)}).addTo(map);
      dirMarker=L.marker(ll,{icon:makeDirIcon(deg + map.getBearing()),interactive:false,zIndexOffset:500}).addTo(map).bindPopup('Your location');
    }
    bringTrailToFront();

    if(!dirMarker._shown){ dirMarker._shown=true; if(followZoom===null) followZoom=Math.max(map.getZoom(),16); lastUserInteraction=Date.now(); }
    if(following) orient();
    if(dirMarker) dirMarker.setIcon(makeDirIcon(deg + map.getBearing()));
  },function(e){
    stopLoc();
    alert('Location unavailable: '+e.message);
  },{enableHighAccuracy:true,maximumAge:1000});
}

// --- Visibility panel: toggle and opacity control per geometry type ---
// Each geometry type (tracks, waypoints, polygons) can be shown/hidden
// and faded independently via the eye-button dropdown (left controls).
{
  const visBtn=document.getElementById('vis-btn');
  const visPanel=document.getElementById('vis-panel');

  // Open/close the panel when clicking the eye button
  visBtn.onclick=function(e){e.stopPropagation();visPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    const overlay=document.getElementById('vis-overlay');
    if(!overlay.contains(e.target))visPanel.classList.remove('open');
  });

  // State per geometry type — strictly separate, zero overlap between arrays:
  // tracks = lines + start dots + km markers (trackLineLayers + trackDotLayers)
  // waypoints = waypoint markers only (wptMarkerLayers)
  // polygons = polygon areas only (polygonLayers)
  const trackAllLayers=[...trackLineLayers,...trackDotLayers];
  const state={
    tracks:   {visible:true, opacity:1, layers:trackAllLayers,  eye:'vis-eye-tracks',   op:'vis-op-tracks',   pct:'vis-pct-tracks'},
    waypoints:{visible:true, opacity:1, layers:wptMarkerLayers, eye:'vis-eye-waypoints',op:'vis-op-waypoints', pct:'vis-pct-waypoints'},
    polygons: {visible:true, opacity:1, layers:polygonLayers,   eye:'vis-eye-polygons', op:'vis-op-polygons',  pct:'vis-pct-polygons'}
  };

  // Helper: apply opacity to any layer type without side-effects (no radius change for circles)
  function applyOpacity(l,op){
    if(!l.setStyle&&!l.setOpacity&&!l.getElement) return;
    if(l.setStyle){
      if(l instanceof L.CircleMarker && !(l instanceof L.Circle)){
        l.setStyle({opacity:op, fillOpacity:op});
      } else if(l instanceof L.Polygon){
        l.setStyle({opacity:op, fillOpacity:op*(l._baseFillOpacity!=null?l._baseFillOpacity:0.22)});
      } else {
        l.setStyle({opacity:op});
      }
    } else if(l.setOpacity){
      l.setOpacity(op);
    }
    // Also fade the DOM element (catches DivIcon markers like start/km markers)
    const el=l.getElement&&l.getElement();
    if(el)el.style.opacity=op;
  }

  Object.entries(state).forEach(([type,s])=>{
    const eyeBtn=document.getElementById(s.eye);
    const opSlider=document.getElementById(s.op);
    const pctEl=document.getElementById(s.pct);

    eyeBtn.addEventListener('click',function(){
      s.visible=!s.visible;
      eyeBtn.style.opacity=s.visible?'1':'0.35';

      // Set _userHidden on every layer in this group and add/remove from map
      s.layers.forEach(l=>{
        l._userHidden=!s.visible;
        if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });

      // Track toggle: show/hide track labels (NOT waypoint labels)
      if(type==='tracks'){
        labelLayers.forEach(l=>{
          if(l._wptLabel||l._polLabel) return;
          l._userHidden=!s.visible;
          if(l.setText){
            if(!s.visible) l.setText(null);
          } else {
            if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
            else { if(map.hasLayer(l)) map.removeLayer(l); }
          }
        });
      }
      // Polygons toggle: show/hide polygon labels
      if(type==='polygons'){
        labelLayers.forEach(l=>{
          if(!l._polLabel) return;
          l._userHidden=!s.visible;
          if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
          else { if(map.hasLayer(l)) map.removeLayer(l); }
        });
      }

      // Waypoints toggle: show/hide waypoint labels
      if(type==='waypoints'){
        labelLayers.forEach(l=>{
          if(!l._wptLabel) return;
          l._userHidden=!s.visible;
          if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
          else { if(map.hasLayer(l)) map.removeLayer(l); }
        });
      }

      // Re-run zoom logic so layers respect zoom range when being shown again
      if(s.visible) updateLabels();
    });

    opSlider.addEventListener('input',function(){
      const op=parseInt(opSlider.value)/100;
      s.opacity=op;
      pctEl.textContent=opSlider.value+'%';
      s.layers.forEach(l=>applyOpacity(l,op));
      // Track opacity also fades track labels (not waypoint labels)
      if(type==='tracks') labelLayers.forEach(l=>{if(!l._wptLabel&&!l._polLabel)applyOpacity(l,op);});
      if(type==='waypoints') labelLayers.forEach(l=>{if(l._wptLabel)applyOpacity(l,op);});
      if(type==='polygons') labelLayers.forEach(l=>{if(l._polLabel)applyOpacity(l,op);});
    });
  });

  // Hide polygon row if there are no polygons in the baked-in data
  const hasPolygons=D.some(f=>(f.polygons||[]).length>0);
  if(!hasPolygons) document.getElementById('vis-row-polygons').style.display='none';
  const hasWaypoints=D.some(f=>f.waypoints.length>0);
  if(!hasWaypoints) document.getElementById('vis-row-waypoints').style.display='none';
  const hasTracks=D.some(f=>f.tracks.length>0);
  if(!hasTracks) document.getElementById('vis-row-tracks').style.display='none';
  // Hide the entire vis-overlay if there is no baked-in data at all
  if(!hasTracks&&!hasWaypoints&&!hasPolygons){
    document.getElementById('vis-overlay').style.display='none';
  }
}

// =====================================================================
// User route loader: load GPX / GeoJSON and display on map
// =====================================================================
(function(){
  const USER_COLORS=['#e74c3c','#8e44ad','#16a085','#d35400','#2471a3','#1e8449','#b7950b','#717d7e'];
  let userRoutes=[]; // {name, visible, opacity, color, lineWidth, showArrows, showLabel, layers:[], bounds}
  let colorIdx=0;

  function parseUserGPX(text){
    try{
      const doc=new DOMParser().parseFromString(text,'application/xml');
      const tracks=[];const wpts=[];
      doc.querySelectorAll('trk,rte').forEach(el=>{
        const pts=[];
        el.querySelectorAll('trkpt,rtept').forEach(pt=>{
          const la=parseFloat(pt.getAttribute('lat')),lo=parseFloat(pt.getAttribute('lon'));
          if(!isNaN(la)&&!isNaN(lo))pts.push([la,lo]);
        });
        if(pts.length)tracks.push({name:el.querySelector('name')?.textContent||'',coords:pts});
      });
      doc.querySelectorAll('wpt').forEach(w=>{
        const la=parseFloat(w.getAttribute('lat')),lo=parseFloat(w.getAttribute('lon'));
        if(!isNaN(la)&&!isNaN(lo))wpts.push({lat:la,lon:lo,name:w.querySelector('name')?.textContent||'',desc:w.querySelector('desc')?.textContent||''});
      });
      return{tracks:mergeUserTracksIntoOne(tracks),waypoints:wpts};
    }catch(e){return null;}
  }

  // A GPX/GeoJSON route made of many segments (multiple <trk>/<trkseg> or a
  // MultiLineString) should appear as ONE track: one row in the list, one line
  // on the map, one name, one total length. Concatenate all point lists in
  // order and keep the first available name.
  function mergeUserTracksIntoOne(tracks){
    if(!tracks||tracks.length<=1)return tracks||[];
    const coords=[];let name='';
    tracks.forEach(t=>{
      if(!name && t.name && t.name.trim())name=t.name.trim();
      for(const c of t.coords)coords.push(c);
    });
    return coords.length?[{name,coords}]:[];
  }

  function parseUserGeoJSON(text){
    try{
      const gj=JSON.parse(text);
      const tracks=[];const waypoints=[];const polygons=[];
      function handleGeom(geom,props){
        if(!geom)return;
        const name=(props&&(props.name||props.title||props.Name||props.NAME))||'';
        const desc=(props&&(props.desc||props.description||props.Description))||'';
        if(geom.type==='LineString'){
          const c=geom.coordinates.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
          if(c.length)tracks.push({name,coords:c});
        } else if(geom.type==='MultiLineString'){
          geom.coordinates.forEach(line=>{
            const c=line.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
            if(c.length)tracks.push({name,coords:c});
          });
        } else if(geom.type==='Polygon'){
          const rings=geom.coordinates.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
          if(rings.length)polygons.push({name,desc,rings});
        } else if(geom.type==='MultiPolygon'){
          geom.coordinates.forEach(poly=>{
            const rings=poly.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
            if(rings[0]&&rings[0].length)polygons.push({name,desc,rings});
          });
        } else if(geom.type==='Point'){
          const c=geom.coordinates;
          if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});
        } else if(geom.type==='MultiPoint'){
          geom.coordinates.forEach(c=>{if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});});
        } else if(geom.type==='GeometryCollection'){
          geom.geometries.forEach(g=>handleGeom(g,props));
        }
      }
      const features=(gj.type==='FeatureCollection')?gj.features:(gj.type==='Feature')?[gj]:[{type:'Feature',geometry:gj,properties:{}}];
      features.forEach(ft=>{if(ft&&ft.geometry)handleGeom(ft.geometry,ft.properties||{});});
      return{tracks:mergeUserTracksIntoOne(tracks),waypoints,polygons};
    }catch(e){return null;}
  }

  function buildArrowDecorator(coords, color){
    // Arrows at 1km, 4km, 7km, 10km... (first at 1km then every 3km)
    // Clicking shows only the km distance — no route name
    const arrows=[];
    let dist=0, nextArrow=1000;
    function hvDist(a,b){
      const R=6371000,lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180;
      const dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    function brng(a,b){
      const lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      return(Math.atan2(Math.sin(dLon)*Math.cos(lat2),Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon))*180/Math.PI+360)%360;
    }
    for(let i=0;i<coords.length-1;i++){
      const seg=hvDist(coords[i],coords[i+1]);
      while(dist+seg>=nextArrow){
        const t=(nextArrow-dist)/seg;
        const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
        const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
        const deg=brng(coords[i],coords[i+1]);
        const kmLabel=Math.round(nextArrow/1000)+' km';
        const svg='<svg width="18" height="18" viewBox="0 0 18 18" style="transform:rotate('+deg+'deg)"><polygon points="9,1 14,16 9,11 4,16" fill="'+color+'" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/></svg>';
        const marker=L.marker([lat,lon],{
          icon:L.divIcon({className:'',html:svg,iconSize:[18,18],iconAnchor:[9,9]}),
          interactive:true, zIndexOffset:100
        });
        marker.bindPopup(kmLabel);
        arrows.push(marker);
        nextArrow+=1000;  // every 1km
      }
      dist+=seg;
    }
    return arrows;
  }


  // Helper: render polygon as Leaflet layer — MultiPolygon via L.geoJSON, plain via L.polygon
  function addUserRoute(name, parsed, color, lineWidth, preset){
    const lyrGroup=[];
    const allCoords=[];

    // Calculate total track length for km suffix
    function trackKm(coords){
      let d=0;
      for(let i=1;i<coords.length;i++){
        const R=6371000,lat1=coords[i-1][0]*Math.PI/180,lat2=coords[i][0]*Math.PI/180;
        const dLat=(coords[i][0]-coords[i-1][0])*Math.PI/180,dLon=(coords[i][1]-coords[i-1][1])*Math.PI/180;
        const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
        d+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      }
      return d/1000;
    }

    // Compute km suffix: only when file has exactly 1 track and no waypoints/polygons
    const hasSingleTrack=parsed.tracks.length===1&&!parsed.waypoints.length&&!(parsed.polygons||[]).length;
    let kmSuffix='';
    if(hasSingleTrack&&parsed.tracks[0].coords.length>1){
      const km=trackKm(parsed.tracks[0].coords);
      kmSuffix=' ('+km.toFixed(1).replace('.',',')+' km)';
    }
    // When restoring from storage, keep the exact saved name/suffix instead of recomputing.
    if(preset){ kmSuffix=preset.kmSuffix||''; }
    // Display name in list gets the suffix; label on map uses track name + suffix
    const displayName=preset?preset.name:(name+kmSuffix);
    parsed.tracks.forEach(t=>{
      allCoords.push(...t.coords);
      const poly=L.polyline(t.coords,{color,weight:4,opacity:0.85}).addTo(map);
      const popupName=t.name||name;
      poly.bindPopup('<b>'+popupName+'</b>');
      poly._isLine=true;
      lyrGroup.push(poly);
    });
    (parsed.polygons||[]).forEach(p=>{
      allCoords.push(...p.rings[0]);
      const poly=L.polygon(p.rings,{color,fillColor:color,fillOpacity:0.2,weight:lineWidth||2,opacity:0.85}).addTo(map);
      if(p.name||p.desc)poly.bindPopup('<b>'+(p.name||name)+'</b>'+(p.desc?'<br>'+p.desc:''));
      lyrGroup.push(poly);
    });
    parsed.waypoints.forEach(w=>{
      allCoords.push([w.lat,w.lon]);
      const m=L.circleMarker([w.lat,w.lon],{radius:lineWidth||8,color,fillColor:color,fillOpacity:.85,weight:1}).addTo(map);
      if(w.name||w.desc)m.bindPopup('<b>'+(w.name||name)+'</b>'+(w.desc?'<br>'+w.desc:''));
      lyrGroup.push(m);
    });
    const lats=allCoords.map(p=>p[0]),lons=allCoords.map(p=>p[1]);
    const bounds=allCoords.length?[[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]]:null;
    const idx=userRoutes.length;
    // Defaults match input HTML per geometry type
    const hasTrk=parsed.tracks.length>0;
    const hasWpt=!hasTrk&&parsed.waypoints.length>0;
    const routeDefaults=hasTrk
      ? {lineWidth:5,showArrows:true,showLabel:true,labelMode:'nametag',useElementName:true,labelPos:'start',showStart:true,showKmMarkers:true,showTrackDist:true,labelZoomMin:14,labelZoomMax:22,labelFontSize:24,mapZoomMin:1,mapZoomMax:22}
      : hasWpt
      ? {lineWidth:8,showArrows:false,showLabel:true,labelMode:'nametag',useElementName:true,labelPos:'centroid',showStart:false,showKmMarkers:false,showTrackDist:false,labelZoomMin:15,labelZoomMax:22,labelFontSize:24,mapZoomMin:1,mapZoomMax:22}
      : {lineWidth:2,showArrows:false,showLabel:true,labelMode:'nametag',useElementName:true,labelPos:'centroid',showStart:false,showKmMarkers:false,showTrackDist:false,labelZoomMin:15,labelZoomMax:22,labelFontSize:24,mapZoomMin:1,mapZoomMax:22};
    userRoutes.push({name:displayName,visible:true,opacity:0.85,color,fillOpacity:0.2,...routeDefaults,lineWidth:lineWidth||routeDefaults.lineWidth,layers:lyrGroup,arrowLayers:[],labelLayer:null,startLayer:null,bounds,parsed,kmSuffix,customName:preset?!!preset.customName:false});
    // Fit map to route bounds
    if(bounds&&!preset)map.fitBounds(bounds,{padding:[24,24]});
    // Apply label immediately and ensure layers render. Guarded so that an
    // unexpected error here (e.g. an odd property in an imported/BRouter
    // file) can never silently skip adding the row to the list below.
    try{ applyRouteStyle(idx); }catch(e){ console.error('applyRouteStyle failed for "'+displayName+'":',e); }
    // Keep the recorded GPS trail above newly imported tracks, if it exists
    if(typeof bringTrailToFront==='function') bringTrailToFront();
    // Rebuild the route list panel
    try{ renderRouteList(); }catch(e){ console.error('renderRouteList failed:',e); }
    if(preset){
      if(preset.visible===false) setRouteVisible(idx,false);
    } else {
      // Open the panel so user sees the new entry
      document.getElementById('route-panel').classList.add('open');
      saveRoutesToStorage();
    }
  }

  function zoomInRange(r){
    const zmin=r.labelZoomMin!=null?r.labelZoomMin:1;
    const zmax=r.labelZoomMax!=null?r.labelZoomMax:22;
    const z=map.getZoom();
    return z>=zmin&&z<=zmax;
  }

  function elemZoomInRange(r){
    const zmin=r.mapZoomMin!=null?r.mapZoomMin:1;
    const zmax=r.mapZoomMax!=null?r.mapZoomMax:22;
    const z=map.getZoom();
    return z>=zmin&&z<=zmax;
  }

  function updateUserRouteLabelVisibility(){
    userRoutes.forEach(r=>{
      if(!r.labelLayer)return;
      const show=r.visible&&r.showLabel!==false&&zoomInRange(r);
      if(show){ if(!map.hasLayer(r.labelLayer)) r.labelLayer.addTo(map); }
      else { if(map.hasLayer(r.labelLayer)) map.removeLayer(r.labelLayer); }
      if(r.startLayer){
        const showStart=r.visible&&zoomInRange(r);
        if(showStart){ if(!map.hasLayer(r.startLayer)) r.startLayer.addTo(map); }
        else { if(map.hasLayer(r.startLayer)) map.removeLayer(r.startLayer); }
      }
    });
  }
  map.on('zoomend', updateUserRouteLabelVisibility);

  function updateUserRouteElemVisibility(){
    userRoutes.forEach(r=>{
      const show=r.visible&&elemZoomInRange(r);
      (r.layers||[]).forEach(l=>{
        if(show){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });
      (r.arrowLayers||[]).forEach(l=>{
        if(show&&r.showArrows){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });
    });
  }
  map.on('zoomend', updateUserRouteElemVisibility);

  function applyRouteStyle(idx){
    const r=userRoutes[idx];
    // Remove old arrows, start icon, label
    r.arrowLayers.forEach(l=>map.removeLayer(l)); r.arrowLayers=[];
    if(r.startLayer){map.removeLayer(r.startLayer);r.startLayer=null;}
    if(r.labelLayer){map.removeLayer(r.labelLayer);r.labelLayer=null;}

    // Update geometry style
    r.layers.forEach(l=>{
      if(!l.setStyle) return;
      if(l instanceof L.CircleMarker&&!(l instanceof L.Circle)){
        l.setStyle({color:r.color,fillColor:r.color,weight:1,opacity:r.opacity,fillOpacity:r.opacity,radius:r.lineWidth||8});
      } else if(l instanceof L.Polygon){
        l.setStyle({color:r.color,fillColor:r.color,weight:r.lineWidth,opacity:r.opacity,fillOpacity:r.opacity*(r.fillOpacity!=null?r.fillOpacity:0.2)});
      } else {
        l.setStyle({color:r.color,weight:r.lineWidth,opacity:r.opacity});
      }
    });

    // Direction arrows
    if(r.showArrows){
      (r.parsed.tracks||[]).forEach(t=>{
        buildArrowDecorator(t.coords,r.color).forEach(a=>{
          if(r.visible)a.addTo(map);
          r.arrowLayers.push(a);
        });
      });
    }

    if(!r.showLabel) return;

    const halo=r.color.length===7?(parseInt(r.color.slice(1,3),16)*299+parseInt(r.color.slice(3,5),16)*587+parseInt(r.color.slice(5,7),16)*114)/1000>140?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.8)':'rgba(255,255,255,0.8)';
    const shadow='-1.5px -1.5px 0 '+halo+',1.5px -1.5px 0 '+halo+',-1.5px 1.5px 0 '+halo+',1.5px 1.5px 0 '+halo;

    const hasTracks=(r.parsed.tracks||[]).length>0;
    const hasWaypoints=(r.parsed.waypoints||[]).length>0;
    const hasPolygons=(r.parsed.polygons||[]).length>0;

    if(hasTracks){
      // Label at start point of first track
      const sp=r.parsed.tracks[0].coords[0];
      const labelText=r.customName
        ? r.name  // user renamed it in the Imported files list — honour that on the map too
        : (r.parsed.tracks[0].name
          ? r.parsed.tracks[0].name+(r.kmSuffix||'')
          : r.name);  // r.name already includes the km suffix when set

      // Start icon (circle with play arrow)
      r.startLayer=L.marker(sp,{
        icon:L.divIcon({
          className:'',
          html:'<div style="width:20px;height:20px;background:'+r.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4);transform:translate(-50%,-50%)"><span style="color:#fff;font-size:10px;margin-left:2px">&#9654;</span></div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:210
      });
      r.startLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      r.startLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
      if(r.visible&&zoomInRange(r))r.startLayer.addTo(map);

      // Label to the right of the start icon
      r.labelLayer=L.marker(sp,{
        icon:L.divIcon({
          className:'',
          html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+r.color+';font-size:'+(r.labelFontSize||24)+'px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(14px,-50%)">'+labelText+'</div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:200
      });
      r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
      if(r.visible&&zoomInRange(r))r.labelLayer.addTo(map);

    } else if(hasWaypoints){
      // Label next to EVERY waypoint with its own name
      r.labelLayer=L.layerGroup();
      r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
      r.parsed.waypoints.forEach(w=>{
        const labelText=w.name||r.name;
        const m=L.marker([w.lat,w.lon],{
          icon:L.divIcon({
            className:'',
            html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+r.color+';font-size:'+(r.labelFontSize||24)+'px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(10px,-50%)">'+labelText+'</div>',
            iconSize:[0,0],iconAnchor:[0,0]
          }),interactive:false,zIndexOffset:200
        });
        r.labelLayer.addLayer(m);
      });
      if(r.visible&&zoomInRange(r))r.labelLayer.addTo(map);

    } else if(hasPolygons&&r.bounds){
      // Per-polygon label if each has its own name,
      // combined centroid label if all share the same name (true MultiPolygon)
      const pnames=r.parsed.polygons.map(p=>p.name||'');
      const allSame=pnames.every(n=>n===pnames[0]);
      const makeImpLbl=(lat,lon,name)=>{
        const lbl=L.marker([lat,lon],{
          icon:L.divIcon({
            className:'',
            html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+r.color+';font-size:'+(r.labelFontSize||24)+'px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(-50%,-50%)">'+name+'</div>',
            iconSize:[0,0],iconAnchor:[0,0]
          }),interactive:false,zIndexOffset:200
        });
        if(r.visible&&zoomInRange(r)) lbl.addTo(map);
        return lbl;
      };
      if(allSame){
        const combinedName=pnames[0]||r.name;
        if(combinedName){
          const allPts=r.parsed.polygons.flatMap(p=>p.rings[0]);
          const cLat=allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
          const cLon=allPts.reduce((s,p)=>s+p[1],0)/allPts.length;
          r.labelLayer=makeImpLbl(cLat,cLon,combinedName);
          r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
          r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
        }
      } else {
        // Multiple labels — use a LayerGroup
        r.labelLayer=L.layerGroup();
        r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
        r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
        r.parsed.polygons.forEach(p=>{
          if(!p.name) return;
          const pts=p.rings[0];
          const cLat=pts.reduce((s,c)=>s+c[0],0)/pts.length;
          const cLon=pts.reduce((s,c)=>s+c[1],0)/pts.length;
          r.labelLayer.addLayer(makeImpLbl(cLat,cLon,p.name));
        });
        if(r.visible&&zoomInRange(r)) r.labelLayer.addTo(map);
      }
    }
  }

  function setRouteOpacity(idx,op){
    const r=userRoutes[idx];
    r.opacity=op;
    r.layers.forEach(l=>{
      if(!l.setStyle) return;
      if(l instanceof L.CircleMarker&&!(l instanceof L.Circle)){
        l.setStyle({opacity:op,fillOpacity:op});
      } else if(l instanceof L.Polygon){
        l.setStyle({opacity:op,fillOpacity:op*(r.fillOpacity!=null?r.fillOpacity:0.2)});
      } else {
        l.setStyle({opacity:op});
      }
    });
    r.arrowLayers.forEach(a=>{const el=a.getElement&&a.getElement();if(el)el.style.opacity=op;});
    // labelLayer can be a single Marker or a LayerGroup (for waypoints)
    if(r.labelLayer){
      if(r.labelLayer.eachLayer){
        r.labelLayer.eachLayer(l=>{const el=l.getElement&&l.getElement();if(el)el.style.opacity=op;});
      } else {
        const el=r.labelLayer.getElement&&r.labelLayer.getElement();if(el)el.style.opacity=op;
      }
    }
    if(r.startLayer){const el=r.startLayer.getElement&&r.startLayer.getElement();if(el)el.style.opacity=op;}
  }

  function setRouteColor(idx,color){
    userRoutes[idx].color=color;
    applyRouteStyle(idx);
  }

  function setRouteVisible(idx,vis){
    userRoutes[idx].visible=vis;
    userRoutes[idx].layers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    userRoutes[idx].arrowLayers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    if(userRoutes[idx].labelLayer){if(vis)map.addLayer(userRoutes[idx].labelLayer);else map.removeLayer(userRoutes[idx].labelLayer);}
    if(userRoutes[idx].startLayer){if(vis)map.addLayer(userRoutes[idx].startLayer);else map.removeLayer(userRoutes[idx].startLayer);}
  }

  // --- Persistence: remember imported routes across a browser reload / tab discard ---
  const ROUTES_KEY='PeeWeeTrails_routes__'+location.pathname;
  function serializeRoute(r){
    return {name:r.name,color:r.color,lineWidth:r.lineWidth,visible:r.visible!==false,customName:!!r.customName,kmSuffix:r.kmSuffix||'',parsed:r.parsed};
  }
  function saveRoutesToStorage(){
    try{ localStorage.setItem(ROUTES_KEY, JSON.stringify(userRoutes.map(serializeRoute))); }catch(e){}
  }
  function loadRoutesFromStorage(){
    let data=null;
    try{ const raw=localStorage.getItem(ROUTES_KEY); if(raw) data=JSON.parse(raw); }catch(e){}
    if(!Array.isArray(data)) return;
    data.forEach(rd=>{
      if(!rd||!rd.parsed) return;
      try{ addUserRoute(rd.name, rd.parsed, rd.color||'#e91e63', rd.lineWidth, {name:rd.name,kmSuffix:rd.kmSuffix||'',visible:rd.visible!==false,customName:!!rd.customName}); }catch(e){ console.error('restore route failed:',e); }
    });
    const rp=document.getElementById('route-panel'); if(rp) rp.classList.remove('open');
  }

  function removeUserRoute(idx){
    userRoutes[idx].layers.forEach(l=>map.removeLayer(l));
    userRoutes[idx].arrowLayers.forEach(l=>map.removeLayer(l));
    if(userRoutes[idx].labelLayer)map.removeLayer(userRoutes[idx].labelLayer);
    if(userRoutes[idx].startLayer)map.removeLayer(userRoutes[idx].startLayer);
    userRoutes.splice(idx,1);
    renderRouteList();
    saveRoutesToStorage();
  }

  function clearAllUserRoutes(){
    if(userRoutes.length===0) return;
    if(!confirm('Remove all '+userRoutes.length+' imported file(s) from the map?')) return;
    userRoutes.forEach(r=>{
      r.layers.forEach(l=>map.removeLayer(l));
      r.arrowLayers.forEach(l=>map.removeLayer(l));
      if(r.labelLayer)map.removeLayer(r.labelLayer);
      if(r.startLayer)map.removeLayer(r.startLayer);
    });
    userRoutes.length=0;
    renderRouteList();
    saveRoutesToStorage();
  }

  // Small geometry-type icon (track / waypoint / polygon), matches input HTML styling
  function labelGeomIconHtml(type,color,sizePx){
    // Always black + 3 distinct shapes, regardless of element color (see input HTML for rationale).
    const sz=sizePx||16;
    if(type==='wpt') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><circle cx="9" cy="9" r="5" fill="#000" stroke="#fff" stroke-width="1.5"/></svg>';
    if(type==='pol') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><polygon points="9,3 15,15 3,15" fill="none" stroke="#000" stroke-width="1.8" stroke-linejoin="round"/></svg>';
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><path d="M2,15 Q5,3 9,9 T16,3" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>';
  }
  function geomIconSvg(r,color){
    const hasTrk=(r.parsed.tracks||[]).length>0;
    const hasWpt=!hasTrk&&(r.parsed.waypoints||[]).length>0;
    return labelGeomIconHtml(hasTrk?'trk':hasWpt?'wpt':'pol',color).replace('style="vertical-align:middle;flex:0 0 auto"','style="flex:0 0 auto" title="'+(hasTrk?'Track':hasWpt?'Waypoint':'Polygon')+'"');
  }

          '<span class="ro-label">px</span></span>'+
          (hasPol?(
          '<span class="ro-group" style="margin-left:6px"><span class="ro-label" title="Fill opacity of the polygon area. 0% = fully transparent (outline only), 100% = fully solid.">Fill</span>'+
          '<input type="number" min="0" max="100" step="5" value="'+fillVal+'" class="ur-fill" style="width:48px">'+

          ):'')+

        '</div>'+
        '<div class="route-options-row">'+
          '<span class="ro-label" title="Element visible from this zoom level (up to 22)">Min zoom</span>'+
          '<input type="number" min="1" max="22" value="'+elZoomMin+'" class="ur-zoommin" style="width:48px">'+
          '<span class="ro-label" style="margin-left:10px" title="Label visible from this zoom level (up to 22)">Label zoom</span>'+
          '<input type="number" min="1" max="22" value="'+lblZoomMin+'" class="ur-lblzoommin" style="width:48px">'+
        '</div>'+
        '<div class="route-options-row">'+
          '<button class="route-fly ro-fly-btn" title="Fit map to this route" data-i="'+i+'">&#x2316; Fit to route</button>'+

      el.appendChild(detail);

      row.querySelector('.ur-color').addEventListener('input',e=>{userRoutes[i].color=e.target.value;applyRouteStyle(i);saveRoutesToStorage();});
      const _nameInp=row.querySelector('.route-name-edit');
      if(_nameInp){
        _nameInp.value=userRoutes[i].name;
        _nameInp.title=userRoutes[i].name;
        _nameInp.addEventListener('click',e=>e.stopPropagation());
        _nameInp.addEventListener('focus',e=>{ e.target.select(); });
        _nameInp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); e.target.blur(); } });
        _nameInp.addEventListener('change',e=>{
          const v=e.target.value.trim();
          if(v){ userRoutes[i].name=v; userRoutes[i].customName=true; e.target.title=v; applyRouteStyle(i); saveRoutesToStorage(); }

      row.querySelector('.route-more').addEventListener('click',e=>{

        // Only one detail panel open at a time, to keep the list manageable
        el.querySelectorAll('.route-detail-panel.open').forEach(p=>p.classList.remove('open'));

      detail.querySelector('.ur-op').addEventListener('input',e=>{

      });

        updateUserRouteElemVisibility();

        userRoutes[i].labelZoomMin=Math.max(1,Math.min(19,parseInt(e.target.value)||1));
