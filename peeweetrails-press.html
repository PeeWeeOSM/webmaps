// Simple average centroid (used as a first estimate for label position)
function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];

function nearestPointOnLine(point, lineCoords){
  if(lineCoords.length===0) return point;
  if(lineCoords.length===1) return lineCoords[0];
  let best=lineCoords[0], bestDist=Infinity;
  for(let i=0;i<lineCoords.length-1;i++){

    const d=Math.hypot(point[0]-proj[0], point[1]-proj[1]);
    if(d<bestDist){ bestDist=d; best=proj; }

  return best;

  for(let i=0;i<coords.length-1;i++){
    const segDist=haversineMeters(coords[i],coords[i+1]);
    while(cumDist+segDist>=nextKm){
      const t=(nextKm-cumDist)/segDist;
      const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
      const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
      markers.push({position:[lat,lon], bearing:bearingPoints(coords[i],coords[i+1]), km:nextKm/1000});
      nextKm+=1000;
    }
    cumDist+=segDist;
  }
  return markers;
}

function simplifyLine(points, tolerance){
  if(points.length<3) return points;
  function perpDist(pt,a,b){
    const dx=b[0]-a[0], dy=b[1]-a[1];
    if(dx===0&&dy===0) return Math.hypot(pt[0]-a[0],pt[1]-a[1]);
    const t=((pt[0]-a[0])*dx+(pt[1]-a[1])*dy)/(dx*dx+dy*dy);
    const tc=Math.max(0,Math.min(1,t));
    const px=a[0]+tc*dx, py=a[1]+tc*dy;
    return Math.hypot(pt[0]-px,pt[1]-py);
  }
  function dp(pts,tol){
    if(pts.length<3) return pts;
    let maxD=0,idx=0;
    for(let i=1;i<pts.length-1;i++){
      const d=perpDist(pts[i],pts[0],pts[pts.length-1]);
      if(d>maxD){maxD=d;idx=i;}
    }
    if(maxD>tol){
      const left=dp(pts.slice(0,idx+1),tol);
      const right=dp(pts.slice(idx),tol);
      return left.slice(0,-1).concat(right);
    }
    return [pts[0],pts[pts.length-1]];
  }
  return dp(points,tolerance);
}

function buildTextPathLine(coords, labelLength){
  // Return a straight two-point line through the track midpoint so letters
  // always render at a single consistent angle (no per-letter rotation).
  if(coords.length<2) return coords;
  if(coords.length===2) return normalizeDirection(coords);
  const dists=[0];
  for(let i=1;i<coords.length;i++){
    const a=coords[i-1],b=coords[i];
    const dx=b[1]-a[1],dy=b[0]-a[0];
    dists.push(dists[i-1]+Math.sqrt(dx*dx+dy*dy));
  }
  const total=dists[dists.length-1];
  const charSpan=Math.min(0.6,Math.max(0.2,(labelLength||10)*0.018));
  const halfSpan=charSpan/2;
  const mid=total*0.5;
  let midIdx=0;
  for(let i=0;i<dists.length;i++){if(dists[i]>=mid){midIdx=i;break;}}
  let startIdx=midIdx,endIdx=midIdx;
  while(startIdx>0&&dists[midIdx]-dists[startIdx]<total*halfSpan)startIdx--;
  while(endIdx<coords.length-1&&dists[endIdx]-dists[midIdx]<total*halfSpan)endIdx++;
  return normalizeDirection([coords[startIdx],coords[endIdx]]);
}

function normalizeDirection(coords){
  if(coords.length<2) return coords;
  const start=coords[0], end=coords[coords.length-1];
  const dLon=end[1]-start[1];
  const dLat=end[0]-start[0];
  const goingLeft = Math.abs(dLon) >= Math.abs(dLat) ? dLon < 0 : dLat < 0;
  return goingLeft ? coords.slice().reverse() : coords;
}

function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

function getLabelText(f, elementName){
  if(f.useElementName && elementName && elementName.trim()) return elementName.trim();

}

// --- Status in URL: extent en laag-zichtbaarheid kunnen via #-hash gedeeld worden ---
// --- URL hash state: map position and layer visibility are stored in the #hash
//     so the user can bookmark or share the exact current map view ---
function parseStateFromHash(){
  if(!location.hash || location.hash.length<2) return null;
  const params=new URLSearchParams(location.hash.slice(1));
  const lat=parseFloat(params.get('lat'));
  const lng=parseFloat(params.get('lng'));
  const z=parseInt(params.get('z'));
  const layersParam=params.get('layers');
  const out={};
  if(!isNaN(lat)&&!isNaN(lng)&&!isNaN(z)){ out.lat=lat; out.lng=lng; out.z=z; }
  if(layersParam!=null){ out.layerVis=layersParam.split(',').map(v=>v==='1'); }
  return Object.keys(out).length?out:null;
}

function updateUrlHash(){
  const c=map.getCenter();
  const params=new URLSearchParams();
  params.set('lat',c.lat.toFixed(6));
  params.set('lng',c.lng.toFixed(6));
  params.set('z',map.getZoom());
  if(wmsLayerObjs.length){
    params.set('layers',wmsLayerObjs.map(lo=>map.hasLayer(lo.layer)?'1':'0').join(','));
  }
  history.replaceState(null,'','#'+params.toString());
}

function updateLabels(){
  const z=map.getZoom();

  // --- Track labels (textpath + floating DivIcon) ---
  labelLayers.forEach(l=>{
    // If user toggled off: ensure removed from map and skip
    if(l._userHidden){
      if(l.setText) l.setText(null);
      else if(map.hasLayer(l)) map.removeLayer(l);
      return;
    }
    const visible=z>=l._zoomMin&&z<=l._zoomMax;
    if(l.setText){
      // Textpath: set/clear text based on zoom
      if(visible){
        const f=l._gpxFile;
        const h=contrastHalo(f.color);
        const mainLabel=getLabelText(f,f.tracks[0]&&f.tracks[0].name);
        l.setText(null);
        l.setText(mainLabel,{center:true,repeat:false,attributes:{'font-size':'24px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else {
        l.setText(null);
      }
    } else {
      // Floating DivIcon label: add/remove from map based on zoom
      if(visible){ if(!map.hasLayer(l)) map.addLayer(l); }
      else { if(map.hasLayer(l)) map.removeLayer(l); }
    }
  });

  // --- Waypoint markers ---
  wptMarkerLayers.forEach(m=>{
    if(m._userHidden){ if(map.hasLayer(m)) map.removeLayer(m); return; }
    const visible=z>=m._trackZoomMin&&z<=m._trackZoomMax;
    if(visible){ if(!map.hasLayer(m)) map.addLayer(m); }
    else { if(map.hasLayer(m)) map.removeLayer(m); }
  });

  // --- Track lines, start/km dots, polygons ---
  zoomLayers.forEach(l=>{
    if(l._userHidden){ if(map.hasLayer(l)) map.removeLayer(l); return; }
    const visible=z>=l._trackZoomMin&&z<=l._trackZoomMax;
    if(visible){ if(!map.hasLayer(l)) map.addLayer(l); }
    else { if(map.hasLayer(l)) map.removeLayer(l); }
  });
}

function haversineMeters(p1,p2){
  const R=6371000;
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLat=(p2[0]-p1[0])*Math.PI/180, dLon=(p2[1]-p1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Trim the trail: with 'full' everything is kept (whole ride, even after 50km), with 'distance'
// only the points within the last TRAIL_METERS meters (measured along the path) are kept.
function trimTrail(history){
  if(TRAIL_MODE==='full' || history.length<2) return history;
  let acc=0;
  let cutIdx=0;
  for(let i=history.length-1;i>0;i--){
    acc+=haversineMeters(history[i-1],history[i]);
    if(acc>=TRAIL_METERS){ cutIdx=i-1; break; }
    cutIdx=0;
  }
  return history.slice(cutIdx);
}

function bearing(p1,p2){
  // peiling in graden van p1 naar p2 (0=noord)
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// Pointed triangle as SVG: rotation center exactly at the center of the shape, no skewed rendering
function makeDirIcon(deg){
  return L.divIcon({
    className:'',
    html:'<svg width="46" height="46" viewBox="0 0 46 46" style="transform:rotate('+deg+'deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">'
        +'<polygon points="23,2 31,39 23,29 15,39" fill="'+TRAIL_COLOR+'" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>'
        +'</svg>',
    iconSize:[46,46],
    iconAnchor:[23,23]
  });
}

function stopLoc(){
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  locBtn.classList.remove('on');locBtn.innerHTML='&#9737;';
  if(locTrail){map.removeLayer(locTrail);locTrail=null;}
  if(lc){map.removeLayer(lc);lc=null;}
  if(dirMarker){map.removeLayer(dirMarker);dirMarker=null;}
  followZoom=null;
  locHistory=[];
}

// Detect manual map interaction (drag/zoom by user) to temporarily pause auto-centering
map.on('dragstart zoomstart',function(){
  if(!programmaticMove) lastUserInteraction=Date.now();
});

locBtn.onclick=function(){
  if(wid!==null){stopLoc();return;}
  if(!navigator.geolocation){alert('GPS is not available in this browser.');return;}
  locBtn.innerHTML='&#8987;';

  wid=navigator.geolocation.watchPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    locBtn.classList.add('on');locBtn.innerHTML='&#9737;';

    // update trail: with 'distance' only keep last X meters, with 'full' keep everything
    locHistory.push(ll);
    locHistory=trimTrail(locHistory);

    // determine bearing: use GPS heading if available, otherwise compute from trail
    let deg=0;
    if(p.coords.heading!=null && !isNaN(p.coords.heading)){
      deg=p.coords.heading;
    } else if(locHistory.length>=2){
      deg=bearing(locHistory[0],locHistory[locHistory.length-1]);
    }

    if(locTrail){
      locTrail.setLatLngs(locHistory);
      lc.setLatLng(ll).setRadius(p.coords.accuracy);
      dirMarker.setLatLng(ll).setIcon(makeDirIcon(deg));
    } else {
      lc=L.circle(ll,{radius:p.coords.accuracy,color:TRAIL_COLOR,fillColor:TRAIL_COLOR,fillOpacity:.12,weight:1}).addTo(map);
      locTrail=L.polyline(locHistory,{color:TRAIL_COLOR,weight:TRAIL_WIDTH,opacity:.85,lineCap:'round'}).addTo(map);
      dirMarker=L.marker(ll,{icon:makeDirIcon(deg),interactive:false,zIndexOffset:500}).addTo(map).bindPopup('Your location');
    }

    const idleLongEnough=(Date.now()-lastUserInteraction)>=FOLLOW_RESUME_DELAY;

    if(OPT_FOLLOW && idleLongEnough){
      // lock zoom level once at start of following, don't re-query during animation
      if(followZoom===null) followZoom=Math.max(map.getZoom(),16);
      programmaticMove=true;
      map.setView(ll, followZoom, {animate:false});
      programmaticMove=false;
    } else if(!dirMarker._shown){
      programmaticMove=true;
      map.setView(ll, Math.max(map.getZoom(),16));
      programmaticMove=false;
      dirMarker._shown=true;
    }
  },function(e){
    stopLoc();
    alert('Location unavailable: '+e.message);
  },{enableHighAccuracy:true,maximumAge:1000});
};

// If user manually zooms while following is active, remember new zoom level instead of snapping back
map.on('zoomend',function(){
  if(OPT_FOLLOW && wid!==null) followZoom=map.getZoom();
});

// --- Visibility panel: toggle and opacity control per geometry type ---
// Each geometry type (tracks, waypoints, polygons) can be shown/hidden
// and faded independently via the eye-button dropdown (left controls).
{
  const visBtn=document.getElementById('vis-btn');
  const visPanel=document.getElementById('vis-panel');

  // Open/close the panel when clicking the eye button
  visBtn.onclick=function(e){e.stopPropagation();visPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    const overlay=document.getElementById('vis-overlay');
    if(!overlay.contains(e.target))visPanel.classList.remove('open');
  });

  // State per geometry type — strictly separate, zero overlap between arrays:
  // tracks = lines + start dots + km markers (trackLineLayers + trackDotLayers)
  // waypoints = waypoint markers only (wptMarkerLayers)
  // polygons = polygon areas only (polygonLayers)
  const trackAllLayers=[...trackLineLayers,...trackDotLayers];
  const state={
    tracks:   {visible:true, opacity:1, layers:trackAllLayers,  eye:'vis-eye-tracks',   op:'vis-op-tracks',   pct:'vis-pct-tracks'},
    waypoints:{visible:true, opacity:1, layers:wptMarkerLayers, eye:'vis-eye-waypoints',op:'vis-op-waypoints', pct:'vis-pct-waypoints'},
    polygons: {visible:true, opacity:1, layers:polygonLayers,   eye:'vis-eye-polygons', op:'vis-op-polygons',  pct:'vis-pct-polygons'}
  };

  // Helper: apply opacity to any layer type without side-effects (no radius change for circles)
  function applyOpacity(l,op){
    if(!l.setStyle&&!l.setOpacity&&!l.getElement) return;
    if(l.setStyle){
      if(l instanceof L.CircleMarker && !(l instanceof L.Circle)){
        l.setStyle({opacity:op, fillOpacity:op});
      } else if(l instanceof L.Polygon){
        l.setStyle({opacity:op, fillOpacity:op*0.22});
      } else {
        l.setStyle({opacity:op});
      }
    } else if(l.setOpacity){
      l.setOpacity(op);
    }
    // Also fade the DOM element (catches DivIcon markers like start/km markers)
    const el=l.getElement&&l.getElement();
    if(el)el.style.opacity=op;
  }

  Object.entries(state).forEach(([type,s])=>{
    const eyeBtn=document.getElementById(s.eye);
    const opSlider=document.getElementById(s.op);
    const pctEl=document.getElementById(s.pct);

    eyeBtn.addEventListener('click',function(){
      s.visible=!s.visible;
      eyeBtn.style.opacity=s.visible?'1':'0.35';

      // Set _userHidden on every layer in this group and add/remove from map
      s.layers.forEach(l=>{
        l._userHidden=!s.visible;
        if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });

      // Track toggle: show/hide track labels (NOT waypoint labels)
      if(type==='tracks'){
        labelLayers.forEach(l=>{
          if(l._wptLabel) return;
          l._userHidden=!s.visible;
          if(l.setText){
            if(!s.visible) l.setText(null);
            // if visible, updateLabels() below will re-apply text at correct zoom
          } else {
            if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
            else { if(map.hasLayer(l)) map.removeLayer(l); }
          }
        });
      }

      // Waypoints toggle: show/hide waypoint labels
      if(type==='waypoints'){
        labelLayers.forEach(l=>{
          if(!l._wptLabel) return;
          l._userHidden=!s.visible;
          if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
          else { if(map.hasLayer(l)) map.removeLayer(l); }
        });
      }

      // Re-run zoom logic so layers respect zoom range when being shown again
      if(s.visible) updateLabels();
    });

    opSlider.addEventListener('input',function(){
      const op=parseInt(opSlider.value)/100;
      s.opacity=op;
      pctEl.textContent=opSlider.value+'%';
      s.layers.forEach(l=>applyOpacity(l,op));
      // Track opacity also fades track labels (not waypoint labels)
      if(type==='tracks') labelLayers.forEach(l=>{if(!l._wptLabel)applyOpacity(l,op);});
      // Waypoint opacity also fades waypoint labels
      if(type==='waypoints') labelLayers.forEach(l=>{if(l._wptLabel)applyOpacity(l,op);});
    });
  });

  // Hide polygon row if there are no polygons in the baked-in data
  const hasPolygons=D.some(f=>(f.polygons||[]).length>0);
  if(!hasPolygons) document.getElementById('vis-row-polygons').style.display='none';
  const hasWaypoints=D.some(f=>f.waypoints.length>0);
  if(!hasWaypoints) document.getElementById('vis-row-waypoints').style.display='none';
  const hasTracks=D.some(f=>f.tracks.length>0);
  if(!hasTracks) document.getElementById('vis-row-tracks').style.display='none';
  // Hide the entire vis-overlay if there is no baked-in data at all
  if(!hasTracks&&!hasWaypoints&&!hasPolygons){
    document.getElementById('vis-overlay').style.display='none';
  }
}

// =====================================================================
// User route loader: load GPX / GeoJSON and display on map
// =====================================================================
(function(){
  const USER_COLORS=['#e74c3c','#8e44ad','#16a085','#d35400','#2471a3','#1e8449','#b7950b','#717d7e'];
  let userRoutes=[]; // {name, visible, opacity, color, lineWidth, showArrows, showLabel, layers:[], bounds}
  let colorIdx=0;

  function parseUserGPX(text){
    try{
      const doc=new DOMParser().parseFromString(text,'application/xml');
      const tracks=[];const wpts=[];
      doc.querySelectorAll('trk,rte').forEach(el=>{
        const pts=[];
        el.querySelectorAll('trkpt,rtept').forEach(pt=>{
          const la=parseFloat(pt.getAttribute('lat')),lo=parseFloat(pt.getAttribute('lon'));
          if(!isNaN(la)&&!isNaN(lo))pts.push([la,lo]);
        });
        if(pts.length)tracks.push({name:el.querySelector('name')?.textContent||'',coords:pts});
      });
      doc.querySelectorAll('wpt').forEach(w=>{
        const la=parseFloat(w.getAttribute('lat')),lo=parseFloat(w.getAttribute('lon'));
        if(!isNaN(la)&&!isNaN(lo))wpts.push({lat:la,lon:lo,name:w.querySelector('name')?.textContent||'',desc:w.querySelector('desc')?.textContent||''});
      });
      return{tracks,waypoints:wpts};
    }catch(e){return null;}
  }

  function parseUserGeoJSON(text){
    try{
      const gj=JSON.parse(text);
      const tracks=[];const waypoints=[];const polygons=[];
      function handleGeom(geom,props){
        if(!geom)return;
        const name=(props&&(props.name||props.title||props.Name||props.NAME))||'';
        const desc=(props&&(props.desc||props.description||props.Description))||'';
        if(geom.type==='LineString'){
          const c=geom.coordinates.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
          if(c.length)tracks.push({name,coords:c});
        } else if(geom.type==='MultiLineString'){
          geom.coordinates.forEach(line=>{
            const c=line.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
            if(c.length)tracks.push({name,coords:c});
          });
        } else if(geom.type==='Polygon'){
          const rings=geom.coordinates.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
          if(rings.length)polygons.push({name,desc,rings});
        } else if(geom.type==='MultiPolygon'){
          geom.coordinates.forEach(poly=>{
            const rings=poly.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
            if(rings.length)polygons.push({name,desc,rings});
          });
        } else if(geom.type==='Point'){
          const c=geom.coordinates;
          if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});
        } else if(geom.type==='MultiPoint'){
          geom.coordinates.forEach(c=>{if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});});
        } else if(geom.type==='GeometryCollection'){
          geom.geometries.forEach(g=>handleGeom(g,props));
        }
      }
      const features=(gj.type==='FeatureCollection')?gj.features:(gj.type==='Feature')?[gj]:[{type:'Feature',geometry:gj,properties:{}}];
      features.forEach(ft=>{if(ft&&ft.geometry)handleGeom(ft.geometry,ft.properties||{});});
      return{tracks,waypoints,polygons};
    }catch(e){return null;}
  }

  function buildArrowDecorator(coords, color){
    // Arrows at 1km, 4km, 7km, 10km... (first at 1km then every 3km)
    // Clicking shows only the km distance — no route name
    const arrows=[];
    let dist=0, nextArrow=1000;
    function hvDist(a,b){
      const R=6371000,lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180;
      const dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    function brng(a,b){
      const lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      return(Math.atan2(Math.sin(dLon)*Math.cos(lat2),Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon))*180/Math.PI+360)%360;
    }
    for(let i=0;i<coords.length-1;i++){
      const seg=hvDist(coords[i],coords[i+1]);
      while(dist+seg>=nextArrow){
        const t=(nextArrow-dist)/seg;
        const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
        const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
        const deg=brng(coords[i],coords[i+1]);
        const kmLabel=Math.round(nextArrow/1000)+' km';
        const svg='<svg width="18" height="18" viewBox="0 0 18 18" style="transform:rotate('+deg+'deg)"><polygon points="9,1 14,16 9,11 4,16" fill="'+color+'" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/></svg>';
        const marker=L.marker([lat,lon],{
          icon:L.divIcon({className:'',html:svg,iconSize:[18,18],iconAnchor:[9,9]}),
          interactive:true, zIndexOffset:100
        });
        marker.bindPopup(kmLabel);
        arrows.push(marker);
        nextArrow+=1000;  // every 1km
      }
      dist+=seg;
    }
    return arrows;
  }

  function addUserRoute(name, parsed, color){
    const lyrGroup=[];
    const allCoords=[];
    parsed.tracks.forEach(t=>{
      allCoords.push(...t.coords);
      const poly=L.polyline(t.coords,{color,weight:4,opacity:0.85}).addTo(map);
      const popupName=t.name||name;
      poly.bindPopup('<b>'+popupName+'</b>');
      poly._isLine=true;
      lyrGroup.push(poly);
    });
    (parsed.polygons||[]).forEach(p=>{
      allCoords.push(...p.rings[0]);
      const poly=L.polygon(p.rings,{color,fillColor:color,fillOpacity:0.2,weight:2,opacity:0.85}).addTo(map);
      if(p.name||p.desc)poly.bindPopup('<b>'+(p.name||name)+'</b>'+(p.desc?'<br>'+p.desc:''));
      lyrGroup.push(poly);
    });
    parsed.waypoints.forEach(w=>{
      allCoords.push([w.lat,w.lon]);
      const m=L.circleMarker([w.lat,w.lon],{radius:6,color,fillColor:color,fillOpacity:.85,weight:2}).addTo(map);
      if(w.name||w.desc)m.bindPopup('<b>'+(w.name||name)+'</b>'+(w.desc?'<br>'+w.desc:''));
      lyrGroup.push(m);
    });
    const lats=allCoords.map(p=>p[0]),lons=allCoords.map(p=>p[1]);
    const bounds=allCoords.length?[[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]]:null;
    const idx=userRoutes.length;
    userRoutes.push({name,visible:true,opacity:0.85,color,lineWidth:4,showArrows:false,showLabel:true,layers:lyrGroup,arrowLayers:[],labelLayer:null,bounds,parsed});
    // Fit map to route bounds
    if(bounds)map.fitBounds(bounds,{padding:[24,24]});
    // Apply label immediately and ensure layers render
    applyRouteStyle(idx);
    // Rebuild the route list panel
    renderRouteList();
    // Open the panel so user sees the new entry
    document.getElementById('route-panel').classList.add('open');
  }

  function applyRouteStyle(idx){
    const r=userRoutes[idx];
    // Remove old arrows, start icon, label
    r.arrowLayers.forEach(l=>map.removeLayer(l)); r.arrowLayers=[];
    if(r.startLayer){map.removeLayer(r.startLayer);r.startLayer=null;}
    if(r.labelLayer){map.removeLayer(r.labelLayer);r.labelLayer=null;}

    // Update geometry style
    r.layers.forEach(l=>{
      if(!l.setStyle) return;
      if(l instanceof L.CircleMarker&&!(l instanceof L.Circle)){
        l.setStyle({color:r.color,fillColor:r.color,weight:2,opacity:r.opacity,fillOpacity:r.opacity});
      } else if(l instanceof L.Polygon){
        l.setStyle({color:r.color,fillColor:r.color,weight:r.lineWidth,opacity:r.opacity,fillOpacity:r.opacity*0.22});
      } else {
        l.setStyle({color:r.color,weight:r.lineWidth,opacity:r.opacity});
      }
    });

    // Direction arrows
    if(r.showArrows){
      (r.parsed.tracks||[]).forEach(t=>{
        buildArrowDecorator(t.coords,r.color).forEach(a=>{
          if(r.visible)a.addTo(map);
          r.arrowLayers.push(a);
        });
      });
    }

    if(!r.showLabel) return;

    const halo=r.color.length===7?(parseInt(r.color.slice(1,3),16)*299+parseInt(r.color.slice(3,5),16)*587+parseInt(r.color.slice(5,7),16)*114)/1000>140?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.8)':'rgba(255,255,255,0.8)';
    const shadow='-1.5px -1.5px 0 '+halo+',1.5px -1.5px 0 '+halo+',-1.5px 1.5px 0 '+halo+',1.5px 1.5px 0 '+halo;

    const hasTracks=(r.parsed.tracks||[]).length>0;
    const hasWaypoints=(r.parsed.waypoints||[]).length>0;
    const hasPolygons=(r.parsed.polygons||[]).length>0;

    if(hasTracks){
      // Label at start point of first track
      const sp=r.parsed.tracks[0].coords[0];
      const labelText=r.parsed.tracks[0].name||r.name;

      // Start icon (circle with play arrow)
      r.startLayer=L.marker(sp,{
        icon:L.divIcon({
          className:'',
          html:'<div style="width:20px;height:20px;background:'+r.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4);transform:translate(-50%,-50%)"><span style="color:#fff;font-size:10px;margin-left:2px">&#9654;</span></div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:210
      });
      if(r.visible)r.startLayer.addTo(map);

      // Label to the right of the start icon
      r.labelLayer=L.marker(sp,{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+r.color+';font-size:20px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(14px,-50%)">'+labelText+'</div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:200
      });
      if(r.visible)r.labelLayer.addTo(map);

    } else if(hasWaypoints){
      // Label next to EVERY waypoint with its own name
      r.labelLayer=L.layerGroup();
      r.parsed.waypoints.forEach(w=>{
        const labelText=w.name||r.name;
        const m=L.marker([w.lat,w.lon],{
          icon:L.divIcon({
            className:'',
            html:'<div style="color:'+r.color+';font-size:20px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(10px,-50%)">'+labelText+'</div>',
            iconSize:[0,0],iconAnchor:[0,0]
          }),interactive:false,zIndexOffset:200
        });
        r.labelLayer.addLayer(m);
      });
      if(r.visible)r.labelLayer.addTo(map);

    } else if(hasPolygons&&r.bounds){
      // Label at centroid of all polygon outer rings
      const polyName=r.parsed.polygons[0].name||r.name;
      const allPts=r.parsed.polygons.flatMap(p=>p.rings[0]);
      const cLat=allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
      const cLon=allPts.reduce((s,p)=>s+p[1],0)/allPts.length;
      r.labelLayer=L.marker([cLat,cLon],{
        icon:L.divIcon({
          className:'',
          html:'<div style="color:'+r.color+';font-size:20px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(-50%,-50%)">'+polyName+'</div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:200
      });
      if(r.visible)r.labelLayer.addTo(map);
    }
  }

  function setRouteOpacity(idx,op){
    const r=userRoutes[idx];
    r.opacity=op;
    r.layers.forEach(l=>{
      if(!l.setStyle) return;
      if(l instanceof L.CircleMarker&&!(l instanceof L.Circle)){
        l.setStyle({opacity:op,fillOpacity:op});
      } else if(l instanceof L.Polygon){
        l.setStyle({opacity:op,fillOpacity:op*0.22});
      } else {
        l.setStyle({opacity:op});
      }
    });
    r.arrowLayers.forEach(a=>{const el=a.getElement&&a.getElement();if(el)el.style.opacity=op;});
    // labelLayer can be a single Marker or a LayerGroup (for waypoints)
    if(r.labelLayer){
      if(r.labelLayer.eachLayer){
        r.labelLayer.eachLayer(l=>{const el=l.getElement&&l.getElement();if(el)el.style.opacity=op;});
      } else {
        const el=r.labelLayer.getElement&&r.labelLayer.getElement();if(el)el.style.opacity=op;
      }
    }
    if(r.startLayer){const el=r.startLayer.getElement&&r.startLayer.getElement();if(el)el.style.opacity=op;}
  }

  function setRouteColor(idx,color){
    userRoutes[idx].color=color;
    applyRouteStyle(idx);
  }

  function setRouteVisible(idx,vis){
    userRoutes[idx].visible=vis;
    userRoutes[idx].layers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    userRoutes[idx].arrowLayers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    if(userRoutes[idx].labelLayer){if(vis)map.addLayer(userRoutes[idx].labelLayer);else map.removeLayer(userRoutes[idx].labelLayer);}
    if(userRoutes[idx].startLayer){if(vis)map.addLayer(userRoutes[idx].startLayer);else map.removeLayer(userRoutes[idx].startLayer);}
  }

  function removeUserRoute(idx){
    userRoutes[idx].layers.forEach(l=>map.removeLayer(l));
    userRoutes[idx].arrowLayers.forEach(l=>map.removeLayer(l));
    if(userRoutes[idx].labelLayer)map.removeLayer(userRoutes[idx].labelLayer);
    if(userRoutes[idx].startLayer)map.removeLayer(userRoutes[idx].startLayer);
    userRoutes.splice(idx,1);
    renderRouteList();
  }

  function renderRouteList(){
    const el=document.getElementById('route-list');
    el.innerHTML='';
    userRoutes.forEach((r,i)=>{
      const row=document.createElement('div');
      row.className='user-route-row';
      row.innerHTML=
        '<input type="color" class="ur-color" value="'+r.color+'" title="Color">'+
        '<span class="route-name" title="'+r.name+'">'+r.name+'</span>'+
        '<button class="route-fly" title="Fit to route" data-i="'+i+'">&#x2316;</button>'+
        '<button class="route-vis" title="Show/hide" data-i="'+i+'" style="opacity:'+(r.visible?1:.4)+'">&#128065;</button>'+
        '<button class="route-del" title="Remove" data-i="'+i+'">&times;</button>';
      el.appendChild(row);

      // options row: opacity + linewidth + arrows + label
      const opRow=document.createElement('div');
      opRow.className='route-options-row';
      const opVal=Math.round(r.opacity*100);
      opRow.innerHTML=
        '<span class="ro-label">Opacity</span>'+
        '<input type="range" min="0" max="100" value="'+opVal+'" class="ur-op">'+
        '<span class="ro-val">'+opVal+'%</span>'+
        '<span class="ro-label" style="margin-left:6px">Width</span>'+
        '<input type="number" min="1" max="20" value="'+r.lineWidth+'" class="ur-lw">'+
        '<span class="ro-label">px</span>'+
        '<label style="margin-left:6px"><input type="checkbox" class="ur-arrows" '+(r.showArrows?'checked':'')+'>&#x25B6; arrows</label>'+
        '<label><input type="checkbox" class="ur-label" '+(r.showLabel?'checked':'')+'>label</label>';
      el.appendChild(opRow);

      row.querySelector('.ur-color').addEventListener('input',e=>{userRoutes[i].color=e.target.value;applyRouteStyle(i);});
      row.querySelector('.route-fly').addEventListener('click',()=>{if(userRoutes[i].bounds)map.fitBounds(userRoutes[i].bounds,{padding:[24,24]});});
      row.querySelector('.route-vis').addEventListener('click',e=>{
        const nv=!userRoutes[i].visible;setRouteVisible(i,nv);e.currentTarget.style.opacity=nv?'1':'0.4';
      });
      row.querySelector('.route-del').addEventListener('click',()=>removeUserRoute(i));
      opRow.querySelector('.ur-op').addEventListener('input',e=>{
        const op=parseInt(e.target.value)/100;
        setRouteOpacity(i,op);
        opRow.querySelector('.ro-val').textContent=e.target.value+'%';
      });
      opRow.querySelector('.ur-lw').addEventListener('change',e=>{
        userRoutes[i].lineWidth=Math.max(1,parseInt(e.target.value)||4);
        applyRouteStyle(i);
      });
      opRow.querySelector('.ur-arrows').addEventListener('change',e=>{
        userRoutes[i].showArrows=e.target.checked;
        applyRouteStyle(i);
      });
      opRow.querySelector('.ur-label').addEventListener('change',e=>{
        userRoutes[i].showLabel=e.target.checked;
        applyRouteStyle(i);
      });
    });
    document.getElementById('route-btn').classList.toggle('has-routes',userRoutes.length>0);
  }

  function loadFile(file, accept){
    if(!file)return;
    const nameLow=file.name.toLowerCase();
    const isGpx=nameLow.endsWith('.gpx');
    const isGj=nameLow.endsWith('.geojson')||nameLow.endsWith('.json');
    if(!isGpx&&!isGj){alert('Please choose a .gpx or .geojson file.');return;}
    if(accept==='gpx'&&!isGpx){alert('Please choose a .gpx file.');return;}
    if(accept==='geojson'&&!isGj){alert('Please choose a .geojson or .json file.');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=isGpx?parseUserGPX(ev.target.result):parseUserGeoJSON(ev.target.result);
      const hasContent=parsed&&(parsed.tracks.length||parsed.waypoints.length||(parsed.polygons&&parsed.polygons.length));
      if(!hasContent){alert('No features found in this file.');return;}
      const color=USER_COLORS[colorIdx%USER_COLORS.length];colorIdx++;
      addUserRoute(file.name.replace(/.(gpx|geojson|json)$/i,''),parsed,color);
    };
    reader.readAsText(file);
  }

  // Panel open/close — stop propagation on the whole overlay so clicks inside don't close it
  const routeBtn=document.getElementById('route-btn');
  const routePanel=document.getElementById('route-panel');
  const routeOverlay=document.getElementById('route-overlay');
  routeBtn.onclick=function(e){e.stopPropagation();routePanel.classList.toggle('open');};
  routeOverlay.addEventListener('click',function(e){e.stopPropagation();});
  document.addEventListener('click',function(){routePanel.classList.remove('open');});
  document.getElementById('route-panel-close').addEventListener('click',function(e){
    e.stopPropagation();
    routePanel.classList.remove('open');
  });

  // GPX / GeoJSON buttons — reset input value each time so same file can be reloaded
  const fileInput=document.getElementById('route-file-input');
  let pendingAccept='any';

  function triggerFilePick(accept){
    pendingAccept=accept;
    fileInput.accept=accept==='gpx'?'.gpx':accept==='geojson'?'.geojson,.json':'.gpx,.geojson,.json';
    // Reset so the same filename can be picked again
    fileInput.value='';
    // Small delay so the panel-close click-outside doesn't steal focus
    setTimeout(()=>fileInput.click(),50);
  }

  document.getElementById('route-add-gpx').onclick=function(e){e.stopPropagation();triggerFilePick('gpx');};
  document.getElementById('route-add-geojson').onclick=function(e){e.stopPropagation();triggerFilePick('geojson');};

  fileInput.addEventListener('change',function(){
    Array.from(fileInput.files).forEach(f=>loadFile(f,pendingAccept));
    // Reset so re-selecting the same file fires change again next time
    fileInput.value='';
  });

  // Drag & drop on map
  const mapEl=document.getElementById('map');
  mapEl.addEventListener('dragover',e=>{e.preventDefault();mapEl.style.outline='3px dashed #2980b9';});
  mapEl.addEventListener('dragleave',()=>{mapEl.style.outline='';});
  mapEl.addEventListener('drop',e=>{
    e.preventDefault();mapEl.style.outline='';
    Array.from(e.dataTransfer.files).forEach(f=>loadFile(f,'any'));
  });
})();

// =============================================================================
// Long-press → location share popup
// Hold finger or mouse button for 500ms anywhere on the map to open a popup
// with share options for that location. Works on desktop and mobile.
// =============================================================================
(function(){
  const popup   = document.getElementById('share-popup');
  const cross   = document.getElementById('share-crosshair');
  const mapWrap = document.getElementById('map-wrap');
  let pressTimer=null, pinMarker=null;
  let sharedLat=0, sharedLon=0;

  function showPopup(px, py, latlng){
    sharedLat=+latlng.lat.toFixed(6);
    sharedLon=+latlng.lng.toFixed(6);
    const lat6=sharedLat.toFixed(6), lon6=sharedLon.toFixed(6);
    const z=map.getZoom();

    // Crosshair at pressed point
    cross.style.left=px+'px'; cross.style.top=py+'px'; cross.style.display='block';

    // Update share targets
    document.getElementById('share-copy-coords').dataset.coords=lat6+', '+lon6;
    document.getElementById('share-gmaps').href='https://www.google.com/maps?q='+lat6+','+lon6;
    document.getElementById('share-osm').href='https://www.openstreetmap.org/?mlat='+lat6+'&mlon='+lon6+'#map='+z+'/'+lat6+'/'+lon6;
    document.getElementById('share-navapp').href='geo:'+lat6+','+lon6+'?q='+lat6+','+lon6;
    const url=window.location.href.split('#')[0]+'#share='+lat6+','+lon6+','+z;
    document.getElementById('share-copy-link').dataset.link=url;

    // Position popup, flipping sides if near edge
    popup.classList.add('open');
    const pw=popup.offsetWidth||210, ph=popup.offsetHeight||240;
    const mw=mapWrap.offsetWidth, mh=mapWrap.offsetHeight;
    let left=px+18, top=py-20;
    if(left+pw>mw-8) left=px-pw-18;
    if(top+ph>mh-8) top=mh-ph-8;
    popup.style.left=Math.max(8,left)+'px';
    popup.style.top=Math.max(8,top)+'px';
  }

  function hidePopup(){ popup.classList.remove('open'); cross.style.display='none'; }

  // Long-press detection on the Leaflet map container
  const mapDiv=document.getElementById('map');

  function startPress(e){
    const rect=mapDiv.getBoundingClientRect();
    const wRect=mapWrap.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const latlng=map.containerPointToLatLng(L.point(cx-rect.left, cy-rect.top));
    const px=cx-wRect.left, py=cy-wRect.top;
    clearTimeout(pressTimer);
    pressTimer=setTimeout(function(){
      map.dragging.disable();
      setTimeout(()=>map.dragging.enable(),300);
      showPopup(px, py, latlng);
    }, 500);
  }
  function cancelPress(){ clearTimeout(pressTimer); }

  mapDiv.addEventListener('mousedown',startPress);
  mapDiv.addEventListener('mousemove',cancelPress);
  mapDiv.addEventListener('mouseup',cancelPress);
  mapDiv.addEventListener('touchstart',startPress,{passive:true});
  mapDiv.addEventListener('touchmove',cancelPress,{passive:true});
  mapDiv.addEventListener('touchend',cancelPress);

  // Close on outside click
  document.addEventListener('click',function(e){
    if(!popup.contains(e.target)&&!cross.contains(e.target)) hidePopup();
  });
  document.getElementById('share-popup-close').addEventListener('click',hidePopup);

  // Copy helpers
  function flash(el,msg){
    const icon=el.querySelector('.share-icon');
    const origIcon=icon.textContent;
    const txt=el.childNodes[1];
    const origTxt=txt.textContent;
    icon.textContent='✓'; txt.textContent=msg;
    setTimeout(()=>{icon.textContent=origIcon; txt.textContent=origTxt;},1500);
    hidePopup();
  }
  function copyText(txt,el){
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>flash(el,'Copied!'));}
    else{const t=document.createElement('textarea');t.value=txt;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.select();try{document.execCommand('copy');flash(el,'Copied!');}catch(e){}document.body.removeChild(t);}
  }

  document.getElementById('share-copy-coords').addEventListener('click',function(e){e.preventDefault();copyText(this.dataset.coords,this);});
  document.getElementById('share-copy-link').addEventListener('click',function(e){e.preventDefault();copyText(this.dataset.link,this);});
  document.getElementById('share-navapp').addEventListener('click',function(e){e.preventDefault();window.location.href=this.href;});
  document.getElementById('share-gmaps').addEventListener('click',function(){hidePopup();});
  document.getElementById('share-osm').addEventListener('click',function(){hidePopup();});

  // Place/remove pin
  document.getElementById('share-pin').addEventListener('click',function(e){
    e.preventDefault();
    if(pinMarker){map.removeLayer(pinMarker);pinMarker=null;}
    pinMarker=L.marker([sharedLat,sharedLon],{
      icon:L.divIcon({className:'',html:'<div style="font-size:28px;line-height:1;transform:translate(-50%,-100%);filter:drop-shadow(0 2px 3px rgba(0,0,0,.4))">📍</div>',iconSize:[0,0],iconAnchor:[0,0]})
    }).addTo(map);
    pinMarker.bindPopup(sharedLat.toFixed(6)+', '+sharedLon.toFixed(6)).openPopup();
    hidePopup();
  });
})();
</script>
</body>
