<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1c1c1e;color:#eee;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:9px 14px;background:#111;display:flex;align-items:center;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:600}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{position:absolute;top:0;left:0;width:100%;height:100%}
/* Controls overlay: always on top */
#controls-overlay{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:4px;pointer-events:none}
#controls-overlay>*{pointer-events:auto}
/* Hide Leaflet default zoom controls, we use our own */
.leaflet-control-zoom{display:none!important}
#notice{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#ffc;padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:1001}
.ctrl-btn{width:34px;height:34px;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.ctrl-btn:hover{background:#f4f4f4}
.ctrl-btn.on{background:#d4efff;border-color:#2980b9}
.ctrl-btn.zoom{font-size:22px;font-weight:300}
.zoom-sep{height:1px;background:#ccc;margin:0 4px}
.zoom-group{background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.zoom-group .ctrl-btn{border:none;border-radius:0;box-shadow:none;width:34px;height:32px}
.zoom-group .ctrl-btn:first-child{border-bottom:1px solid #ddd}
#layers-overlay{display:none;position:absolute;top:96px;right:10px;z-index:1000}
#layers-panel{display:none;position:absolute;top:42px;right:0;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.3);padding:10px 12px;min-width:180px;max-width:240px;max-height:70vh;overflow-y:auto}
#layers-panel.open{display:block}
#layers-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.layer-toggle-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#222}
#zoom-indicator{position:absolute;top:52px;right:10px;z-index:1000;background:white;border:2px solid rgba(0,0,0,0.25);border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.3);padding:6px 10px;font-size:13px;font-weight:600;color:#222;pointer-events:none}
.layer-toggle-row input{flex-shrink:0}
.layer-toggle-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-opacity-row{display:flex;align-items:center;gap:6px;padding:2px 0 6px 22px;border-bottom:1px solid #eee}
.layer-opacity-row:last-child{border-bottom:none;padding-bottom:2px}
.layer-opacity-row input[type=range]{flex:1;height:4px;accent-color:#185FA5;cursor:pointer}
.layer-opacity-row span{font-size:11px;color:#999;min-width:30px;text-align:right}
.layer-section-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;padding:4px 0 2px}
/* User route loader panel */
#info-btn{position:absolute;top:10px;right:10px;z-index:1000;width:30px;height:30px;border-radius:50%;background:white;border:2px solid rgba(0,0,0,.25);box-shadow:0 2px 8px rgba(0,0,0,.3);font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:16px;color:#2980b9;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
#info-btn:hover{background:#f4f4f4}
#route-overlay{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;align-items:center;gap:0}
#route-btn{background:white;border:2px solid rgba(0,0,0,.25);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;white-space:nowrap}
#route-btn:hover{background:#f4f4f4}
#route-btn.has-routes{border-color:#2980b9;background:#d4efff}
#route-panel{display:none;background:white;border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.25);padding:14px 16px;min-width:320px;max-width:380px;margin-bottom:6px;max-height:65vh;overflow-y:auto}
#route-panel.open{display:block}
#route-panel h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center}
#route-clear-all{margin-left:auto;background:none;border:1px solid #ccc;border-radius:5px;font-size:11px;font-weight:600;text-transform:none;letter-spacing:0;color:#c0392b;cursor:pointer;padding:3px 8px;flex-shrink:0}
#route-clear-all:hover{background:#fdeeee}
#route-panel-close{background:none;border:none;font-size:18px;line-height:1;cursor:pointer;color:#aaa;padding:0 0 0 8px;flex-shrink:0}
#route-panel-close:hover{color:#333}
.user-route-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;color:#222}
.user-route-row:last-child{border-bottom:none}
.user-route-row input[type=color]{width:24px;height:24px;border:none;padding:0;border-radius:3px;cursor:pointer;flex-shrink:0}
.user-route-row .route-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:600;color:#222}
.user-route-row .route-del{background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 3px;line-height:1}
.user-route-row .route-fly{background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;padding:0 3px;line-height:1;color:#2980b9}
.user-route-row .route-vis{background:none;border:none;font-size:16px;cursor:pointer;flex-shrink:0;padding:0 3px;line-height:1;color:#333}
.user-route-row .route-more{background:none;border:none;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;line-height:1;color:#555}
.route-detail-panel{display:none;padding:2px 0 8px 24px;border-bottom:1px solid #f0f0f0}
.route-detail-panel.open{display:block}
.route-detail-header{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.route-detail-header span{flex:1}
.route-detail-close{background:none;border:none;font-size:16px;cursor:pointer;color:#888;padding:0 3px;line-height:1}
.route-detail-panel .route-options-row{padding-left:0}
.ro-fly-btn{background:none;border:1px solid #ccc;border-radius:5px;font-size:12px;cursor:pointer;padding:4px 9px;color:#2980b9;display:flex;align-items:center;gap:5px}
.route-options-row{display:flex;align-items:center;gap:5px;padding:3px 0 8px 30px;border-bottom:1px solid #f0f0f0;flex-wrap:wrap}
.ro-group{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.route-options-row:last-child{border-bottom:none}
.route-options-row input[type=range]{width:72px;accent-color:#185FA5;cursor:pointer}

<script>
// =============================================================================
// TRAILCRAFT — OUTPUT HTML (exported map page)
// This self-contained page is generated by the PeeWeeTrails INPUT HTML editor.
// It requires no server: all map data is embedded as JSON constants below.
// Libraries loaded: Leaflet 1.9.4 (map engine) + leaflet-textpath (route labels)
// =============================================================================

// --- Embedded map data baked in at export time ---
const D=[];   // Array of track/waypoint objects (GPX/GeoJSON files)
const B=null; // Combined bounding box of all tracks, or null
const MAX_ZOOM=22;                 // tiles are optically over-zoomed (blurred) beyond their native resolution up to this level
// (auto-center-on-idle setting now lives in FOLLOW_DELAY, defined further down)
const WPTZOOM=1;          // Minimum zoom level for waypoint labels to appear
const WPTMARKERZOOM=1; // Minimum zoom level for waypoint icons/dots
const OSM_OPACITY=1;   // Opacity of the OpenStreetMap base layer (0–1)
let TRAIL_COLOR="#9b30d9"; // Color of the GPS navigation trail (user-adjustable at runtime)
let TRAIL_WIDTH=5;   // Width in px of the GPS navigation trail (user-adjustable at runtime)

// --- Geometry helpers used for label placement and km-marker calculation ---

// Simple average centroid (used as a first estimate for label position)
function centroid(coords){
  if(!coords.length)return[0,0];
  let la=0,lo=0;
  coords.forEach(p=>{la+=p[0];lo+=p[1];});
  return[la/coords.length,lo/coords.length];
}

function nearestPointOnLine(point, lineCoords){
  if(lineCoords.length===0) return point;
  if(lineCoords.length===1) return lineCoords[0];
  let best=lineCoords[0], bestDist=Infinity;
  for(let i=0;i<lineCoords.length-1;i++){
    const a=lineCoords[i], b=lineCoords[i+1];
    const dx=b[0]-a[0], dy=b[1]-a[1];
    let t = (dx===0&&dy===0) ? 0 : ((point[0]-a[0])*dx+(point[1]-a[1])*dy)/(dx*dx+dy*dy);
    t = Math.max(0, Math.min(1, t));
    const proj=[a[0]+t*dx, a[1]+t*dy];
    const d=Math.hypot(point[0]-proj[0], point[1]-proj[1]);
    if(d<bestDist){ bestDist=d; best=proj; }
  }
  return best;
}

function labelAnchorCentroid(trackCoords){
  const c=centroid(trackCoords);
  return nearestPointOnLine(c, trackCoords);
}

function bearingPoints(p1,p2){
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function buildKmMarkers(coords){
  if(coords.length<2) return [];
  const markers=[];
  let cumDist=0;
  let nextKm=1000;
  for(let i=0;i<coords.length-1;i++){
    const segDist=haversineMeters(coords[i],coords[i+1]);
    while(cumDist+segDist>=nextKm){
      const t=(nextKm-cumDist)/segDist;
      const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
      const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
      markers.push({position:[lat,lon], bearing:bearingPoints(coords[i],coords[i+1]), km:nextKm/1000});
      nextKm+=1000;
    }
    cumDist+=segDist;
  }
  return markers;
}

function simplifyLine(points, tolerance){
  if(points.length<3) return points;
  function perpDist(pt,a,b){
    const dx=b[0]-a[0], dy=b[1]-a[1];
    if(dx===0&&dy===0) return Math.hypot(pt[0]-a[0],pt[1]-a[1]);
    const t=((pt[0]-a[0])*dx+(pt[1]-a[1])*dy)/(dx*dx+dy*dy);
    const tc=Math.max(0,Math.min(1,t));
    const px=a[0]+tc*dx, py=a[1]+tc*dy;
    return Math.hypot(pt[0]-px,pt[1]-py);
  }
  function dp(pts,tol){
    if(pts.length<3) return pts;
    let maxD=0,idx=0;
    for(let i=1;i<pts.length-1;i++){
      const d=perpDist(pts[i],pts[0],pts[pts.length-1]);
      if(d>maxD){maxD=d;idx=i;}
    }
    if(maxD>tol){
      const left=dp(pts.slice(0,idx+1),tol);
      const right=dp(pts.slice(idx),tol);
      return left.slice(0,-1).concat(right);
    }
    return [pts[0],pts[pts.length-1]];
  }
  return dp(points,tolerance);
}

function buildTextPathLine(coords, labelLength){
  // Return a straight two-point line through the track midpoint so letters
  // always render at a single consistent angle (no per-letter rotation).
  if(coords.length<2) return coords;
  if(coords.length===2) return normalizeDirection(coords);
  const dists=[0];
  for(let i=1;i<coords.length;i++){
    const a=coords[i-1],b=coords[i];
    const dx=b[1]-a[1],dy=b[0]-a[0];
    dists.push(dists[i-1]+Math.sqrt(dx*dx+dy*dy));
  }
  const total=dists[dists.length-1];
  const charSpan=Math.min(0.6,Math.max(0.2,(labelLength||10)*0.018));
  const halfSpan=charSpan/2;
  const mid=total*0.5;
  let midIdx=0;
  for(let i=0;i<dists.length;i++){if(dists[i]>=mid){midIdx=i;break;}}
  let startIdx=midIdx,endIdx=midIdx;
  while(startIdx>0&&dists[midIdx]-dists[startIdx]<total*halfSpan)startIdx--;
  while(endIdx<coords.length-1&&dists[endIdx]-dists[midIdx]<total*halfSpan)endIdx++;
  return normalizeDirection([coords[startIdx],coords[endIdx]]);
}

function normalizeDirection(coords){
  if(coords.length<2) return coords;
  const start=coords[0], end=coords[coords.length-1];
  const dLon=end[1]-start[1];
  const dLat=end[0]-start[0];
  const goingLeft = Math.abs(dLon) >= Math.abs(dLat) ? dLon < 0 : dLat < 0;
  return goingLeft ? coords.slice().reverse() : coords;
}

// inline SVG icon for a label, matching the geometry-type icons used in the file list
function labelGeomIconHtml(type, color, sizePx){
  // Label prefix icons are intentionally always black, regardless of the
  // element's own color, and use 3 distinct shapes so the geometry type is
  // instantly clear and the icon is never mistaken for the real (colored,
  // filled) shape drawn on the map.
  const sz=sizePx||16;
  if(type==='wpt') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><circle cx="9" cy="9" r="5" fill="#000" stroke="#fff" stroke-width="1.5"/></svg>';
  if(type==='pol') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><polygon points="9,3 15,15 3,15" fill="none" stroke="#000" stroke-width="1.8" stroke-linejoin="round"/></svg>';
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><path d="M2,15 Q5,3 9,9 T16,3" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>';
}

function contrastHalo(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#000':'#fff';
}

function getLabelText(f, elementName){
  const mode=f.labelMode||'nametag';
  if(mode==='filename') return f.filename;
  if(mode==='nametag') return (elementName&&elementName.trim()) ? elementName.trim() : f.filename;
  return f.filename;
}

function buildWaypointMarker(f, w){
  if(f.wptIconSvg){
    const sz=f.wptIconSize||28;
    return L.marker([w.lat,w.lon],{
      icon:L.divIcon({
        className:'',
        html:'<div style="width:'+sz+'px;height:'+sz+'px;display:flex;align-items:center;justify-content:center;color:'+f.color+';filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">'+f.wptIconSvg+'</div>',
        iconSize:[sz,sz],
        iconAnchor:[sz/2,sz/2]
      })
    });
  }
  return L.circleMarker([w.lat,w.lon],{radius:f.lineWidth||8,color:f.color,fillColor:f.color,fillOpacity:.9,weight:1});
}

function midpt(coords){return coords[Math.floor(coords.length/2)];}

// --- Status in URL: extent en laag-zichtbaarheid kunnen via #-hash gedeeld worden ---
// --- URL hash state: map position and layer visibility are stored in the #hash
//     so the user can bookmark or share the exact current map view ---
function parseStateFromHash(){
  if(!location.hash || location.hash.length<2) return null;
  const params=new URLSearchParams(location.hash.slice(1));
  const lat=parseFloat(params.get('lat'));
  const lng=parseFloat(params.get('lng'));
  const z=parseInt(params.get('z'));
  const layersParam=params.get('layers');
  const markerParam=params.get('marker');
  const out={};
  if(!isNaN(lat)&&!isNaN(lng)&&!isNaN(z)){ out.lat=lat; out.lng=lng; out.z=z; }
  if(layersParam!=null){ out.layerVis=layersParam.split(',').map(v=>v==='1'); }
  if(markerParam!=null){
    const parts=markerParam.split(',').map(parseFloat);
    if(parts.length===2 && !isNaN(parts[0]) && !isNaN(parts[1])) out.marker=[parts[0],parts[1]];
  }
  return Object.keys(out).length?out:null;
}

function updateUrlHash(){
  const c=map.getCenter();
  const params=new URLSearchParams();
  params.set('lat',c.lat.toFixed(6));
  params.set('lng',c.lng.toFixed(6));
  params.set('z',map.getZoom());
  if(wmsLayerObjs.length){
    params.set('layers',wmsLayerObjs.map(lo=>map.hasLayer(lo.layer)?'1':'0').join(','));
  }
  history.replaceState(null,'','#'+params.toString());
}

// --- Initialise Leaflet map and OSM base layer ---
const urlState=parseStateFromHash();
const map=L.map('map');
const tiles=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:MAX_ZOOM,maxNativeZoom:19,opacity:OSM_OPACITY,attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);
tiles.on('tileerror',()=>document.getElementById('notice').style.display='block');
tiles.on('tileload',()=>document.getElementById('notice').style.display='none');

// Automatically figures out how far a tile layer's real tiles actually go: the
// first time a tile genuinely fails to load at a plausibly-high zoom level (not
// just a low-zoom network blip), the layer's native ceiling is capped there and
// redrawn, so zoom levels beyond it optically over-zoom (blur) instead of
// showing blank/broken tiles.
function attachAutoNativeZoom(layer){
  let capped=false;
  layer.on('tileerror',function(err){
    if(capped) return;
    const z=err && err.coords && err.coords.z;
    if(z==null || z<14) return;
    capped=true;
    layer.options.maxNativeZoom=z-1;
    layer.redraw();
  });
}

const labelLayers=[];
const trackLineLayers=[];   // L.Polyline track lines only

// zoomLayers built after D.forEach (see below)


  // Helper: render polygon as Leaflet layer — MultiPolygon via L.geoJSON, plain via L.polygon
D.forEach(f=>{
  const filePolys=[];
  const fLw=f.lineWidth!=null?f.lineWidth:3;
  const fZMin=f.mapZoomMin!=null?f.mapZoomMin:1;
  const fZMax=f.mapZoomMax!=null?f.mapZoomMax:MAX_ZOOM;

  // --- Render polygon areas (filled, with darker outline) ---
  // For plain Polygon: pass rings normally.
  (f.polygons||[]).forEach(p=>{
    const pg=L.polygon(p.rings,{color:f.color,weight:f.lineWidth||2,opacity:0.9,fillColor:f.color,fillOpacity:(f.fillOpacity!=null?f.fillOpacity:0.2)}).addTo(map);
    if(p.name||p.desc)pg.bindPopup('<b>'+(p.name||f.filename)+'</b>'+(p.desc?'<br>'+p.desc:''));
    pg._isPolygon=true;
    pg._baseFillOpacity=(f.fillOpacity!=null?f.fillOpacity:0.2);
    pg._trackZoomMin=fZMin;
    pg._trackZoomMax=fZMax;
    polygonLayers.push(pg);
  });

  // --- Render line tracks ---
  f.tracks.forEach(t=>{
    const poly=L.polyline(t.coords,{color:f.color,weight:fLw,opacity:.9}).addTo(map);
    poly.bindPopup('<b>'+getLabelText(f,t.name)+'</b>'+(t.name?'<br>'+t.name:''));
    poly._gpxFile=f;
    poly._trackZoomMin=fZMin;
    poly._trackZoomMax=fZMax;
    trackLineLayers.push(poly);
    filePolys.push(poly);
  });

  // --- Start marker (belongs to tracks, not waypoints) ---
  if(f.showStart&&f.tracks.length&&f.tracks[0].coords.length){
    const sp=f.tracks[0].coords[0];
    const startM=L.marker(sp,{

  // --- KM direction markers (belong to tracks, not waypoints) ---
  if(f.showKmMarkers&&f.tracks.length){

  // --- Waypoint markers (belong to waypoints group only) ---

  if(f.showLabel&&(f.polygons||[]).length>0){
    const h=contrastHalo(f.color);
    const fs=(f.labelFontSize||24)+'px';
    const haloW=Math.max(2,Math.round((f.labelFontSize||24)*0.13))+'px';
    const makePolyLbl=(lat,lon,name)=>{
      const lbl=L.marker([lat,lon],{
        icon:L.divIcon({
          className:'',
          html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+f.color+';font-size:'+fs+';font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:-'+haloW+' -'+haloW+' 0 '+h+','+haloW+' -'+haloW+' 0 '+h+',-'+haloW+' '+haloW+' 0 '+h+','+haloW+' '+haloW+' 0 '+h+';transform:translate(-50%,-50%)">'+name+'</div>',

      lbl._zoomMax=f.labelZoomMax;
      lbl._polLabel=true;
      labelLayers.push(lbl);
    };
    const polNames=f.polygons.map(p=>getLabelText(f,p.name));
    const polAllSameName=polNames.every(n=>n===polNames[0]);
    if(polAllSameName){
      const polLabelName=polNames[0];
      if(polLabelName){
        const allOuterPts=f.polygons.flatMap(p=>p.rings[0]);
        const cLat=allOuterPts.reduce((s,c)=>s+c[0],0)/allOuterPts.length;

        makePolyLbl(cLat,cLon,polLabelName);

    } else {
      f.polygons.forEach((p,pIdx)=>{
        const nm=polNames[pIdx];

        const cLat=pts.reduce((s,c)=>s+c[0],0)/pts.length;
        const cLon=pts.reduce((s,c)=>s+c[1],0)/pts.length;
        makePolyLbl(cLat,cLon,nm);
      });
    }
  }
});

function updateLabels(){
  const z=map.getZoom();

  // --- Track labels (textpath + floating DivIcon) ---
  labelLayers.forEach(l=>{
    // If user toggled off: ensure removed from map and skip
    if(l._userHidden){
      if(l.setText) l.setText(null);
      else if(map.hasLayer(l)) map.removeLayer(l);
      return;
    }
    const visible=z>=l._zoomMin&&z<=l._zoomMax;
    if(l.setText){
      // Textpath: set/clear text based on zoom
      if(visible){
        const f=l._gpxFile;
        const h=contrastHalo(f.color);
        const mainLabel=getLabelText(f,f.tracks[0]&&f.tracks[0].name);
        l.setText(null);
        l.setText(mainLabel,{center:true,repeat:false,attributes:{'font-size':'24px','font-weight':'bold','fill':f.color,'paint-order':'stroke','stroke':h,'stroke-width':'3px','stroke-linejoin':'round'}});
      } else {
        l.setText(null);
      }
    } else {
      // Floating DivIcon label: add/remove from map based on zoom
      if(visible){ if(!map.hasLayer(l)) map.addLayer(l); }
      else { if(map.hasLayer(l)) map.removeLayer(l); }
    }
  });

  // --- Waypoint markers ---
  wptMarkerLayers.forEach(m=>{
    if(m._userHidden){ if(map.hasLayer(m)) map.removeLayer(m); return; }
    const visible=z>=m._trackZoomMin&&z<=m._trackZoomMax;
    if(visible){ if(!map.hasLayer(m)) map.addLayer(m); }
    else { if(map.hasLayer(m)) map.removeLayer(m); }
  });

  // --- Track lines, start/km dots, polygons ---
  zoomLayers.forEach(l=>{
    if(l._userHidden){ if(map.hasLayer(l)) map.removeLayer(l); return; }
    const visible=z>=l._trackZoomMin&&z<=l._trackZoomMax;
    if(visible){ if(!map.hasLayer(l)) map.addLayer(l); }
    else { if(map.hasLayer(l)) map.removeLayer(l); }
  });
}

// --- GPS location tracking and map-follow logic ---
// The location button starts watchPosition(); a direction marker and accuracy
// circle are shown. When FOLLOW_DELAY>0 the map re-centers automatically after
// the user has been idle (no pan/zoom) for that many ms — checked on its own
// timer (see followCheckInterval below), not only when a new GPS fix arrives,
// since a stationary device may not get a new fix for a long time.
const locBtn=document.getElementById('loc-btn');
let wid=null,locTrail=null,locTrailBg=null,lc=null,dirMarker=null;
let followZoom=null;
let locHistory=[]; // GPS points preserved until page/tab is closed
let TRAIL_MODE="full";
let TRAIL_METERS=50;
let FOLLOW_DELAY=true?10000:0; // 0=never, else ms of idle time before re-centering
let lastUserInteraction=Date.now();
let lastKnownLatLng=null;
let followCheckInterval=null;
let programmaticMove=false;

function haversineMeters(p1,p2){
  const R=6371000;
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLat=(p2[0]-p1[0])*Math.PI/180, dLon=(p2[1]-p1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Trim the trail: with 'full' everything is kept (whole ride, even after 50km), with 'distance'
// only the points within the last TRAIL_METERS meters (measured along the path) are kept.
// Keep the GPS trail (and its accompanying circle/marker) rendered above
// everything else, including tracks imported later via "Import files".
function bringTrailToFront(){
  if(locTrailBg) locTrailBg.bringToFront();
  if(locTrail) locTrail.bringToFront();
  if(lc) lc.bringToFront();
  if(dirMarker) dirMarker.bringToFront();
}

function trimTrail(history){
  if(TRAIL_MODE==='full' || history.length<2) return history;
  let acc=0;
  let cutIdx=0;
  for(let i=history.length-1;i>0;i--){
    acc+=haversineMeters(history[i-1],history[i]);
    if(acc>=TRAIL_METERS){ cutIdx=i-1; break; }
    cutIdx=0;
  }
  return history.slice(cutIdx);
}

// --- Trail settings panel: lets the visitor adjust the recorded trail's
// color, width, and length (full route vs. only the last N meters) live ---
{
  const trailBtn=document.getElementById('trail-settings-btn');
  const trailPanel=document.getElementById('trail-panel');
  const colorInput=document.getElementById('trail-color-input');
  const widthInput=document.getElementById('trail-width-input');
  const modeInput=document.getElementById('trail-mode-input');
  const metersInput=document.getElementById('trail-meters-input');
  const metersRow=document.getElementById('trail-meters-row');

  colorInput.value=TRAIL_COLOR;

  metersInput.value=TRAIL_METERS;
  metersRow.style.display=(TRAIL_MODE==='full')?'none':'';
  centerInput.value=String(FOLLOW_DELAY);

  trailBtn.onclick=function(e){e.stopPropagation();trailPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    const overlay=document.getElementById('trail-overlay');
    if(!overlay.contains(e.target))trailPanel.classList.remove('open');
  });

  function applyTrailAppearance(){
    if(locTrail){
      locTrail.setStyle({color:TRAIL_COLOR,weight:TRAIL_WIDTH,dashArray:(TRAIL_WIDTH*1.6)+','+(TRAIL_WIDTH*1.3)});
      locTrailBg.setStyle({weight:TRAIL_WIDTH});
    }
