  }

  colorInput.addEventListener('input',function(){
    TRAIL_COLOR=colorInput.value;
    applyTrailAppearance();
  });
  widthInput.addEventListener('change',function(){
    TRAIL_WIDTH=Math.max(1,Math.min(15,parseInt(widthInput.value)||5));
    widthInput.value=TRAIL_WIDTH;
    applyTrailAppearance();
  });
  modeInput.addEventListener('change',function(){
    TRAIL_MODE=modeInput.value;
    metersRow.style.display=(TRAIL_MODE==='full')?'none':'';
    locHistory=trimTrail(locHistory);
    if(locTrail){ locTrail.setLatLngs(locHistory); locTrailBg.setLatLngs(locHistory); }
  });
  metersInput.addEventListener('change',function(){
    TRAIL_METERS=Math.max(5,Math.min(5000,parseInt(metersInput.value)||50));
    metersInput.value=TRAIL_METERS;
    locHistory=trimTrail(locHistory);
    if(locTrail){ locTrail.setLatLngs(locHistory); locTrailBg.setLatLngs(locHistory); }
  });
  centerInput.addEventListener('change',function(){
    FOLLOW_DELAY=parseInt(centerInput.value)||0;
    lastUserInteraction=Date.now(); // restart the idle countdown with the new delay
  });
}

function bearing(p1,p2){
  // peiling in graden van p1 naar p2 (0=noord)
  const lat1=p1[0]*Math.PI/180, lat2=p2[0]*Math.PI/180;
  const dLon=(p2[1]-p1[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// Pointed triangle as SVG: rotation center exactly at the center of the shape, no skewed rendering
function makeDirIcon(deg){
  return L.divIcon({
    className:'',
    html:'<svg width="46" height="46" viewBox="0 0 46 46" style="transform:rotate('+deg+'deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">'
        +'<polygon points="23,2 31,39 23,29 15,39" fill="'+TRAIL_COLOR+'" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>'
        +'</svg>',
    iconSize:[46,46],
    iconAnchor:[23,23]
  });
}

function stopLoc(){
  // Stop GPS watching but KEEP the trail on the map and locHistory intact
  // so the trail survives toggling the location button off and on again.
  // History is only cleared when the page/tab is closed.
  if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  if(followCheckInterval!==null){clearInterval(followCheckInterval);followCheckInterval=null;}
  locBtn.classList.remove('on');locBtn.innerHTML='&#9737;';
  // Remove only the accuracy circle and direction arrow, not the trail line
  if(lc){map.removeLayer(lc);lc=null;}
  if(dirMarker){map.removeLayer(dirMarker);dirMarker=null;}
  followZoom=null;
}

// Detect manual map interaction (drag/zoom by user) to temporarily pause auto-centering
map.on('dragstart zoomstart',function(){
  if(!programmaticMove) lastUserInteraction=Date.now();
});

function recenterOnLocation(ll){
  if(followZoom===null) followZoom=Math.max(map.getZoom(),16);
  programmaticMove=true;
  map.setView(ll, followZoom, {animate:false});
  programmaticMove=false;
}

locBtn.onclick=function(){
  if(wid!==null){stopLoc();return;}
  if(!navigator.geolocation){alert('GPS is not available in this browser.');return;}
  locBtn.innerHTML='&#8987;';

  wid=navigator.geolocation.watchPosition(function(p){
    const ll=[p.coords.latitude,p.coords.longitude];
    lastKnownLatLng=ll;
    locBtn.classList.add('on');locBtn.innerHTML='&#9737;';

    locHistory.push(ll);
    locHistory=trimTrail(locHistory);

    // determine bearing: use GPS heading if available, otherwise compute from trail
    let deg=0;
    if(p.coords.heading!=null && !isNaN(p.coords.heading)){
      deg=p.coords.heading;
    } else if(locHistory.length>=2){
      deg=bearing(locHistory[0],locHistory[locHistory.length-1]);
    }

    if(locTrail){
      locTrail.setLatLngs(locHistory);
      locTrailBg.setLatLngs(locHistory);
      if(lc) lc.setLatLng(ll).setRadius(p.coords.accuracy);
      else lc=L.circle(ll,{radius:p.coords.accuracy,color:TRAIL_COLOR,fillColor:TRAIL_COLOR,fillOpacity:.12,weight:1}).addTo(map);
      if(dirMarker) dirMarker.setLatLng(ll).setIcon(makeDirIcon(deg));
      else dirMarker=L.marker(ll,{icon:makeDirIcon(deg),interactive:false,zIndexOffset:500}).addTo(map).bindPopup('Your location');
    } else {
      lc=L.circle(ll,{radius:p.coords.accuracy,color:TRAIL_COLOR,fillColor:TRAIL_COLOR,fillOpacity:.12,weight:1}).addTo(map);
      // White base line first, then a dashed colored line on top — gives a true
      // two-tone (e.g. purple/white) dashed look regardless of the map underneath,
      // and reads more clearly against imported tracks of a similar solid color.
      locTrailBg=L.polyline(locHistory,{color:'#fff',weight:TRAIL_WIDTH,opacity:.9,lineCap:'round'}).addTo(map);
      locTrail=L.polyline(locHistory,{color:TRAIL_COLOR,weight:TRAIL_WIDTH,opacity:1,lineCap:'butt',dashArray:(TRAIL_WIDTH*1.6)+','+(TRAIL_WIDTH*1.3)}).addTo(map);
      dirMarker=L.marker(ll,{icon:makeDirIcon(deg),interactive:false,zIndexOffset:500}).addTo(map).bindPopup('Your location');
    }
    bringTrailToFront();

    if(!dirMarker._shown){
      // Always center once on the very first fix, regardless of the delay setting
      programmaticMove=true;
      map.setView(ll, Math.max(map.getZoom(),16));
      programmaticMove=false;
      dirMarker._shown=true;
      lastUserInteraction=Date.now();
    }
  },function(e){
    stopLoc();
    alert('Location unavailable: '+e.message);
  },{enableHighAccuracy:true,maximumAge:1000});

  // Independent timer: checks idle time on its own schedule instead of only
  // when a new GPS fix arrives — a stationary device may not get a new fix
  // for a long time, which previously meant the idle check never ran.
  if(followCheckInterval!==null) clearInterval(followCheckInterval);
  followCheckInterval=setInterval(function(){
    if(FOLLOW_DELAY<=0 || !lastKnownLatLng) return;
    if((Date.now()-lastUserInteraction)>=FOLLOW_DELAY){
      recenterOnLocation(lastKnownLatLng);
    }
  },1000);
};

// If user manually zooms while following is active, remember new zoom level instead of snapping back
map.on('zoomend',function(){
  if(FOLLOW_DELAY>0 && wid!==null) followZoom=map.getZoom();
});

// --- Visibility panel: toggle and opacity control per geometry type ---
// Each geometry type (tracks, waypoints, polygons) can be shown/hidden
// and faded independently via the eye-button dropdown (left controls).
{
  const visBtn=document.getElementById('vis-btn');
  const visPanel=document.getElementById('vis-panel');

  // Open/close the panel when clicking the eye button
  visBtn.onclick=function(e){e.stopPropagation();visPanel.classList.toggle('open');};
  document.addEventListener('click',function(e){
    const overlay=document.getElementById('vis-overlay');
    if(!overlay.contains(e.target))visPanel.classList.remove('open');
  });

  // State per geometry type — strictly separate, zero overlap between arrays:
  // tracks = lines + start dots + km markers (trackLineLayers + trackDotLayers)
  // waypoints = waypoint markers only (wptMarkerLayers)
  // polygons = polygon areas only (polygonLayers)
  const trackAllLayers=[...trackLineLayers,...trackDotLayers];
  const state={
    tracks:   {visible:true, opacity:1, layers:trackAllLayers,  eye:'vis-eye-tracks',   op:'vis-op-tracks',   pct:'vis-pct-tracks'},
    waypoints:{visible:true, opacity:1, layers:wptMarkerLayers, eye:'vis-eye-waypoints',op:'vis-op-waypoints', pct:'vis-pct-waypoints'},
    polygons: {visible:true, opacity:1, layers:polygonLayers,   eye:'vis-eye-polygons', op:'vis-op-polygons',  pct:'vis-pct-polygons'}
  };

  // Helper: apply opacity to any layer type without side-effects (no radius change for circles)
  function applyOpacity(l,op){
    if(!l.setStyle&&!l.setOpacity&&!l.getElement) return;
    if(l.setStyle){
      if(l instanceof L.CircleMarker && !(l instanceof L.Circle)){
        l.setStyle({opacity:op, fillOpacity:op});
      } else if(l instanceof L.Polygon){
        l.setStyle({opacity:op, fillOpacity:op*(l._baseFillOpacity!=null?l._baseFillOpacity:0.22)});
      } else {
        l.setStyle({opacity:op});
      }
    } else if(l.setOpacity){
      l.setOpacity(op);
    }
    // Also fade the DOM element (catches DivIcon markers like start/km markers)
    const el=l.getElement&&l.getElement();
    if(el)el.style.opacity=op;
  }

  Object.entries(state).forEach(([type,s])=>{
    const eyeBtn=document.getElementById(s.eye);
    const opSlider=document.getElementById(s.op);
    const pctEl=document.getElementById(s.pct);

    eyeBtn.addEventListener('click',function(){
      s.visible=!s.visible;
      eyeBtn.style.opacity=s.visible?'1':'0.35';

      // Set _userHidden on every layer in this group and add/remove from map
      s.layers.forEach(l=>{
        l._userHidden=!s.visible;
        if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });

      // Track toggle: show/hide track labels (NOT waypoint labels)
      if(type==='tracks'){
        labelLayers.forEach(l=>{
          if(l._wptLabel||l._polLabel) return;
          l._userHidden=!s.visible;
          if(l.setText){
            if(!s.visible) l.setText(null);
          } else {
            if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
            else { if(map.hasLayer(l)) map.removeLayer(l); }
          }
        });
      }
      // Polygons toggle: show/hide polygon labels
      if(type==='polygons'){
        labelLayers.forEach(l=>{
          if(!l._polLabel) return;
          l._userHidden=!s.visible;
          if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
          else { if(map.hasLayer(l)) map.removeLayer(l); }
        });
      }

      // Waypoints toggle: show/hide waypoint labels
      if(type==='waypoints'){
        labelLayers.forEach(l=>{
          if(!l._wptLabel) return;
          l._userHidden=!s.visible;
          if(s.visible){ if(!map.hasLayer(l)) map.addLayer(l); }
          else { if(map.hasLayer(l)) map.removeLayer(l); }
        });
      }

      // Re-run zoom logic so layers respect zoom range when being shown again
      if(s.visible) updateLabels();
    });

    opSlider.addEventListener('input',function(){
      const op=parseInt(opSlider.value)/100;
      s.opacity=op;
      pctEl.textContent=opSlider.value+'%';
      s.layers.forEach(l=>applyOpacity(l,op));
      // Track opacity also fades track labels (not waypoint labels)
      if(type==='tracks') labelLayers.forEach(l=>{if(!l._wptLabel&&!l._polLabel)applyOpacity(l,op);});
      if(type==='waypoints') labelLayers.forEach(l=>{if(l._wptLabel)applyOpacity(l,op);});
      if(type==='polygons') labelLayers.forEach(l=>{if(l._polLabel)applyOpacity(l,op);});
    });
  });

  // Hide polygon row if there are no polygons in the baked-in data
  const hasPolygons=D.some(f=>(f.polygons||[]).length>0);
  if(!hasPolygons) document.getElementById('vis-row-polygons').style.display='none';
  const hasWaypoints=D.some(f=>f.waypoints.length>0);
  if(!hasWaypoints) document.getElementById('vis-row-waypoints').style.display='none';
  const hasTracks=D.some(f=>f.tracks.length>0);
  if(!hasTracks) document.getElementById('vis-row-tracks').style.display='none';
  // Hide the entire vis-overlay if there is no baked-in data at all
  if(!hasTracks&&!hasWaypoints&&!hasPolygons){
    document.getElementById('vis-overlay').style.display='none';
  }
}

// =====================================================================
// User route loader: load GPX / GeoJSON and display on map
// =====================================================================
(function(){
  const USER_COLORS=['#e74c3c','#8e44ad','#16a085','#d35400','#2471a3','#1e8449','#b7950b','#717d7e'];
  let userRoutes=[]; // {name, visible, opacity, color, lineWidth, showArrows, showLabel, layers:[], bounds}
  let colorIdx=0;

  function parseUserGPX(text){
    try{
      const doc=new DOMParser().parseFromString(text,'application/xml');
      const tracks=[];const wpts=[];
      doc.querySelectorAll('trk,rte').forEach(el=>{
        const pts=[];
        el.querySelectorAll('trkpt,rtept').forEach(pt=>{
          const la=parseFloat(pt.getAttribute('lat')),lo=parseFloat(pt.getAttribute('lon'));
          if(!isNaN(la)&&!isNaN(lo))pts.push([la,lo]);
        });
        if(pts.length)tracks.push({name:el.querySelector('name')?.textContent||'',coords:pts});
      });
      doc.querySelectorAll('wpt').forEach(w=>{
        const la=parseFloat(w.getAttribute('lat')),lo=parseFloat(w.getAttribute('lon'));
        if(!isNaN(la)&&!isNaN(lo))wpts.push({lat:la,lon:lo,name:w.querySelector('name')?.textContent||'',desc:w.querySelector('desc')?.textContent||''});
      });
      return{tracks,waypoints:wpts};
    }catch(e){return null;}
  }

  function parseUserGeoJSON(text){
    try{
      const gj=JSON.parse(text);
      const tracks=[];const waypoints=[];const polygons=[];
      function handleGeom(geom,props){
        if(!geom)return;
        const name=(props&&(props.name||props.title||props.Name||props.NAME))||'';
        const desc=(props&&(props.desc||props.description||props.Description))||'';
        if(geom.type==='LineString'){
          const c=geom.coordinates.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
          if(c.length)tracks.push({name,coords:c});
        } else if(geom.type==='MultiLineString'){
          geom.coordinates.forEach(line=>{
            const c=line.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1]));
            if(c.length)tracks.push({name,coords:c});
          });
        } else if(geom.type==='Polygon'){
          const rings=geom.coordinates.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
          if(rings.length)polygons.push({name,desc,rings});
        } else if(geom.type==='MultiPolygon'){
          geom.coordinates.forEach(poly=>{
            const rings=poly.map(ring=>ring.map(c=>[c[1],c[0]]).filter(c=>!isNaN(c[0])&&!isNaN(c[1])));
            if(rings[0]&&rings[0].length)polygons.push({name,desc,rings});
          });
        } else if(geom.type==='Point'){
          const c=geom.coordinates;
          if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});
        } else if(geom.type==='MultiPoint'){
          geom.coordinates.forEach(c=>{if(!isNaN(c[1])&&!isNaN(c[0]))waypoints.push({lat:c[1],lon:c[0],name,desc});});
        } else if(geom.type==='GeometryCollection'){
          geom.geometries.forEach(g=>handleGeom(g,props));
        }
      }
      const features=(gj.type==='FeatureCollection')?gj.features:(gj.type==='Feature')?[gj]:[{type:'Feature',geometry:gj,properties:{}}];
      features.forEach(ft=>{if(ft&&ft.geometry)handleGeom(ft.geometry,ft.properties||{});});
      return{tracks,waypoints,polygons};
    }catch(e){return null;}
  }

  function buildArrowDecorator(coords, color){
    // Arrows at 1km, 4km, 7km, 10km... (first at 1km then every 3km)
    // Clicking shows only the km distance — no route name
    const arrows=[];
    let dist=0, nextArrow=1000;
    function hvDist(a,b){
      const R=6371000,lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180;
      const dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    function brng(a,b){
      const lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
      return(Math.atan2(Math.sin(dLon)*Math.cos(lat2),Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon))*180/Math.PI+360)%360;
    }
    for(let i=0;i<coords.length-1;i++){
      const seg=hvDist(coords[i],coords[i+1]);
      while(dist+seg>=nextArrow){
        const t=(nextArrow-dist)/seg;
        const lat=coords[i][0]+t*(coords[i+1][0]-coords[i][0]);
        const lon=coords[i][1]+t*(coords[i+1][1]-coords[i][1]);
        const deg=brng(coords[i],coords[i+1]);
        const kmLabel=Math.round(nextArrow/1000)+' km';
        const svg='<svg width="18" height="18" viewBox="0 0 18 18" style="transform:rotate('+deg+'deg)"><polygon points="9,1 14,16 9,11 4,16" fill="'+color+'" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/></svg>';
        const marker=L.marker([lat,lon],{
          icon:L.divIcon({className:'',html:svg,iconSize:[18,18],iconAnchor:[9,9]}),
          interactive:true, zIndexOffset:100
        });
        marker.bindPopup(kmLabel);
        arrows.push(marker);
        nextArrow+=1000;  // every 1km
      }
      dist+=seg;
    }
    return arrows;
  }


  // Helper: render polygon as Leaflet layer — MultiPolygon via L.geoJSON, plain via L.polygon
  function addUserRoute(name, parsed, color, lineWidth){
    const lyrGroup=[];
    const allCoords=[];

    // Calculate total track length for km suffix
    function trackKm(coords){
      let d=0;
      for(let i=1;i<coords.length;i++){
        const R=6371000,lat1=coords[i-1][0]*Math.PI/180,lat2=coords[i][0]*Math.PI/180;
        const dLat=(coords[i][0]-coords[i-1][0])*Math.PI/180,dLon=(coords[i][1]-coords[i-1][1])*Math.PI/180;
        const a=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
        d+=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      }
      return d/1000;
    }

    // Compute km suffix: only when file has exactly 1 track and no waypoints/polygons
    const hasSingleTrack=parsed.tracks.length===1&&!parsed.waypoints.length&&!(parsed.polygons||[]).length;
    let kmSuffix='';
    if(hasSingleTrack&&parsed.tracks[0].coords.length>1){
      const km=trackKm(parsed.tracks[0].coords);
      kmSuffix=' ('+km.toFixed(1).replace('.',',')+' km)';
    }
    // Display name in list gets the suffix; label on map uses track name + suffix
    const displayName=name+kmSuffix;
    parsed.tracks.forEach(t=>{
      allCoords.push(...t.coords);
      const poly=L.polyline(t.coords,{color,weight:4,opacity:0.85}).addTo(map);
      const popupName=t.name||name;
      poly.bindPopup('<b>'+popupName+'</b>');
      poly._isLine=true;
      lyrGroup.push(poly);
    });
    (parsed.polygons||[]).forEach(p=>{
      allCoords.push(...p.rings[0]);
      const poly=L.polygon(p.rings,{color,fillColor:color,fillOpacity:0.2,weight:lineWidth||2,opacity:0.85}).addTo(map);
      if(p.name||p.desc)poly.bindPopup('<b>'+(p.name||name)+'</b>'+(p.desc?'<br>'+p.desc:''));
      lyrGroup.push(poly);
    });
    parsed.waypoints.forEach(w=>{
      allCoords.push([w.lat,w.lon]);
      const m=L.circleMarker([w.lat,w.lon],{radius:lineWidth||8,color,fillColor:color,fillOpacity:.85,weight:1}).addTo(map);
      if(w.name||w.desc)m.bindPopup('<b>'+(w.name||name)+'</b>'+(w.desc?'<br>'+w.desc:''));
      lyrGroup.push(m);
    });
    const lats=allCoords.map(p=>p[0]),lons=allCoords.map(p=>p[1]);
    const bounds=allCoords.length?[[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]]:null;
    const idx=userRoutes.length;
    // Defaults match input HTML per geometry type
    const hasTrk=parsed.tracks.length>0;
    const hasWpt=!hasTrk&&parsed.waypoints.length>0;
    const routeDefaults=hasTrk
      ? {lineWidth:5,showArrows:true,showLabel:true,labelMode:'nametag',useElementName:true,labelPos:'start',showStart:true,showKmMarkers:true,showTrackDist:true,labelZoomMin:14,labelZoomMax:22,labelFontSize:24,mapZoomMin:1,mapZoomMax:22}
      : hasWpt
      ? {lineWidth:8,showArrows:false,showLabel:true,labelMode:'nametag',useElementName:true,labelPos:'centroid',showStart:false,showKmMarkers:false,showTrackDist:false,labelZoomMin:15,labelZoomMax:22,labelFontSize:24,mapZoomMin:1,mapZoomMax:22}
      : {lineWidth:2,showArrows:false,showLabel:true,labelMode:'nametag',useElementName:true,labelPos:'centroid',showStart:false,showKmMarkers:false,showTrackDist:false,labelZoomMin:15,labelZoomMax:22,labelFontSize:24,mapZoomMin:1,mapZoomMax:22};
    userRoutes.push({name:displayName,visible:true,opacity:0.85,color,fillOpacity:0.2,...routeDefaults,lineWidth:lineWidth||routeDefaults.lineWidth,layers:lyrGroup,arrowLayers:[],labelLayer:null,startLayer:null,bounds,parsed,kmSuffix});
    // Fit map to route bounds
    if(bounds)map.fitBounds(bounds,{padding:[24,24]});
    // Apply label immediately and ensure layers render
    applyRouteStyle(idx);
    // Keep the recorded GPS trail above newly imported tracks, if it exists
    if(typeof bringTrailToFront==='function') bringTrailToFront();
    // Rebuild the route list panel
    renderRouteList();
    // Open the panel so user sees the new entry
    document.getElementById('route-panel').classList.add('open');
  }

  function zoomInRange(r){
    const zmin=r.labelZoomMin!=null?r.labelZoomMin:1;
    const zmax=r.labelZoomMax!=null?r.labelZoomMax:22;
    const z=map.getZoom();
    return z>=zmin&&z<=zmax;
  }

  function elemZoomInRange(r){
    const zmin=r.mapZoomMin!=null?r.mapZoomMin:1;
    const zmax=r.mapZoomMax!=null?r.mapZoomMax:22;
    const z=map.getZoom();
    return z>=zmin&&z<=zmax;
  }

  function updateUserRouteLabelVisibility(){
    userRoutes.forEach(r=>{
      if(!r.labelLayer)return;
      const show=r.visible&&r.showLabel!==false&&zoomInRange(r);
      if(show){ if(!map.hasLayer(r.labelLayer)) r.labelLayer.addTo(map); }
      else { if(map.hasLayer(r.labelLayer)) map.removeLayer(r.labelLayer); }
      if(r.startLayer){
        const showStart=r.visible&&zoomInRange(r);
        if(showStart){ if(!map.hasLayer(r.startLayer)) r.startLayer.addTo(map); }
        else { if(map.hasLayer(r.startLayer)) map.removeLayer(r.startLayer); }
      }
    });
  }
  map.on('zoomend', updateUserRouteLabelVisibility);

  function updateUserRouteElemVisibility(){
    userRoutes.forEach(r=>{
      const show=r.visible&&elemZoomInRange(r);
      (r.layers||[]).forEach(l=>{
        if(show){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });
      (r.arrowLayers||[]).forEach(l=>{
        if(show&&r.showArrows){ if(!map.hasLayer(l)) map.addLayer(l); }
        else { if(map.hasLayer(l)) map.removeLayer(l); }
      });
    });
  }
  map.on('zoomend', updateUserRouteElemVisibility);

  function applyRouteStyle(idx){
    const r=userRoutes[idx];
    // Remove old arrows, start icon, label
    r.arrowLayers.forEach(l=>map.removeLayer(l)); r.arrowLayers=[];
    if(r.startLayer){map.removeLayer(r.startLayer);r.startLayer=null;}
    if(r.labelLayer){map.removeLayer(r.labelLayer);r.labelLayer=null;}

    // Update geometry style
    r.layers.forEach(l=>{
      if(!l.setStyle) return;
      if(l instanceof L.CircleMarker&&!(l instanceof L.Circle)){
        l.setStyle({color:r.color,fillColor:r.color,weight:1,opacity:r.opacity,fillOpacity:r.opacity,radius:r.lineWidth||8});
      } else if(l instanceof L.Polygon){
        l.setStyle({color:r.color,fillColor:r.color,weight:r.lineWidth,opacity:r.opacity,fillOpacity:r.opacity*(r.fillOpacity!=null?r.fillOpacity:0.2)});
      } else {
        l.setStyle({color:r.color,weight:r.lineWidth,opacity:r.opacity});
      }
    });

    // Direction arrows
    if(r.showArrows){
      (r.parsed.tracks||[]).forEach(t=>{
        buildArrowDecorator(t.coords,r.color).forEach(a=>{
          if(r.visible)a.addTo(map);
          r.arrowLayers.push(a);
        });
      });
    }

    if(!r.showLabel) return;

    const halo=r.color.length===7?(parseInt(r.color.slice(1,3),16)*299+parseInt(r.color.slice(3,5),16)*587+parseInt(r.color.slice(5,7),16)*114)/1000>140?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.8)':'rgba(255,255,255,0.8)';
    const shadow='-1.5px -1.5px 0 '+halo+',1.5px -1.5px 0 '+halo+',-1.5px 1.5px 0 '+halo+',1.5px 1.5px 0 '+halo;

    const hasTracks=(r.parsed.tracks||[]).length>0;
    const hasWaypoints=(r.parsed.waypoints||[]).length>0;
    const hasPolygons=(r.parsed.polygons||[]).length>0;

    if(hasTracks){
      // Label at start point of first track
      const sp=r.parsed.tracks[0].coords[0];
      const labelText=r.parsed.tracks[0].name
        ? r.parsed.tracks[0].name+(r.kmSuffix||'')
        : r.name;  // r.name already includes the km suffix when set

      // Start icon (circle with play arrow)
      r.startLayer=L.marker(sp,{
        icon:L.divIcon({
          className:'',
          html:'<div style="width:20px;height:20px;background:'+r.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4);transform:translate(-50%,-50%)"><span style="color:#fff;font-size:10px;margin-left:2px">&#9654;</span></div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:210
      });
      r.startLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      r.startLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
      if(r.visible&&zoomInRange(r))r.startLayer.addTo(map);

      // Label to the right of the start icon
      r.labelLayer=L.marker(sp,{
        icon:L.divIcon({
          className:'',
          html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+r.color+';font-size:'+(r.labelFontSize||24)+'px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(14px,-50%)">'+labelText+'</div>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),interactive:false,zIndexOffset:200
      });
      r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
      if(r.visible&&zoomInRange(r))r.labelLayer.addTo(map);

    } else if(hasWaypoints){
      // Label next to EVERY waypoint with its own name
      r.labelLayer=L.layerGroup();
      r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
      r.parsed.waypoints.forEach(w=>{
        const labelText=w.name||r.name;
        const m=L.marker([w.lat,w.lon],{
          icon:L.divIcon({
            className:'',
            html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+r.color+';font-size:'+(r.labelFontSize||24)+'px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(10px,-50%)">'+labelText+'</div>',
            iconSize:[0,0],iconAnchor:[0,0]
          }),interactive:false,zIndexOffset:200
        });
        r.labelLayer.addLayer(m);
      });
      if(r.visible&&zoomInRange(r))r.labelLayer.addTo(map);

    } else if(hasPolygons&&r.bounds){
      // Per-polygon label if each has its own name,
      // combined centroid label if all share the same name (true MultiPolygon)
      const pnames=r.parsed.polygons.map(p=>p.name||'');
      const allSame=pnames.every(n=>n===pnames[0]);
      const makeImpLbl=(lat,lon,name)=>{
        const lbl=L.marker([lat,lon],{
          icon:L.divIcon({
            className:'',
            html:'<div style="display:inline-flex;align-items:center;gap:5px;color:'+r.color+';font-size:'+(r.labelFontSize||24)+'px;font-weight:700;white-space:nowrap;pointer-events:none;text-shadow:'+shadow+';transform:translate(-50%,-50%)">'+name+'</div>',
            iconSize:[0,0],iconAnchor:[0,0]
          }),interactive:false,zIndexOffset:200
        });
        if(r.visible&&zoomInRange(r)) lbl.addTo(map);
        return lbl;
      };
      if(allSame){
        const combinedName=pnames[0]||r.name;
        if(combinedName){
          const allPts=r.parsed.polygons.flatMap(p=>p.rings[0]);
          const cLat=allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
          const cLon=allPts.reduce((s,p)=>s+p[1],0)/allPts.length;
          r.labelLayer=makeImpLbl(cLat,cLon,combinedName);
          r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
          r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
        }
      } else {
        // Multiple labels — use a LayerGroup
        r.labelLayer=L.layerGroup();
        r.labelLayer._zoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
        r.labelLayer._zoomMax=r.labelZoomMax!=null?r.labelZoomMax:22;
        r.parsed.polygons.forEach(p=>{
          if(!p.name) return;
          const pts=p.rings[0];
          const cLat=pts.reduce((s,c)=>s+c[0],0)/pts.length;
          const cLon=pts.reduce((s,c)=>s+c[1],0)/pts.length;
          r.labelLayer.addLayer(makeImpLbl(cLat,cLon,p.name));
        });
        if(r.visible&&zoomInRange(r)) r.labelLayer.addTo(map);
      }
    }
  }

  function setRouteOpacity(idx,op){
    const r=userRoutes[idx];
    r.opacity=op;
    r.layers.forEach(l=>{
      if(!l.setStyle) return;
      if(l instanceof L.CircleMarker&&!(l instanceof L.Circle)){
        l.setStyle({opacity:op,fillOpacity:op});
      } else if(l instanceof L.Polygon){
        l.setStyle({opacity:op,fillOpacity:op*(r.fillOpacity!=null?r.fillOpacity:0.2)});
      } else {
        l.setStyle({opacity:op});
      }
    });
    r.arrowLayers.forEach(a=>{const el=a.getElement&&a.getElement();if(el)el.style.opacity=op;});
    // labelLayer can be a single Marker or a LayerGroup (for waypoints)
    if(r.labelLayer){
      if(r.labelLayer.eachLayer){
        r.labelLayer.eachLayer(l=>{const el=l.getElement&&l.getElement();if(el)el.style.opacity=op;});
      } else {
        const el=r.labelLayer.getElement&&r.labelLayer.getElement();if(el)el.style.opacity=op;
      }
    }
    if(r.startLayer){const el=r.startLayer.getElement&&r.startLayer.getElement();if(el)el.style.opacity=op;}
  }

  function setRouteColor(idx,color){
    userRoutes[idx].color=color;
    applyRouteStyle(idx);
  }

  function setRouteVisible(idx,vis){
    userRoutes[idx].visible=vis;
    userRoutes[idx].layers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    userRoutes[idx].arrowLayers.forEach(l=>{if(vis)map.addLayer(l);else map.removeLayer(l);});
    if(userRoutes[idx].labelLayer){if(vis)map.addLayer(userRoutes[idx].labelLayer);else map.removeLayer(userRoutes[idx].labelLayer);}
    if(userRoutes[idx].startLayer){if(vis)map.addLayer(userRoutes[idx].startLayer);else map.removeLayer(userRoutes[idx].startLayer);}
  }

  function removeUserRoute(idx){
    userRoutes[idx].layers.forEach(l=>map.removeLayer(l));
    userRoutes[idx].arrowLayers.forEach(l=>map.removeLayer(l));
    if(userRoutes[idx].labelLayer)map.removeLayer(userRoutes[idx].labelLayer);
    if(userRoutes[idx].startLayer)map.removeLayer(userRoutes[idx].startLayer);
    userRoutes.splice(idx,1);
    renderRouteList();
  }

  function clearAllUserRoutes(){
    if(userRoutes.length===0) return;
    if(!confirm('Remove all '+userRoutes.length+' imported file(s) from the map?')) return;
    userRoutes.forEach(r=>{
      r.layers.forEach(l=>map.removeLayer(l));
      r.arrowLayers.forEach(l=>map.removeLayer(l));
      if(r.labelLayer)map.removeLayer(r.labelLayer);
      if(r.startLayer)map.removeLayer(r.startLayer);
    });
    userRoutes.length=0;
    renderRouteList();
  }

  // Small geometry-type icon (track / waypoint / polygon), matches input HTML styling
  function labelGeomIconHtml(type,color,sizePx){
    // Always black + 3 distinct shapes, regardless of element color (see input HTML for rationale).
    const sz=sizePx||16;
    if(type==='wpt') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><circle cx="9" cy="9" r="5" fill="#000" stroke="#fff" stroke-width="1.5"/></svg>';
    if(type==='pol') return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><polygon points="9,3 15,15 3,15" fill="none" stroke="#000" stroke-width="1.8" stroke-linejoin="round"/></svg>';
    return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 18 18" style="vertical-align:middle;flex:0 0 auto"><path d="M2,15 Q5,3 9,9 T16,3" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>';
  }
  function geomIconSvg(r,color){
    const hasTrk=(r.parsed.tracks||[]).length>0;
    const hasWpt=!hasTrk&&(r.parsed.waypoints||[]).length>0;
    return labelGeomIconHtml(hasTrk?'trk':hasWpt?'wpt':'pol',color).replace('style="vertical-align:middle;flex:0 0 auto"','style="flex:0 0 auto" title="'+(hasTrk?'Track':hasWpt?'Waypoint':'Polygon')+'"');
  }

  function renderRouteList(){
    const el=document.getElementById('route-list');
    el.innerHTML='';
    userRoutes.forEach((r,i)=>{
      const row=document.createElement('div');
      row.className='user-route-row';
      row.innerHTML=
        geomIconSvg(r,r.color)+
        '<input type="color" class="ur-color" value="'+r.color+'" title="Color">'+
        '<span class="route-name" title="'+r.name+'">'+r.name+'</span>'+
        '<button class="route-more" title="More options" data-i="'+i+'">&#8942;</button>'+
        '<button class="route-vis" title="Show/hide" data-i="'+i+'" style="opacity:'+(r.visible?1:.4)+'">&#128065;</button>'+
        '<button class="route-del" title="Remove" data-i="'+i+'">&times;</button>';
      el.appendChild(row);

      // Collapsible detail panel — hidden by default, opened via the ⋯ button.
      // Holds everything that doesn't need to be visible/reachable at a glance,
      // which is what made the row too wide to use comfortably on a phone.
      const detail=document.createElement('div');
      detail.className='route-detail-panel';
      const opVal=Math.round(r.opacity*100);
      const elZoomMin=r.mapZoomMin!=null?r.mapZoomMin:1;
      const lblZoomMin=r.labelZoomMin!=null?r.labelZoomMin:1;
      const hasPol=(r.parsed.polygons||[]).length>0;
      const fillVal=Math.round((r.fillOpacity!=null?r.fillOpacity:0.2)*100);
      detail.innerHTML=
        '<div class="route-detail-header"><span>Options</span><button class="route-detail-close" title="Close">&times;</button></div>'+
        '<div class="route-options-row">'+
          '<span class="ro-group"><span class="ro-label">Opacity</span>'+
          '<input type="range" min="0" max="100" value="'+opVal+'" class="ur-op">'+
          '<span class="ro-val">'+opVal+'%</span></span>'+
          '<span class="ro-group" style="margin-left:6px"><span class="ro-label">Width</span>'+
          '<input type="number" min="1" max="20" value="'+r.lineWidth+'" class="ur-lw">'+
          '<span class="ro-label">px</span></span>'+
          (hasPol?(
          '<span class="ro-group" style="margin-left:6px"><span class="ro-label" title="Fill opacity of the polygon area. 0% = fully transparent (outline only), 100% = fully solid.">Fill</span>'+
          '<input type="number" min="0" max="100" step="5" value="'+fillVal+'" class="ur-fill" style="width:48px">'+
          '<span class="ro-label">%</span></span>'
          ):'')+
          '<label style="margin-left:6px"><input type="checkbox" class="ur-label" '+(r.showLabel?'checked':'')+'>label</label>'+
        '</div>'+
        '<div class="route-options-row">'+
          '<span class="ro-label" title="Element visible from this zoom level (up to 22)">Min zoom</span>'+
          '<input type="number" min="1" max="22" value="'+elZoomMin+'" class="ur-zoommin" style="width:48px">'+
          '<span class="ro-label" style="margin-left:10px" title="Label visible from this zoom level (up to 22)">Label zoom</span>'+
          '<input type="number" min="1" max="22" value="'+lblZoomMin+'" class="ur-lblzoommin" style="width:48px">'+
        '</div>'+
        '<div class="route-options-row">'+
          '<button class="route-fly ro-fly-btn" title="Fit map to this route" data-i="'+i+'">&#x2316; Fit to route</button>'+
        '</div>';
      el.appendChild(detail);

      row.querySelector('.ur-color').addEventListener('input',e=>{userRoutes[i].color=e.target.value;applyRouteStyle(i);});
      row.querySelector('.route-more').addEventListener('click',e=>{
        e.stopPropagation();
        const isOpen=detail.classList.contains('open');
        // Only one detail panel open at a time, to keep the list manageable
        el.querySelectorAll('.route-detail-panel.open').forEach(p=>p.classList.remove('open'));
        if(!isOpen) detail.classList.add('open');
      });
      detail.querySelector('.route-detail-close').addEventListener('click',()=>detail.classList.remove('open'));
      detail.querySelector('.ro-fly-btn').addEventListener('click',()=>{if(userRoutes[i].bounds)map.fitBounds(userRoutes[i].bounds,{padding:[24,24]});});
      row.querySelector('.route-vis').addEventListener('click',e=>{
        const nv=!userRoutes[i].visible;setRouteVisible(i,nv);e.currentTarget.style.opacity=nv?'1':'0.4';
      });
      row.querySelector('.route-del').addEventListener('click',()=>removeUserRoute(i));
      detail.querySelector('.ur-op').addEventListener('input',e=>{
        const op=parseInt(e.target.value)/100;
        setRouteOpacity(i,op);
        detail.querySelector('.ro-val').textContent=e.target.value+'%';
      });
      detail.querySelector('.ur-lw').addEventListener('change',e=>{
        userRoutes[i].lineWidth=Math.max(1,parseInt(e.target.value)||4);
        applyRouteStyle(i);
      });
      const urFillInp=detail.querySelector('.ur-fill');
      if(urFillInp){
        urFillInp.addEventListener('change',e=>{
          let pct=parseInt(e.target.value);
          if(isNaN(pct))pct=0;
          pct=Math.max(0,Math.min(100,pct));
          e.target.value=pct;
          userRoutes[i].fillOpacity=pct/100;
          applyRouteStyle(i);
        });
      }
      detail.querySelector('.ur-label').addEventListener('change',e=>{
        userRoutes[i].showLabel=e.target.checked;
        applyRouteStyle(i);
      });
      detail.querySelector('.ur-zoommin').addEventListener('change',e=>{
        userRoutes[i].mapZoomMin=Math.max(1,Math.min(19,parseInt(e.target.value)||1));
        applyRouteStyle(i);
        updateUserRouteElemVisibility();
      });
      detail.querySelector('.ur-lblzoommin').addEventListener('change',e=>{
        userRoutes[i].labelZoomMin=Math.max(1,Math.min(19,parseInt(e.target.value)||1));
        applyRouteStyle(i);
        updateUserRouteLabelVisibility();
      });
    });
    document.getElementById('route-btn').classList.toggle('has-routes',userRoutes.length>0);
    const clearAllBtn=document.getElementById('route-clear-all');
    if(clearAllBtn) clearAllBtn.style.display=userRoutes.length>0?'':'none';
  }

  function loadFile(file, accept){
    if(!file)return;
    const nameLow=file.name.toLowerCase();
    const isGpx=nameLow.endsWith('.gpx');
    const isGj=nameLow.endsWith('.geojson')||nameLow.endsWith('.json');
    if(!isGpx&&!isGj){alert('Please choose a .gpx or .geojson file.');return;}
    if(accept==='gpx'&&!isGpx){alert('Please choose a .gpx file.');return;}
    if(accept==='geojson'&&!isGj){alert('Please choose a .geojson or .json file.');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const parsed=isGpx?parseUserGPX(ev.target.result):parseUserGeoJSON(ev.target.result);
      const hasContent=parsed&&(parsed.tracks.length||parsed.waypoints.length||(parsed.polygons&&parsed.polygons.length));
      if(!hasContent){alert('No features found in this file.');return;}
      const baseName=file.name.replace(/\.(gpx|geojson|json)$/i,'');

      // SPLIT: one route entry per track
      parsed.tracks.forEach((trk,tIdx)=>{
        const name=trk.name&&trk.name.trim()?trk.name.trim():parsed.tracks.length===1?baseName:baseName+' ('+(tIdx+1)+')';
        const color=USER_COLORS[colorIdx%USER_COLORS.length];colorIdx++;
        addUserRoute(name,{tracks:[trk],waypoints:[],polygons:[]},color,5);
      });

      // SPLIT: one entry for all waypoints combined
      if(parsed.waypoints.length){
        const name=baseName;
        const color=USER_COLORS[colorIdx%USER_COLORS.length];colorIdx++;
        addUserRoute(name,{tracks:[],waypoints:parsed.waypoints,polygons:[]},color,8);
      }

      // SPLIT: group polygons.
      // Polygon-only file (no tracks/waypoints): all polygons share one row.
      // Mixed file: group by name (MultiPolygon parts share the same name → one row).
      const vPolygonOnlyFile=parsed.tracks.length===0&&parsed.waypoints.length===0;
      let vPolGroups=[];
      if(vPolygonOnlyFile){
        if((parsed.polygons||[]).length) vPolGroups.push({name:baseName,polygons:parsed.polygons.slice()});
      } else {
        let vPolCounter=0;
        (parsed.polygons||[]).forEach(pol=>{
          const nm=pol.name&&pol.name.trim()?pol.name.trim():null;
          if(nm){
            const ex=vPolGroups.find(g=>g.name===nm);
            if(ex){ex.polygons.push(pol);}
            else{vPolGroups.push({name:nm,polygons:[pol]});}
          } else {
            vPolCounter++;
            vPolGroups.push({name:'__unnamed__'+vPolCounter,polygons:[pol]});
          }
        });
        const vUnnamed=vPolGroups.filter(g=>g.name.startsWith('__unnamed__'));
        vPolGroups.forEach(g=>{
          if(g.name.startsWith('__unnamed__')){
            const n=parseInt(g.name.replace('__unnamed__',''));
            g.name=vUnnamed.length===1?baseName:baseName+' ('+n+')';
          }
        });
      }
      vPolGroups.forEach(g=>{
        const color=USER_COLORS[colorIdx%USER_COLORS.length];colorIdx++;
        addUserRoute(g.name,{tracks:[],waypoints:[],polygons:g.polygons},color,2);
      });
    };
    reader.readAsText(file);
  }

  // Panel open/close — stop propagation on the whole overlay so clicks inside don't close it
  const routeBtn=document.getElementById('route-btn');
  const routePanel=document.getElementById('route-panel');
  const routeOverlay=document.getElementById('route-overlay');
  routeBtn.onclick=function(e){e.stopPropagation();routePanel.classList.toggle('open');};
  routeOverlay.addEventListener('click',function(e){e.stopPropagation();});
  document.addEventListener('click',function(){routePanel.classList.remove('open');});
  document.getElementById('route-panel-close').addEventListener('click',function(e){
    e.stopPropagation();
    routePanel.classList.remove('open');
  });
  document.getElementById('route-clear-all').addEventListener('click',function(e){
    e.stopPropagation();
    clearAllUserRoutes();
  });

  // GPX / GeoJSON buttons — reset input value each time so same file can be reloaded
  const fileInput=document.getElementById('route-file-input');
  let pendingAccept='any';

  function triggerFilePick(accept){
    pendingAccept=accept;
    fileInput.accept=accept==='gpx'?'.gpx':accept==='geojson'?'.geojson,.json':'.gpx,.geojson,.json';
    // Reset so the same filename can be picked again
    fileInput.value='';
    // Small delay so the panel-close click-outside doesn't steal focus
    setTimeout(()=>fileInput.click(),50);
  }

  document.getElementById('route-add-gpx').onclick=function(e){e.stopPropagation();triggerFilePick('gpx');};
  document.getElementById('route-add-geojson').onclick=function(e){e.stopPropagation();triggerFilePick('geojson');};

  fileInput.addEventListener('change',function(){
    Array.from(fileInput.files).forEach(f=>loadFile(f,pendingAccept));
    // Reset so re-selecting the same file fires change again next time
    fileInput.value='';
  });

  // Drag & drop on map
  const mapEl=document.getElementById('map');
  mapEl.addEventListener('dragover',e=>{e.preventDefault();mapEl.style.outline='3px dashed #2980b9';});
  mapEl.addEventListener('dragleave',()=>{mapEl.style.outline='';});
  mapEl.addEventListener('drop',e=>{
    e.preventDefault();mapEl.style.outline='';
    Array.from(e.dataTransfer.files).forEach(f=>loadFile(f,'any'));
  });

  // --- Info button (top-right "i"), only shown when a URL was configured ---
  if(INFO_URL){
    const infoBtn=document.getElementById('info-btn');
    if(infoBtn){
      infoBtn.style.display='flex';
      infoBtn.addEventListener('click',()=>window.open(INFO_URL,'_blank','noopener'));
    }
  }

  // --- Map actions: long-press (touch) / right-click (desktop) menu ---
  (function(){
    const menuEl=document.getElementById('map-actions-menu');
    if(!menuEl) return;

    // Group MAP_ACTIONS by their "group" field, preserving first-seen order
    const groupOrder=[];
    const groupMap={};
    MAP_ACTIONS.forEach(a=>{
      if(!groupMap[a.group]){ groupMap[a.group]=[]; groupOrder.push(a.group); }
      groupMap[a.group].push(a);
    });

    let currentLatLng=null;

    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    function fillTemplate(tpl,latlng,fromCoords){
      const lat=latlng.lat.toFixed(5), lon=latlng.lng.toFixed(5), zoom=Math.round(map.getZoom());
      // EPSG:3857 (Web Mercator) metres, for services that expect projected coordinates
      const merc=L.CRS.EPSG3857.project(latlng);
      const x=Math.round(merc.x), y=Math.round(merc.y);
      const HALF_SQUARE_M=250; // 500m x 500m square centered on the tapped point
      const xmin=x-HALF_SQUARE_M, ymin=y-HALF_SQUARE_M, xmax=x+HALF_SQUARE_M, ymax=y+HALF_SQUARE_M;
      let result=tpl.replace(/{lat}/g,lat).replace(/{lon}/g,lon).replace(/{zoom}/g,zoom)
                .replace(/{x}/g,x).replace(/{y}/g,y)
                .replace(/{xmin}/g,xmin).replace(/{ymin}/g,ymin).replace(/{xmax}/g,xmax).replace(/{ymax}/g,ymax);
      if(fromCoords){
        result=result.replace(/{fromlat}/g,fromCoords.lat.toFixed(5)).replace(/{fromlon}/g,fromCoords.lon.toFixed(5));
      }
      return result;
    }

    // --- BRouter: calculate the route ourselves and draw it on this map,  ---
    // --- instead of sending the visitor to the brouter-web website        ---
    function isBrouterWebUrl(tpl){ return String(tpl).toLowerCase().indexOf('brouter.de/brouter-web')!==-1; }

    function extractBrouterParams(filledUrl){
      const hashIdx=filledUrl.indexOf('#');
      const paramsStr=hashIdx>=0?filledUrl.slice(hashIdx+1):filledUrl;
      const params=new URLSearchParams(paramsStr);
      return {
        lonlats:params.get('lonlats')||'',
        profile:params.get('profile')||'trekking',
        nogos:params.get('nogos')||''
      };
    }

    let brouterRouteLayer=null;

    async function showBrouterRoute(lonlats,profile,nogos){
      if(!lonlats){ alert('No route coordinates found for this action.'); return; }
      showToast('Calculating route…');
      try{
        let apiUrl='https://brouter.de/brouter?lonlats='+encodeURIComponent(lonlats)
          +'&profile='+encodeURIComponent(profile)+'&alternativeidx=0&format=geojson';
        if(nogos) apiUrl+='&nogos='+encodeURIComponent(nogos);
        const resp=await fetch(apiUrl);
        if(!resp.ok){
          const txt=await resp.text();
          throw new Error('HTTP '+resp.status+' '+txt.slice(0,200));
        }
        const geojson=await resp.json();
        if(brouterRouteLayer){ map.removeLayer(brouterRouteLayer); brouterRouteLayer=null; }
        brouterRouteLayer=L.geoJSON(geojson,{style:{color:'#e6550d',weight:5,opacity:0.85}}).addTo(map);
        map.fitBounds(brouterRouteLayer.getBounds(),{padding:[30,30]});
        showToast('Route calculated');
      }catch(err){
        alert('Could not calculate the BRouter route: '+(err&&err.message?err.message:err));
      }
    }

    let tempMarker=null;

    function showTempMarker(latlng){
      removeTempMarker();
      const tempIcon=L.divIcon({
        className:'',
        html:'<svg width="26" height="34" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg"><path d="M17 0C7.6 0 0 7.6 0 17c0 12.2 17 27 17 27s17-14.8 17-27C34 7.6 26.4 0 17 0z" fill="#2980b9" stroke="#fff" stroke-width="2"/><circle cx="17" cy="17" r="6" fill="#fff"/></svg>',
        iconSize:[26,34],
        iconAnchor:[13,34]
      });
      tempMarker=L.marker(latlng,{icon:tempIcon,zIndexOffset:3000,interactive:false}).addTo(map);
    }

    function removeTempMarker(){
      if(tempMarker){ map.removeLayer(tempMarker); tempMarker=null; }
    }

    function closeMenu(){
      menuEl.classList.remove('open');
      menuEl.innerHTML='';
      currentLatLng=null;
      removeTempMarker();
    }

    function openUrl(url){
      if(/^https?:/i.test(url)){
        window.open(url,'_blank','noopener');
      } else {
        // Non-http URI (e.g. geo:...) — hand off directly so the OS/browser can route it
        // to an installed app; window.open() is unreliable for custom schemes.
        window.location.href=url;
      }
    }

    function openAction(a){
      if(!currentLatLng) return;
      const latlng=currentLatLng; // capture before closeMenu() clears currentLatLng
      const needsCurrentLocation=/{fromlat}|{fromlon}/.test(a.urlTemplate);
      const isBrouter=isBrouterWebUrl(a.urlTemplate);

      function finish(filledUrl){
        if(isBrouter){
          const {lonlats,profile,nogos}=extractBrouterParams(filledUrl);
          showBrouterRoute(lonlats,profile,nogos);
        } else {
          openUrl(filledUrl);
        }
        closeMenu();
      }

      if(!needsCurrentLocation){
        finish(fillTemplate(a.urlTemplate,latlng));
        return;
      }
      // This action's URL also needs where the visitor currently is (e.g. for
      // "navigate from here to there" links) — ask the browser for that first.
      if(!navigator.geolocation){
        alert('Your browser does not support location services, so this link cannot be completed.');
        closeMenu();
        return;
      }
      showToast('Getting your current location…');
      navigator.geolocation.getCurrentPosition(
        pos=>{
          const fromCoords={lat:pos.coords.latitude,lon:pos.coords.longitude};
          finish(fillTemplate(a.urlTemplate,latlng,fromCoords));
        },
        err=>{
          alert('Could not get your current location ('+(err&&err.message?err.message:'permission denied or unavailable')+'), so this link could not be completed.');
          closeMenu();
        },
        {enableHighAccuracy:false,timeout:20000,maximumAge:60000}
      );
    }

    function buildShareMapUrl(latlng){
      const lat=latlng.lat.toFixed(6), lon=latlng.lng.toFixed(6), zoom=Math.round(map.getZoom());
      return location.origin+location.pathname+'#lat='+lat+'&lng='+lon+'&z='+zoom+'&marker='+lat+','+lon;
    }

    function showToast(msg){
      let t=document.getElementById('mam-toast');
      if(!t){
        t=document.createElement('div');
        t.id='mam-toast';
        t.style.cssText='position:absolute;left:50%;bottom:24px;transform:translateX(-50%);background:rgba(0,0,0,.8);color:white;padding:8px 16px;border-radius:20px;font-size:13px;z-index:1400;pointer-events:none;transition:opacity .3s';
        document.getElementById('map-wrap').appendChild(t);
      }
      t.textContent=msg;
      t.style.opacity='1';
      clearTimeout(t._hideTimer);
      t._hideTimer=setTimeout(()=>{ t.style.opacity='0'; },2000);
    }

    function shareThisMap(){
      if(!currentLatLng) return;
      const url=buildShareMapUrl(currentLatLng);
      if(navigator.share){
        navigator.share({title:document.title,url:url}).catch(()=>{});
      } else if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=>showToast('Link copied to clipboard')).catch(()=>window.prompt('Copy this link:',url));
      } else {
        window.prompt('Copy this link:',url);
      }
      closeMenu();
    }

    // --- Saved locations (e.g. "where I parked") — persisted in this browser via
    // localStorage, scoped to this exact page, so they survive closing the tab,
    // the browser, or the phone itself. They only disappear if this browser's
    // site data for this page gets cleared, or on a different device/browser.
    const SAVED_POINTS_KEY='PeeWeeTrails_savedPoints__'+location.pathname;
    const savedPointLayers={};

    function loadSavedPoints(){
      try{
        const raw=localStorage.getItem(SAVED_POINTS_KEY);
        return raw?JSON.parse(raw):[];
      }catch(e){ return []; }
    }

    function persistSavedPoints(points){
      try{ localStorage.setItem(SAVED_POINTS_KEY, JSON.stringify(points)); }catch(e){}
    }

    function buildSavedPointIcon(label){
      const haloColor='#fff';
      const hw='2px';
      const labelHtml='<div style="position:absolute;left:32px;top:6px;white-space:nowrap;color:#8e44ad;font-size:13px;font-weight:700;pointer-events:none;'+
        'text-shadow:-'+hw+' -'+hw+' 0 '+haloColor+','+hw+' -'+hw+' 0 '+haloColor+',-'+hw+' '+hw+' 0 '+haloColor+','+hw+' '+hw+' 0 '+haloColor+',0 '+hw+' 0 '+haloColor+',0 -'+hw+' 0 '+haloColor+','+hw+' 0 0 '+haloColor+',-'+hw+' 0 0 '+haloColor+'">'+esc(label)+'</div>';
      return L.divIcon({
        className:'',
        html:'<div style="position:relative;width:28px;height:36px">'+
          '<svg width="28" height="36" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg"><path d="M17 0C7.6 0 0 7.6 0 17c0 12.2 17 27 17 27s17-14.8 17-27C34 7.6 26.4 0 17 0z" fill="#8e44ad" stroke="#fff" stroke-width="2"/><path d="M17 9l2.4 5.1 5.6.6-4.2 3.8 1.2 5.5-4.6-2.8-4.9 2.8 1.2-5.5-4.2-3.8 5.6-.6z" fill="#fff"/></svg>'+
          labelHtml+
        '</div>',
        iconSize:[28,36],
        iconAnchor:[14,36]
      });
    }

    function renderSavedPoint(p){
      const marker=L.marker([p.lat,p.lng],{icon:buildSavedPointIcon(p.label),zIndexOffset:1500}).addTo(map);
      const popupEl=document.createElement('div');
      popupEl.innerHTML='<b>'+esc(p.label)+'</b><br><button type="button" class="saved-point-remove">Remove</button>';
      popupEl.querySelector('.saved-point-remove').addEventListener('click',()=>{
        removeSavedPoint(p.id);
        marker.closePopup();
      });
      marker.bindPopup(popupEl);
      savedPointLayers[p.id]=marker;
    }

    function renderAllSavedPoints(){
      loadSavedPoints().forEach(renderSavedPoint);
    }

    function removeSavedPoint(id){
      const points=loadSavedPoints().filter(p=>p.id!==id);
      persistSavedPoints(points);
      if(savedPointLayers[id]){
        map.removeLayer(savedPointLayers[id]);
        delete savedPointLayers[id];
      }
    }

    function saveLocationHere(){
      if(!currentLatLng) return;
      const latlng=currentLatLng; // capture before closeMenu() clears currentLatLng
      const now=new Date();
      const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
      const defaultLabel=dateStr+' parked car';
      const label=window.prompt('Label for this location:',defaultLabel);
      closeMenu();
      if(label===null) return; // cancelled
      const point={
        id:'p'+Date.now()+Math.random().toString(36).slice(2,7),
        lat:latlng.lat,
        lng:latlng.lng,
        label:(label.trim()||defaultLabel),
        createdAt:Date.now()
      };
      const points=loadSavedPoints();
      points.push(point);
      persistSavedPoints(points);
      renderSavedPoint(point);
      showToast('Location saved — it will still be here next time you open this map on this device.');
    }

    let lastClientX=0, lastClientY=0;

    function clampMenuPosition(){
      const wrap=document.getElementById('map-wrap');
      const wrapRect=wrap.getBoundingClientRect();
      menuEl.style.left='0px'; menuEl.style.top='0px'; // reset before measuring actual size
      const mw=menuEl.offsetWidth||200, mh=menuEl.offsetHeight||120;
      let x=Math.min(Math.max(8,lastClientX-wrapRect.left), wrapRect.width-mw-8);
      let y=Math.min(Math.max(8,lastClientY-wrapRect.top), wrapRect.height-mh-8);
      menuEl.style.left=x+'px';
      menuEl.style.top=y+'px';
    }

    function renderGroupLevel(){
      let html='<div class="mam-header">Choose an action</div>';
      html+='<button class="mam-item" data-share-map="1"><span class="mam-icon">&#128279;</span>Share this map here</button>';
      html+='<button class="mam-item" data-save-point="1"><span class="mam-icon">&#128204;</span>Save this location</button>';
      groupOrder.forEach(g=>{
        html+='<button class="mam-item" data-group="'+esc(g)+'"><span class="mam-icon">&#128205;</span>'+esc(g)+'</button>';
      });
      menuEl.innerHTML=html;
      const shareMapBtn=menuEl.querySelector('[data-share-map]');
      if(shareMapBtn) shareMapBtn.addEventListener('click',shareThisMap);
      const savePointBtn=menuEl.querySelector('[data-save-point]');
      if(savePointBtn) savePointBtn.addEventListener('click',saveLocationHere);
      menuEl.querySelectorAll('[data-group]').forEach(btn=>{
        btn.addEventListener('click',()=>renderActionLevel(btn.dataset.group));
      });
      clampMenuPosition();
    }

    function renderActionLevel(group){
      let html='<div class="mam-header"><button class="mam-back" title="Back">&#8592;</button>'+esc(group)+'</div>';
      (groupMap[group]||[]).forEach((a,i)=>{
        const chipStyle=' style="color:'+esc(a.iconColor||'#555555')+'"';
        const iconHtml=a.iconSvg?('<span class="mam-icon mam-icon-chip"'+chipStyle+'>'+a.iconSvg+'</span>')
          :a.iconImgSrc?('<span class="mam-icon mam-icon-chip"><img src="'+esc(a.iconImgSrc)+'" alt=""></span>')
          :'<span class="mam-icon">&#128205;</span>';
        html+='<button class="mam-item" data-idx="'+i+'">'+iconHtml+esc(a.name)+'</button>';
      });
      menuEl.innerHTML=html;
      menuEl.querySelector('.mam-back').addEventListener('click',renderGroupLevel);
      menuEl.querySelectorAll('[data-idx]').forEach(btn=>{
        btn.addEventListener('click',()=>openAction(groupMap[group][parseInt(btn.dataset.idx)]));
      });
      clampMenuPosition();
    }

    function openMenuAt(latlng, clientX, clientY){
      currentLatLng=latlng;
      lastClientX=clientX;
      lastClientY=clientY;
      menuEl.classList.add('open');
      showTempMarker(latlng);
      renderGroupLevel();
    }

    // Clicks inside the menu must never bubble to the document-level "close on
    // outside click" listener below — otherwise, since a click's own handler
    // above already replaces menuEl's contents (destroying the clicked button
    // node), menuEl.contains(e.target) would wrongly evaluate to false once
    // the event bubbles up, instantly closing the menu we just re-rendered.
    menuEl.addEventListener('click',e=>e.stopPropagation());

    document.addEventListener('click',e=>{
      if(!menuEl.contains(e.target)) closeMenu();
    });

    // Desktop: right-click
    map.on('contextmenu',e=>{
      e.originalEvent.preventDefault();
      openMenuAt(e.latlng, e.originalEvent.clientX, e.originalEvent.clientY);
    });

    // Mobile/touch: long-press without significant finger movement
    let lpTimer=null, lpStart=null;
    const LP_MS=550, LP_TOL=12;
    mapEl.addEventListener('touchstart',e=>{
      if(e.touches.length!==1){ clearTimeout(lpTimer); lpStart=null; return; }
      const t=e.touches[0];
      lpStart=[t.clientX,t.clientY];
      clearTimeout(lpTimer);
      lpTimer=setTimeout(()=>{
        const latlng=map.mouseEventToLatLng(t);
        openMenuAt(latlng,t.clientX,t.clientY);
      },LP_MS);
    },{passive:true});
    mapEl.addEventListener('touchmove',e=>{
      if(!lpStart||e.touches.length!==1) return;
      const t=e.touches[0];
      const dx=t.clientX-lpStart[0], dy=t.clientY-lpStart[1];
      if(Math.sqrt(dx*dx+dy*dy)>LP_TOL){ clearTimeout(lpTimer); lpStart=null; }
    },{passive:true});
    mapEl.addEventListener('touchend',()=>{ clearTimeout(lpTimer); lpStart=null; });
    mapEl.addEventListener('touchcancel',()=>{ clearTimeout(lpTimer); lpStart=null; });
    // Prevent iOS' text-selection callout from popping up during a long-press on the map
    mapEl.style.webkitTouchCallout='none';

    renderAllSavedPoints();
  })();
})();
</script>
</body>
</html>
